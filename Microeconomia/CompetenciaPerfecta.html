<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competencia Perfecta — Facultad de Economía</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green-bg:#1a281a; --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (graph toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }
</style>
</head>

    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}

function loadSession(name, group) {
  var key = 'CP1__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var dpr = window.devicePixelRatio || 1;
          dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(text, i) {
        if (!text) return;
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = text;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var pp = document.getElementById('pp' + i);
        if (!pp) return;
        pp.src = dataUrl; pp.style.display = 'block';
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.opacity = '0.4';
      });
    }
  }, 300);
}

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER — two-tap confirmation (Rule 8)
   Prevents accidental answer selection while scrolling on mobile.
   First tap highlights in gold (pending). Second tap on same option confirms.
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  // Second tap on same option → confirm
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ Correct.</strong> ' : '<strong>✗ Incorrect.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }

  // First tap → highlight as pending, clear any previous pending
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

// Direct confirm — used by restoreSession to bypass two-tap
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.textContent = 'Generating PDF…';
  btn.disabled = true;

  var jspdf   = window.jspdf;
  var doc     = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW      = 215.9;
  var M       = 18;
  var TW      = PW - M * 2;
  var PH      = doc.internal.pageSize.height;
  var name    = studentData.name;
  var group   = studentData.group;
  var total   = problems.length;
  var pct     = Math.round(correctCount / total * 100);
  var dateStr = new Date().toLocaleString('en-US', { dateStyle:'long', timeStyle:'short' });

  // verification code
  var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
  var h = 0;
  for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
  var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

  /* util: strip HTML tags and decode/replace all chars jsPDF helvetica can't render */
  function pdfText(html) {
    return (html||'')
      .replace(/<[^>]+>/g, '')
      .replace(/&lt;/g,   '<')
      .replace(/&gt;/g,   '>')
      .replace(/&amp;/g,  '&')
      .replace(/&nbsp;/g, ' ')
      .replace(/&le;/g,   '<=')
      .replace(/&ge;/g,   '>=')
      .replace(/&#[0-9]+;/g, '')
      /* unicode arrows and math that helvetica can't render */
      .replace(/→/g,  '->')
      .replace(/←/g,  '<-')
      .replace(/↑/g,  '^')
      .replace(/↓/g,  'v')
      .replace(/≤/g,  '<=')
      .replace(/≥/g,  '>=')
      .replace(/≈/g,  '~=')
      .replace(/≠/g,  '!=')
      .replace(/√/g,  'sqrt')
      .replace(/π/g,  'pi')
      .replace(/∞/g,  'inf')
      .replace(/²/g,  '^2')
      .replace(/³/g,  '^3')
      .replace(/×/g,  'x')
      .replace(/÷/g,  '/')
      .replace(/−/g,  '-')
      .replace(/['']/g, "'")
      .replace(/[""]/g, '"')
      .replace(/…/g,  '...')
      .replace(/\s+/g, ' ')
      .trim();
  }

  /* util: draw wrapped text line-by-line with automatic page breaks.
     Returns the final y position after drawing. */
  function drawWrapped(text, x, maxW, startY, fontSize, fontStyle, colorArr) {
    doc.setFontSize(fontSize);
    doc.setFont('helvetica', fontStyle || 'normal');
    if (colorArr) doc.setTextColor(colorArr[0], colorArr[1], colorArr[2]);
    var lineH  = fontSize * 0.42;
    var lines  = doc.splitTextToSize(String(text), maxW);
    var y = startY;
    lines.forEach(function(ln) {
      if (y > PH - 18) { doc.addPage(); y = 20; }
      doc.text(ln, x, y);
      y += lineH;
    });
    return y;
  }

  /* util: split text, draw it, return height used */
  function drawText(text, x, y, maxW, fontSize, fontName, fontStyle, colorArr) {
    doc.setFontSize(fontSize);
    doc.setFont(fontName || 'helvetica', fontStyle || 'normal');
    if (colorArr) doc.setTextColor(colorArr[0], colorArr[1], colorArr[2]);
    var lines = doc.splitTextToSize(String(text), maxW);
    lines.forEach(function(ln, li) { doc.text(ln, x, y + li * fontSize * 0.45); });
    return lines.length * fontSize * 0.45;
  }

  /* util: measure text height without drawing */

    doc.setFillColor(ok?45:139, ok?106:37, ok?79:0);
    doc.circle(M+6, sy+5, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(26,26,22); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Problem '+(i+1)+': '+pdfText(prob.title), M+12, sy+6.5);
    doc.setTextColor(ok?45:139, ok?106:37, ok?79:0);
    doc.text(ok?'Correct':'Incorrect', PW-M-24, sy+6.5);
    sy += 12;
  });

  // ── PER-PROBLEM PAGES ──
  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage();
    var wy = 0;

    // header bar
    doc.setFillColor(26,26,22); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(201,168,76); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(201,168,76); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Microeconomía  ·  Competencia Perfecta', M, 10);
    doc.setTextColor(232,228,216); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problem '+(i+1)+' of '+total+'  —  '+pdfText(prob.title), M, 17);
    wy = 25;

    // ── QUESTION BOX ──
    var qRaw = pdfText(prob.questionText);
    var qFn  = pdfText(prob.fn);

    /* Use tighter widths so text never clips:
       - question body: TW-10 (same as before, fine)
       - fn (courier, wider): TW-14  */
    doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qLines  = doc.splitTextToSize(qRaw, TW-10);
    doc.setFontSize(7.5); doc.setFont('courier','bold');
    var fnLines = qFn ? doc.splitTextToSize(qFn, TW-14) : [];

    var qBoxH = 8 + qLines.length*5 + (qFn ? fnLines.length*4.8+5 : 0) + 4;
    doc.setFillColor(240,237,230); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(74,124,63); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('QUESTION', M+4, wy+6);
    doc.setTextColor(26,26,22); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    if (qFn) {
      var fny = qy + qLines.length*5 + 3;
      doc.setTextColor(45,90,35); doc.setFontSize(7.5); doc.setFont('courier','bold');
      fnLines.forEach(function(ln,li){ doc.text(ln, M+4, fny+li*4.8); });
    }
    wy += qBoxH + 4;

    // ── ANSWER BOX ──
    var isOk   = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = prob.studentChoice != null ? pdfText(prob.options[prob.studentChoice]||'—') : '—';
    var corr   = pdfText(prob.options[prob.correctIdx]||'');
    var expRaw = pdfText(prob.explanation||'');

    /* Pre-measure all lines so we can draw the background box correctly */
    var textIndent = M + 14;
    var textW      = TW - 18;
    doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    var chLines = doc.splitTextToSize('Student: ' + chosen, textW);
    doc.setFontSize(8);   doc.setFont('helvetica','normal');
    var coLines = doc.splitTextToSize('Correct: '  + corr,   textW);
    doc.setFontSize(7.5); doc.setFont('helvetica','normal');
    var exLines = doc.splitTextToSize('Solution: ' + expRaw, textW);

    var lineH_ch = 5.0, lineH_co = 4.8, lineH_ex = 4.6;
    var contentH = chLines.length*lineH_ch + coLines.length*lineH_co + exLines.length*lineH_ex;
    var ansBoxH  = contentH + 14;   /* 7 top + 7 bottom padding */

    /* If the whole box fits on the current page, draw background first then text.
       If not, skip the background (text flows across pages). */
    var boxFits = (wy + ansBoxH <= PH - 18);
    if (!boxFits && wy > 40) { doc.addPage(); wy = 20; boxFits = (wy + ansBoxH <= PH - 18); }

    if (boxFits) {
      doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
      doc.roundedRect(M, wy, TW, ansBoxH, 2, 2, 'F');
    }

    /* Status icon */
    doc.setFillColor(isOk?45:139, isOk?106:37, isOk?79:0);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'OK':'X', M+4.2, wy+10.5);

    /* Draw text lines — with per-line page-break guard */
    var ay = wy + 7;

    doc.setTextColor(26,26,22); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln) {
      if (ay > PH - 14) { doc.addPage(); ay = 20; }
      doc.text(ln, textIndent, ay); ay += lineH_ch;
    });
    ay += 2;

    doc.setTextColor(45,106,79); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln) {
      if (ay > PH - 14) { doc.addPage(); ay = 20; }
      doc.text(ln, textIndent, ay); ay += lineH_co;
    });
    ay += 2;

    doc.setTextColor(90,85,80); doc.setFontSize(7.5); doc.setFont('helvetica','normal');
    exLines.forEach(function(ln) {
      if (ay > PH - 14) { doc.addPage(); ay = 20; }
      doc.text(ln, textIndent, ay); ay += lineH_ex;
    });

    wy = ay + 6;

    // ── STUDENT WORK LABEL ──
    doc.setFillColor(74,124,63); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('STUDENT WORK', M+4, wy+5.5);
    wy += 11;

    // ── DRAWING ──
    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}
    }

    // ── TYPED TEXT ──
    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(26,26,22); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }

    // ── PHOTO ──
    // Only add photo if src is a real data URL (not empty / page URL)
    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try {
        doc.addImage(pp.src, 'JPEG', M, wy, TW, 68);
        wy += 72;
      } catch(e) {}
    }
  }

  // ── FOOTERS ──
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(201,168,76); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,120,100); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Code: '+code+'  ·  Page '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('CompetenciaPerfecta_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Download Result PDF';
  btn.disabled  = false;
}

/* ── Drag & Drop Classifier ── */
var sgData = [
  {t:'Mercado de trigo',  c:'yes'},
  {t:'iPhone',            c:'no'},
  {t:'Bolsa de valores',  c:'yes'},
  {t:'Pemex (gasolina)',  c:'no'},
  {t:'Maíz en Jalisco',   c:'yes'},
  {t:'Servicio de internet', c:'no'},
  {t:'Mercado de divisas',c:'yes'},
  {t:'Coca-Cola',         c:'no'}
];
var _sgDragEl = null, _sgDragClone = null;

function sgReset() {
  var zy = document.getElementById('sgZoneYes');
  var zn = document.getElementById('sgZoneNo');
  var si = document.getElementById('sgItems');
  var sf = document.getElementById('sgFeedback');
  if (!zy || !zn || !si || !sf) return;
  zy.innerHTML = '<div class="sg-hdr sg-hdr-yes">✓ Competencia Perfecta</div>';
  zn.innerHTML = '<div class="sg-hdr sg-hdr-no">✗ No es competencia perfecta</div>';
  sf.innerHTML = '';
  si.innerHTML = '';
  sgData.forEach(function(d, i) {
    var el = document.createElement('div');
    el.className = 'sg-chip';
    el.textContent = d.t;
    el.dataset.id = i;
    el.draggable = true;
    el.addEventListener('dragstart', function(e) { e.dataTransfer.setData('text', String(i)); });
    el.addEventListener('touchstart', _sgTouchStart, {passive: false});
    si.appendChild(el);
  });
}
function _sgTouchStart(e) {
  e.preventDefault();
  _sgDragEl = e.currentTarget;
  var r = _sgDragEl.getBoundingClientRect();
  _sgDragClone = _sgDragEl.cloneNode(true);
  _sgDragClone.style.cssText = 'position:fixed;opacity:.85;pointer-events:none;z-index:9999;' +
    'padding:.4rem .85rem;font-size:.82rem;border-radius:8px;background:var(--surface);' +
    'border:1.5px solid var(--green);width:' + r.width + 'px;' +
    'top:' + (e.touches[0].clientY - r.height/2) + 'px;' +
    'left:' + (e.touches[0].clientX - r.width/2) + 'px;';
  document.body.appendChild(_sgDragClone);
  document.addEventListener('touchmove',  _sgTouchMove,  {passive: false});
  document.addEventListener('touchend',   _sgTouchEnd);
}
function _sgTouchMove(e) {
  e.preventDefault();
  if (!_sgDragClone) return;
  _sgDragClone.style.top  = (e.touches[0].clientY - _sgDragClone.offsetHeight/2) + 'px';
  _sgDragClone.style.left = (e.touches[0].clientX - _sgDragClone.offsetWidth/2)  + 'px';
}
function _sgTouchEnd(e) {
  if (!_sgDragClone) return;
  document.body.removeChild(_sgDragClone);
  _sgDragClone = null;
  var t  = e.changedTouches[0];
  var el = document.elementFromPoint(t.clientX, t.clientY);
  var zone = el && el.closest ? el.closest('#sgZoneYes,#sgZoneNo') : null;
  if (zone && _sgDragEl) {
    sgDropEl(_sgDragEl, zone.id === 'sgZoneYes' ? 'yes' : 'no');
  }
  document.removeEventListener('touchmove', _sgTouchMove);
  document.removeEventListener('touchend',  _sgTouchEnd);
}
function sgDrop(e, zone) {
  e.preventDefault();
  var idx = e.dataTransfer.getData('text');
  var el  = document.querySelector('.sg-chip[data-id="' + idx + '"]');
  if (el) sgDropEl(el, zone);
}
function sgDropEl(el, zone) {
  var i = parseInt(el.dataset.id);
  var correct = sgData[i].c;
  el.style.borderColor = zone === correct ? 'var(--ok)'  : 'var(--bad)';
  el.style.background  = zone === correct ? 'var(--ok-bg)' : 'var(--bad-bg)';
  el.style.color       = zone === correct ? 'var(--ok)'  : 'var(--bad)';
  document.getElementById(zone === 'yes' ? 'sgZoneYes' : 'sgZoneNo').appendChild(el);
  var all    = sgData.length;
  var placed = document.querySelectorAll('#sgZoneYes .sg-chip,#sgZoneNo .sg-chip').length;
  var ok = 0;
  sgData.forEach(function(d, j) {
    var e2 = document.querySelector('.sg-chip[data-id="' + j + '"]');
    if (!e2) return;
    var inY = !!e2.closest('#sgZoneYes');
    if ((inY && d.c === 'yes') || (!inY && d.c === 'no')) ok++;
  });
  if (placed === all) {
    document.getElementById('sgFeedback').innerHTML =
      '<strong>' + ok + ' de ' + all + ' correctos.</strong> ' +
      (ok === all ? '🎉 ¡Perfecto!' : 'Revisa los elementos en rojo.');
  }
}

/* ── Demand Curve Simulator ──
   LEFT panel : Market (downward D, upward S, equilibrium at P*)
   RIGHT panel: Individual firm (horizontal demand at P*, Q* from market)
*/
function updateDemCurve(val) {
  var p = parseInt(val);
  var lbl = document.getElementById('pvP');
  if (lbl) lbl.textContent = '$' + p;

  /* Market demand: P = 28 - 1.5Q  →  Q* = (28 - P) / 1.5 */
  var Qstar = Math.max(0, Math.round((28 - p) / 1.5 * 10) / 10);
  var ITval  = Math.round(p * Qstar * 100) / 100;

  var m1 = document.getElementById('dmIMg');   if (m1) m1.textContent = '$' + p;
  var m2 = document.getElementById('dmIT');    if (m2) m2.textContent = '$' + ITval.toFixed(1);
  var m3 = document.getElementById('dmIMe');   if (m3) m3.textContent = '$' + p;
  var m4 = document.getElementById('dmQstar'); if (m4) m4.textContent = Qstar.toFixed(1) + ' u.';

  var cv = document.getElementById('demCanvas');
  if (!cv) return;
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);

  var pad = 14, gap = 28;
  var panW = (W - pad * 2 - gap) / 2;
  var ox1 = pad + 42, ox2 = pad + 42 + panW + gap;
  var oy = 24, gh = H - 54;
  var maxP = 30, maxQ = 20;

  function xp(ox, q) { return ox + (q / maxQ) * (panW - 52); }
  function yp(v)      { return oy + gh - (v / maxP) * gh; }

  function drawAxes(ox, title, xLbl) {
    ctx.strokeStyle = '#e5e2db'; ctx.lineWidth = 0.7;
    for (var gi = 1; gi <= 5; gi++) {
      var gy2 = oy + (gi / 5) * gh;
      ctx.beginPath(); ctx.moveTo(ox, gy2); ctx.lineTo(xp(ox, maxQ) + 4, gy2); ctx.stroke();
    }
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox, oy + gh); ctx.lineTo(xp(ox, maxQ) + 8, oy + gh); ctx.stroke();
    ctx.fillStyle = '#777'; ctx.font = '11px IBM Plex Mono';
    ctx.fillText(xLbl || 'Q', xp(ox, maxQ) + 10, oy + gh + 4);
    ctx.fillText('P', ox - 13, oy + 5);
    ctx.fillStyle = '#444'; ctx.font = 'bold 11px IBM Plex Mono';
    ctx.fillText(title, ox, oy - 9);
    [5, 10, 15, 20, 25].forEach(function(v) {
      if (v <= maxP) { ctx.fillStyle = '#bbb'; ctx.font = '9px IBM Plex Mono'; ctx.fillText('$' + v, ox - 26, yp(v) + 3); }
    });
  }

  /* ── LEFT: Mercado ── */
  drawAxes(ox1, 'Mercado', 'Q');

  /* Supply: P = 1.5Q */
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2.2; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(xp(ox1, 0), yp(0)); ctx.lineTo(xp(ox1, maxQ * 0.93), yp(maxQ * 0.93 * 1.5)); ctx.stroke();
  ctx.fillStyle = '#c9a84c'; ctx.font = 'bold 10px IBM Plex Mono';
  ctx.fillText('O', xp(ox1, maxQ * 0.88) + 3, yp(maxQ * 0.88 * 1.5) - 3);

  /* Demand: P = 28 - 1.5Q */
  ctx.strokeStyle = '#1d4e89'; ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.moveTo(xp(ox1, 0), yp(28)); ctx.lineTo(xp(ox1, 18.5), yp(0.25)); ctx.stroke();
  ctx.fillStyle = '#1d4e89'; ctx.font = 'bold 10px IBM Plex Mono';
  ctx.fillText('D', xp(ox1, 17) + 3, yp(2));

  /* Equilibrium dashed drop lines */
  var eqX = xp(ox1, Qstar), eqY = yp(p);
  ctx.strokeStyle = '#4a7c3f'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(ox1, eqY); ctx.lineTo(eqX, eqY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(eqX, eqY); ctx.lineTo(eqX, oy + gh); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#2d5a27'; ctx.font = 'bold 10px IBM Plex Mono';
  ctx.fillText('$' + p, ox1 - 32, eqY + 3);
  ctx.fillStyle = '#2d5a27'; ctx.font = 'bold 9px IBM Plex Mono';
  ctx.fillText('Q*=' + Qstar.toFixed(1), eqX - 14, oy + gh + 14);

  /* Equilibrium dot */
  ctx.beginPath(); ctx.arc(eqX, eqY, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#4a7c3f'; ctx.fill();

  /* ── RIGHT: Empresa individual ── */
  drawAxes(ox2, 'Empresa individual', 'q');

  /* Horizontal firm demand at p */
  var firmEnd = xp(ox2, maxQ * 0.85);
  ctx.strokeStyle = '#4a7c3f'; ctx.lineWidth = 3; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(ox2, yp(p)); ctx.lineTo(firmEnd, yp(p)); ctx.stroke();
  ctx.fillStyle = '#4a7c3f'; ctx.font = 'bold 10px IBM Plex Mono';
  ctx.fillText('d = IMg = IMe = $' + p, ox2 + 4, yp(p) - 7);
  ctx.fillStyle = '#2d5a27'; ctx.font = 'bold 10px IBM Plex Mono';
  ctx.fillText('$' + p, ox2 - 32, yp(p) + 3);

  /* IT shading up to Q* */
  var firmQ = Math.min(Qstar, maxQ * 0.75);
  var firmQx = xp(ox2, firmQ);
  ctx.fillStyle = 'rgba(74,124,63,0.10)';
  ctx.fillRect(ox2, yp(p), firmQx - ox2, oy + gh - yp(p));

  /* q* drop line */
  ctx.strokeStyle = '#4a7c3f'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(firmQx, yp(p)); ctx.lineTo(firmQx, oy + gh); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(firmQx, yp(p), 4, 0, Math.PI * 2);
  ctx.fillStyle = '#4a7c3f'; ctx.fill();
  ctx.fillStyle = '#2d5a27'; ctx.font = 'bold 9px IBM Plex Mono';
  ctx.fillText('q*=' + Qstar.toFixed(1), firmQx - 14, oy + gh + 14);

  if (firmQx - ox2 > 50) {
    ctx.fillStyle = '#c9a84c'; ctx.font = '9px IBM Plex Mono';
    ctx.fillText('IT=$' + ITval.toFixed(1), ox2 + 3, yp(p) + (oy + gh - yp(p)) / 2 + 4);
  }

  /* bottom captions */
  ctx.fillStyle = '#999'; ctx.font = '9px IBM Plex Mono';
  ctx.fillText('Demanda del mercado: pendiente negativa', ox1, oy + gh + 30);
  ctx.fillText('Demanda de la empresa: perfectamente elástica', ox2 - 8, oy + gh + 30);
}

/* ── P=CMg Simulator ── */
var _simB = 7; // will be set in buildLesson
function updateSim() {
  var slP  = document.getElementById('slP');
  var slCF = document.getElementById('slCF');
  if (!slP || !slCF) return;
  var P2  = parseInt(slP.value);
  var CF  = parseInt(slCF.value);
  var b2  = _simB;
  var lp  = document.getElementById('simP');  if (lp) lp.textContent = '$' + P2;
  var lcf = document.getElementById('simCF'); if (lcf) lcf.textContent = '$' + CF;
  /* Q* from P = 2Q + b2 */
  var Qo   = (P2 - b2) / 2;
  var Qopt = Math.max(0, Math.round(Qo * 10) / 10);
  var CTopt = Qopt * Qopt + b2 * Qopt + CF;
  var ITopt = P2 * Qopt;
  var Pi    = ITopt - CTopt;
  var qEl   = document.getElementById('simQopt');
  var pEl   = document.getElementById('simPi');
  var sEl   = document.getElementById('simStatus');
  if (qEl) qEl.textContent = Qopt <= 0 ? '0 (cierra)' : Qopt.toFixed(1);
  if (pEl) { pEl.textContent = '$' + Pi.toFixed(1); pEl.style.color = Pi >= 0 ? 'var(--ok)' : 'var(--bad)'; }
  if (sEl) sEl.textContent = Qopt > 0 ? 'P = $' + P2 + ', Q* = ' + Qopt.toFixed(1) : 'No produce';
  var cv = document.getElementById('simCanvas');
  if (!cv) return;
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  var ox = 60, oy = 15, gw = W - 80, gh = H - 40;
  var maxQ  = Math.max(12, Qopt * 2.2 + 1);
  var maxPv = Math.max(P2 * 1.5 + 5, 30);
  function xpx(q) { return ox + (q / maxQ) * gw; }
  function ypx(v) { return oy + gh - ((v / maxPv) * gh); }
  /* grid */
  ctx.strokeStyle = '#e8e5de'; ctx.lineWidth = 0.7;
  for (var gi = 1; gi <= 5; gi++) {
    var giy = oy + (gi / 5) * gh;
    ctx.beginPath(); ctx.moveTo(ox, giy); ctx.lineTo(ox + gw, giy); ctx.stroke();
  }
  /* axes */
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox, oy + gh); ctx.lineTo(ox + gw, oy + gh); ctx.stroke();
  ctx.fillStyle = '#888'; ctx.font = '12px IBM Plex Mono';
  ctx.fillText('Q', ox + gw + 6, oy + gh + 5);
  ctx.fillText('$', ox - 18, oy + 6);
  /* y scale */
  [0, 5, 10, 15, 20, 25, 30].forEach(function(v) {
    if (v <= maxPv) {
      ctx.fillStyle = '#bbb'; ctx.font = '10px IBM Plex Mono';
      ctx.fillText('$' + v, ox - 30, ypx(v) + 3);
    }
  });
  /* CMg = 2Q + b2 */
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2.5; ctx.setLineDash([]);
  ctx.beginPath();
  var fst = true;
  for (var q = 0; q <= maxQ; q += 0.3) {
    var cmgv = 2 * q + b2;
    if (cmgv > maxPv * 1.05) break;
    var x = xpx(q), y = ypx(cmgv);
    if (fst) { ctx.moveTo(x, y); fst = false; } else { ctx.lineTo(x, y); }
  }
  ctx.stroke();
  ctx.fillStyle = '#c9a84c'; ctx.font = 'bold 12px IBM Plex Mono';
  ctx.fillText('CM (CMg)', ox + 4, ypx(b2 + 2) - 6);
  /* P line */
  ctx.strokeStyle = '#4a7c3f'; ctx.lineWidth = 2.5; ctx.setLineDash([7, 4]);
  ctx.beginPath(); ctx.moveTo(ox, ypx(P2)); ctx.lineTo(ox + gw, ypx(P2)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#4a7c3f'; ctx.font = 'bold 12px IBM Plex Mono';
  ctx.fillText('P = IMg = $' + P2, ox + gw - 120, ypx(P2) - 7);
  /* Q* vertical */
  if (Qopt > 0 && Qopt <= maxQ) {
    ctx.strokeStyle = '#8b2500'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
    ctx.beginPath(); ctx.moveTo(xpx(Qopt), ypx(P2)); ctx.lineTo(xpx(Qopt), oy + gh); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#8b2500'; ctx.font = 'bold 11px IBM Plex Mono';
    ctx.fillText('Q*=' + Qopt.toFixed(1), xpx(Qopt) + 3, oy + gh - 4);
    /* dot at intersection */
    ctx.fillStyle = '#8b2500';
    ctx.beginPath(); ctx.arc(xpx(Qopt), ypx(P2), 5, 0, Math.PI * 2); ctx.fill();
  }
  /* IT shading */
  if (Qopt > 0) {
    ctx.fillStyle = 'rgba(74,124,63,0.08)';
    ctx.fillRect(ox, ypx(P2), xpx(Qopt) - ox, oy + gh - ypx(P2));
  }
}

/* ── Profit Calculator ── */
function calcProfit() {
  var P2  = parseFloat(document.getElementById('cpP').value)  || 0;
  var Q2  = parseFloat(document.getElementById('cpQ').value)  || 0;
  var CF  = parseFloat(document.getElementById('cpCF').value) || 0;
  var CV  = parseFloat(document.getElementById('cpCV').value) || 0;
  var CT  = CF + CV;
  var IT  = P2 * Q2;
  var Pi  = IT - CT;
  var CMe  = Q2 > 0 ? (CT / Q2).toFixed(2) : '—';
  var CVMe = Q2 > 0 ? (CV / Q2).toFixed(2) : '—';
  var cvmeNum = Q2 > 0 ? CV / Q2 : 0;
  var status, scolor;
  if (Pi > 0)                            { status = '🟢 Ganancia positiva';              scolor = 'var(--ok)';   }
  else if (Math.abs(Pi) < 0.01)          { status = '🟡 Ganancia normal (π = 0)';        scolor = 'var(--gold)'; }
  else if (Q2 > 0 && P2 < cvmeNum)       { status = '🔴 Debe cerrar (P &lt; CVMe)';       scolor = 'var(--bad)';  }
  else                                    { status = '🟠 Pérdida, pero conviene producir'; scolor = 'var(--bad)';  }
  var piColor = Pi >= 0 ? 'var(--ok)' : 'var(--bad)';
  var r = document.getElementById('cpResult');
  if (!r) return;
  r.innerHTML =
    '<strong>IT</strong> = $' + P2 + ' × ' + Q2 + ' = <strong>$' + IT.toFixed(2) + '</strong><br>' +
    '<strong>CT</strong> = $' + CF + ' + $' + CV + ' = <strong>$' + CT.toFixed(2) + '</strong><br>' +
    '<strong>π</strong> = $' + IT.toFixed(2) + ' − $' + CT.toFixed(2) +
      ' = <strong style="color:' + piColor + '">$' + Pi.toFixed(2) + '</strong><br>' +
    '<strong>CMe</strong> = $' + CMe + '  |  <strong>CVMe</strong> = $' + CVMe + '<br>' +
    '<strong>Situación:</strong> <span style="color:' + scolor + '">' + status + '</span>';
}

function verifyProfitTable() {
  var P2 = 16, b2 = 4, Qopt = 6;
  var msg = document.getElementById('ptMsg');

  /* Pre-filled keys — skip from the "all filled" gate */
  var pfSet = {IT_1:1, CM_2:1, Pi_4:1, IT_7:1, CM_9:1};

  /* Gate: all non-prefilled cells must be filled */
  var allFilled = true;
  for (var q = 1; q <= 10; q++) {
    ['IT','CM','Pi'].forEach(function(col) {
      if (pfSet[col + '_' + q]) return;   /* skip pre-filled */
      var inp = document.getElementById('pt' + col + q);
      if (!inp || inp.value === '' || isNaN(parseFloat(inp.value))) allFilled = false;
    });
  }
  if (!allFilled) {
    if (msg) msg.innerHTML = '<span style="color:var(--gold)">⚠ Completa todas las celdas en blanco antes de verificar.</span>';
    return;
  }

  var correct = 0, total = 25;  /* 30 cells − 5 pre-filled = 25 to verify */
  for (var q = 1; q <= 10; q++) {
    var it = P2 * q, ct = q*q + b2*q, cm = 2*q + b2, pi = it - ct;
    var isOpt = (q === Qopt);
    var row   = document.getElementById('ptr' + q);
    var checks = [
      {id:'ptIT'+q, correct:it,  label:'$'+it,                      col:'IT'},
      {id:'ptCM'+q, correct:cm,  label:'$'+cm,                      col:'CM'},
      {id:'ptPi'+q, correct:pi,  label:'$'+pi + (isOpt?' ★':''),    col:'Pi'}
    ];
    checks.forEach(function(ck) {
      var inp = document.getElementById(ck.id);
      if (!inp) return;
      /* Pre-filled hidden inputs: just count as correct, don't re-render */
      if (pfSet[ck.col + '_' + q]) { correct++; total++; return; }
      var val = parseFloat(inp.value);
      var isOk = val === ck.correct;
      if (isOk) correct++;
      inp.parentElement.innerHTML = '<span style="font-weight:' + (isOpt?'700':'400') +
        ';color:' + (isOk ? 'var(--ok)' : 'var(--bad)') + '">' + ck.label + '</span>';
    });
    if (isOpt && row) row.style.background = 'var(--ok-bg)';
  }
  if (msg) {
    var studentCorrect = correct - 5;   /* subtract the 5 pre-filled */
    var studentTotal   = total   - 5;
    if (studentCorrect === studentTotal)
      msg.innerHTML = '<span style="color:var(--ok)"><strong>✓ ¡Perfecto! 25/25.</strong> La ganancia máxima ($36) está en Q*=6, donde CM=$16=P. ✓</span>';
    else
      msg.innerHTML = '<span style="color:var(--bad)">' + studentCorrect + '/' + studentTotal + ' correctas — revisa las celdas en rojo.</span>';
  }
}


function updateLR() {
  var slP = document.getElementById('slLRP');
  var slN = document.getElementById('slLRN');
  if (!slP || !slN) return;
  var P2 = parseInt(slP.value);
  var N  = parseInt(slN.value);
  var lp = document.getElementById('lrP'); if (lp) lp.textContent = '$' + P2;
  var ln = document.getElementById('lrN'); if (ln) ln.textContent = N;
  var Peq = _lrPeq;
  var status, scolor;
  if (P2 > Peq)       { status = '🟢 Ganancias → entran empresas → P bajará hacia $' + Peq; scolor = 'var(--ok)'; }
  else if (P2 < Peq)  { status = '🔴 Pérdidas → salen empresas → P subirá hacia $' + Peq;   scolor = 'var(--bad)'; }
  else                { status = '⚖️ Equilibrio LP: π = 0, P = CMe mínimo';                  scolor = 'var(--gold)'; }
  var r = document.getElementById('lrResult');
  if (r) r.innerHTML = '<strong>Precio:</strong> $' + P2 + ' | <strong>CMe mínimo:</strong> $' + Peq +
    ' | <strong>N empresas:</strong> ' + N + '<br><span style="color:' + scolor + '">' + status + '</span>';
  var cv = document.getElementById('lrCanvas');
  if (!cv) return;
  var ctx = cv.getContext('2d');
  var W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  var ox = 55, oy = 10, gw = W - 75, gh = H - 35;
  var maxPv = 30;
  function ypx2(v) { return oy + gh - ((v / maxPv) * gh); }
  function xpx2(q) { return ox + q; }
  /* axes */
  ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox, oy + gh); ctx.lineTo(ox + gw, oy + gh); ctx.stroke();
  ctx.fillStyle = '#888'; ctx.font = '12px IBM Plex Mono';
  ctx.fillText('Q', ox + gw + 4, oy + gh + 5);
  ctx.fillText('P', ox - 16, oy + 6);
  /* Demand: downward from (0, 28) to (gw, 4) */
  ctx.strokeStyle = '#1d4e89'; ctx.lineWidth = 2.2; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(ox, ypx2(26)); ctx.lineTo(ox + gw, ypx2(4)); ctx.stroke();
  ctx.fillStyle = '#1d4e89'; ctx.font = '11px IBM Plex Mono';
  ctx.fillText('Demanda', ox + gw - 70, ypx2(7));
  /* Supply: upward */
  ctx.strokeStyle = '#c9a84c'; ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.moveTo(ox, ypx2(4)); ctx.lineTo(ox + gw, ypx2(26)); ctx.stroke();
  ctx.fillStyle = '#c9a84c'; ctx.font = '11px IBM Plex Mono';
  ctx.fillText('Oferta', ox + gw - 60, ypx2(22));
  /* P* equilibrium line */
  ctx.strokeStyle = '#4a7c3f'; ctx.lineWidth = 1.5; ctx.setLineDash([6, 3]);
  ctx.beginPath(); ctx.moveTo(ox, ypx2(Peq)); ctx.lineTo(ox + gw, ypx2(Peq)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#4a7c3f'; ctx.font = '11px IBM Plex Mono';
  ctx.fillText('P* = $' + Peq + ' (LP)', ox + gw - 110, ypx2(Peq) - 4);
  /* Current P dashed */
  if (P2 !== Peq) {
    ctx.strokeStyle = '#8b2500'; ctx.lineWidth = 2; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(ox, ypx2(P2)); ctx.lineTo(ox + gw * 0.55, ypx2(P2)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#8b2500'; ctx.font = 'bold 11px IBM Plex Mono';
    ctx.fillText('P = $' + P2, ox + gw * 0.56, ypx2(P2) + 4);
    /* arrow toward P* */
    var arrDir = P2 > Peq ? 1 : -1;
    var ax = ox + gw * 0.3;
    var ay = ypx2(P2);
    var aty = ypx2(Peq);
    ctx.strokeStyle = '#8b2500'; ctx.lineWidth = 1.5; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax, aty - arrDir * 6); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ax, aty);
    ctx.lineTo(ax - 5, aty + arrDir * 8);
    ctx.lineTo(ax + 5, aty + arrDir * 8);
    ctx.closePath(); ctx.fillStyle = '#8b2500'; ctx.fill();
  }
  /* y labels */
  [5, 10, 15, 20, 25].forEach(function(v) {
    ctx.fillStyle = '#bbb'; ctx.font = '9px IBM Plex Mono';
    ctx.fillText('$' + v, ox - 24, ypx2(v) + 3);
  });
}

    '<p>Ejemplos: mercados agrícolas (maíz, trigo), bolsas de valores, mercados cambiarios.</p>'

  /* ── Actividad 1: Clasificador drag & drop ── */
  addSec(
    '<div class="stag">Actividad interactiva</div>' +
    '<h2>Clasificador de mercados</h2>' +
    '<p>Arrastra cada ejemplo al cuadro correcto. En móvil, mantén presionado y arrastra.</p>' +
    '<style>' +
      '.sg-chip{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:.4rem .85rem;font-size:.82rem;cursor:grab;user-select:none;transition:all .15s;}' +
      '.sg-hdr{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;}' +
      '.sg-hdr-yes{color:var(--green)}.sg-hdr-no{color:var(--bad)}' +
    '</style>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem">' +
      '<div id="sgZoneYes" style="background:var(--green-bg);border:2px dashed var(--green);border-radius:10px;min-height:130px;padding:.75rem" ondragover="event.preventDefault()" ondrop="sgDrop(event,\'yes\')"></div>' +
      '<div id="sgZoneNo"  style="background:var(--bad-bg); border:2px dashed var(--bad); border-radius:10px;min-height:130px;padding:.75rem" ondragover="event.preventDefault()" ondrop="sgDrop(event,\'no\')"></div>' +
    '</div>' +

  );
  setTimeout(sgReset, 60);

  /* ── SECCIÓN 3 — Maximización de ganancias: la regla P = CM ── */
  /* seeded CT: CT = a·Q² + b·Q + CF  where a=1 always for simplicity */
  var a  = 1;               /* coefficient of Q² in CT */
  /* CM = dCT/dQ = 2a·Q + b = 2Q + b */
  /* Q* = (P - b) / (2a) = (P - b) / 2 */
  var QoptEx = Math.max(1, Math.round((P - b) / 2));

  /* ── SECCIÓN 4 — Derivación completa: de la función de demanda a Q* ── */
  /* New seeded values for this section's worked example */
  var aDem = Math.floor(rng() * 3 + 20);   /* demand intercept: P = aDem - 2Q  → 20–22 */
  var aC   = Math.floor(rng() * 2 + 1);    /* CT = aC·Q² + bC·Q + CFC */
  var bC   = Math.floor(rng() * 4 + 3);    /* 3–6 */
  var CFC  = Math.floor(rng() * 20 + 30);  /* 30–49 */
  /* Market equilibrium P from demand. In perfect competition the firm is price-taker,
     so we pick P from the demand curve at some representative Q, rounded nicely. */
  var Peq  = Math.floor(rng() * 6 + 10);   /* given market price 10–15 */
  /* Q* for section 4 example */
  var QeqS4 = Math.max(1, Math.round((Peq - bC) / (2 * aC)));
  var CTeqS4 = aC*QeqS4*QeqS4 + bC*QeqS4 + CFC;
  var PieqS4 = Peq*QeqS4 - CTeqS4;
  /* CTM and CVM at Q* */
  var CTMeqS4 = (CTeqS4 / QeqS4).toFixed(2);
  var CVeqS4  = aC*QeqS4*QeqS4 + bC*QeqS4;   /* CV = CT - CF */
  var CVMeqS4 = (CVeqS4 / QeqS4).toFixed(2);

  addSec(
    '<div class="stag">Concepto 2</div>' +

      '<strong>Ejemplo resuelto — derivación completa desde CT(Q)</strong>' +

      '<table style="width:100%;border-collapse:collapse;margin:.5rem 0;font-family:IBM Plex Mono,monospace;font-size:.82rem">' +

        '<tr style="border-bottom:1px solid var(--border)">' +

          '<td style="padding:.42rem .6rem">' +
            'Ganancia, CTM y CVM:<br>' +
            'π* = $' + (Peq*QeqS4) + ' − $' + CTeqS4 + ' = <strong style="color:var(--ok)">$' + PieqS4 + '</strong><br>' +
            'CTM = CT/Q* = $' + CTeqS4 + '/' + QeqS4 + ' = $' + CTMeqS4 + '<br>' +
            'CVM = CV/Q* = $' + CVeqS4 + '/' + QeqS4 + ' = $' + CVMeqS4 +
          '</td>' +
        '</tr>' +

        '<tr>' +
          '<td style="padding:.42rem .6rem;color:var(--text3)"><strong>Cierre</strong></td>' +

  /* ── Actividad 3: Tabla de ganancias — estudiante completa la columna π ── */
  addSec(

      '<p style="font-size:.82rem;color:var(--text3);margin-bottom:.7rem">' +

  /* ════════════════════════════════
     BLOQUE P=CM — 5 PROBLEMAS
  ════════════════════════════════ */

  /* Shared helper — generate a clean (a,b,CF,P) set where Q* is a nice integer
     and π* > 0, options are distinct integers */
  function genPCM(rng) {
    var a  = Math.floor(rng()*2+1);           /* 1–2 */
    var b  = Math.floor(rng()*6+2);           /* 2–7 */
    var CF = Math.floor(rng()*30+10);         /* 10–39 */
    /* pick Q* first, then back-calculate P */
    var Qs = Math.floor(rng()*5+3);           /* Q*=3–7 */
    /* P = CM at Q* = 2a·Q* + b */
    var Pp = 2*a*Qs + b;
    var CT = a*Qs*Qs + b*Qs + CF;
    var IT = Pp*Qs;
    var pi = IT - CT;
    var CVM_Q = (a*Qs*Qs + b*Qs)/Qs;        /* CV/Q at Q* */
    var CTM_Q = CT/Qs;
    return {a:a, b:b, CF:CF, P:Pp, Qs:Qs, CT:CT, IT:IT, pi:pi, CVM_Q:CVM_Q, CTM_Q:CTM_Q};
  }

  var g0 = genPCM(rng);
  var g1 = genPCM(rng);
  var g2 = genPCM(rng);
  var g3 = genPCM(rng);
  var g4 = genPCM(rng);

  /* P1 — Find Q* */
  (function() {
    var g = g0;
    var candidates = [g.Qs+2, Math.max(1,g.Qs-1), g.Qs+3, Math.max(1,g.Qs-2), g.Qs+4, 1];
    var distractors = [];
    candidates.forEach(function(c) {
      if (c === g.Qs) return;
      if (distractors.indexOf(c) >= 0) return;
      if (distractors.length < 3) distractors.push(c);
    });
    var s_p1 = shuffleOpts(
      [String(g.Qs), String(distractors[0]), String(distractors[1]), String(distractors[2])],
      String(g.Qs), rng);
    problems.push({
      title:'Q que maximiza ganancia', studentChoice:null, pendingChoice:null,
      questionText:'Una empresa competitiva tiene CT = ' + g.a + 'Q² + ' + g.b + 'Q + ' + g.CF + ' y enfrenta un precio de mercado P = $' + g.P + '. ¿Cuántas unidades debe producir para maximizar su ganancia?',
      fn:'CM = dCT/dQ  |  Condición de maximización: P = CM',
      options:s_p1.opts, correctIdx:s_p1.correctIdx,
      hint:'Deriva CT para obtener CM = ' + (2*g.a) + 'Q + ' + g.b + ', luego iguala a P = ' + g.P + '.',
      explanation:'CM = dCT/dQ = ' + (2*g.a) + 'Q + ' + g.b + '. Igualando P = CM: ' + g.P + ' = ' + (2*g.a) + 'Q + ' + g.b + ' → Q* = ' + g.Qs + '.'
    });
    buildOneCard(problems[0], 0);
  })();

  /* P2 — Find maximum profit (student must find Q* first) */
  /* Distractors: wrong Q values ±1 and ±2, then compute their π.
     Guard: if any two π values collide, offset by 1 until unique. */
  (function() {
    var g = g1;
    function piAt(q) { return g.P*q - g.a*q*q - g.b*q - g.CF; }
    var correct = g.pi;
    /* build distinct wrong π values by trying Q offsets until all 4 are unique */
    var wrongs = [];
    var tried = [g.Qs];
    [g.Qs+1, g.Qs-1, g.Qs+2, g.Qs+3, g.Qs-2, g.Qs+4, g.Qs-3].forEach(function(q) {
      if (q < 1) return;
      if (tried.indexOf(q) >= 0) return;
      var pv = piAt(q);
      if (pv === correct) return;
      if (wrongs.map(function(w){return w.v;}).indexOf(pv) >= 0) return;
      wrongs.push({q:q, v:pv});
      tried.push(q);
    });
    /* fallback: add offset to correct if still short */
    while (wrongs.length < 3) {
      var offset = wrongs.length + 5;
      var fv = correct + offset;
      if (wrongs.map(function(w){return w.v;}).indexOf(fv) < 0 && fv !== correct) {
        wrongs.push({q:null, v:fv});
      }
    }
    var s_p2 = shuffleOpts(
      ['$'+correct, '$'+wrongs[0].v, '$'+wrongs[1].v, '$'+wrongs[2].v],
      '$'+correct, rng);
    problems.push({
      title:'Ganancia máxima', studentChoice:null, pendingChoice:null,
      questionText:'Una empresa tiene CT = ' + g.a + 'Q² + ' + g.b + 'Q + ' + g.CF + ' y P = $' + g.P + '. ¿Cuál es la ganancia máxima que puede obtener?',
      fn:'Paso 1: halla Q* con P = CM.  Paso 2: calcula π = P·Q* − CT(Q*)',
      options:s_p2.opts, correctIdx:s_p2.correctIdx,
      hint:'Primero Q*: CM = ' + (2*g.a) + 'Q + ' + g.b + ' = ' + g.P + ' → Q* = ' + g.Qs + '. Luego π = ' + g.P + '×' + g.Qs + ' − CT(' + g.Qs + ').',
      explanation:'Q* = ' + g.Qs + '. IT = $' + g.IT + '. CT(' + g.Qs + ') = ' + g.a + '(' + g.Qs + ')² + ' + g.b + '(' + g.Qs + ') + ' + g.CF + ' = $' + g.CT + '. π* = $' + g.IT + ' − $' + g.CT + ' = $' + g.pi + '.'
    });
    buildOneCard(problems[1], 1);
  })();

  /* P3 — Find IT at Q* */
  (function() {
    var g = g2;
    var correct = g.IT;
    /* Distractors: different Q values, then P*Q. Guard against CT collision too. */
    var candidateQs = [g.Qs+2, g.Qs-1, g.Qs+3, g.Qs+4, g.Qs-2];
    var distractors = [];
    /* also add CT as a distractor if it's not equal to any IT-based one */
    var ctVal = g.CT;
    candidateQs.forEach(function(q) {
      if (q <= 0) return;
      var v = g.P * q;
      if (v === correct) return;
      if (distractors.indexOf(v) >= 0) return;
      if (distractors.length < 3) distractors.push(v);
    });
    /* If CT is still unique, swap the weakest distractor for it */
    if (ctVal !== correct && distractors.indexOf(ctVal) < 0 && distractors.length >= 3) {
      distractors[2] = ctVal;
    }
    var s_p3 = shuffleOpts(
      ['$'+correct, '$'+distractors[0], '$'+distractors[1], '$'+distractors[2]],
      '$'+correct, rng);
    problems.push({
      title:'Ingreso total en Q*', studentChoice:null, pendingChoice:null,
      questionText:'Una empresa tiene CT = ' + g.a + 'Q² + ' + g.b + 'Q + ' + g.CF + ' y P = $' + g.P + '. ¿Cuál es el ingreso total en la cantidad que maximiza la ganancia?',
      fn:'Paso 1: halla Q* con P = CM.  Paso 2: IT = P · Q*',
      options:s_p3.opts, correctIdx:s_p3.correctIdx,
      hint:'Q* = ' + g.Qs + '. IT = P × Q*.',
      explanation:'Q* = ' + g.Qs + ' (de ' + g.P + ' = ' + (2*g.a) + 'Q + ' + g.b + '). IT = $' + g.P + ' × ' + g.Qs + ' = $' + g.IT + '.'
    });
    buildOneCard(problems[2], 2);
  })();

  /* P4 — Find CM at Q* (should equal P — tests understanding) */
  /* Guard: ensure all 4 options are distinct */
  (function() {
    var CM4_val = g3.P;
    var ctmRound = Math.round(g3.CTM_Q);
    /* Build 3 distractors distinct from correct and each other */
    var candidates = [CM4_val+3, CM4_val-2, CM4_val+5, CM4_val-4, CM4_val+7, CM4_val-6, ctmRound];
    var distractors = [];
    candidates.forEach(function(c) {
      if (c === CM4_val) return;
      if (c <= 0) return;
      if (distractors.indexOf(c) >= 0) return;
      if (distractors.length < 3) distractors.push(c);
    });
    var s_p4 = shuffleOpts(
      ['$'+CM4_val, '$'+distractors[0], '$'+distractors[1], '$'+distractors[2]],
      '$'+CM4_val, rng);
    problems.push({
      title:'Costo marginal en Q*', studentChoice:null, pendingChoice:null,
      questionText:'Una empresa tiene CT = ' + g3.a + 'Q² + ' + g3.b + 'Q + ' + g3.CF + ' y P = $' + g3.P + '. ¿Cuánto vale el costo marginal CM en la cantidad que maximiza la ganancia?',
      fn:'CM = dCT/dQ  |  Evalúa en Q*',
      options:s_p4.opts, correctIdx:s_p4.correctIdx,
      hint:'En el punto óptimo P = CM, así que la respuesta está en el enunciado.',
      explanation:'Por la condición P = CM, el costo marginal en Q* es exactamente igual al precio: CM = $' + CM4_val + '. Puedes verificar: CM = ' + (2*g3.a) + '(' + g3.Qs + ') + ' + g3.b + ' = $' + CM4_val + '.'
    });
    buildOneCard(problems[3], 3);
  })();

  /* P5 — Effect of price increase on Q* */
  /* Guard: ensure all 4 options (Q5_new, g4.Qs, Q5_new+2, Q5_new-2) are distinct */
  (function() {
    var P5_new = g4.P + Math.floor(rng()*3+2)*2;
    var Q5_new = Math.round((P5_new - g4.b) / (2*g4.a));
    var pi5_new = P5_new*Q5_new - g4.a*Q5_new*Q5_new - g4.b*Q5_new - g4.CF;
    /* Build 3 distractors distinct from Q5_new and each other */
    var candidates = [g4.Qs, Q5_new+2, Q5_new-2, Q5_new+3, Q5_new-3, Q5_new+1, Q5_new-1];
    var distractors = [];
    candidates.forEach(function(c) {
      if (c === Q5_new) return;
      if (c <= 0) return;
      if (distractors.indexOf(c) >= 0) return;
      if (distractors.length < 3) distractors.push(c);
    });
    var s_p5 = shuffleOpts(
      [String(Q5_new), String(distractors[0]), String(distractors[1]), String(distractors[2])],
      String(Q5_new), rng);
    problems.push({
      title:'Cambio en Q* ante variación de P', studentChoice:null, pendingChoice:null,
      questionText:'Una empresa tiene CT = ' + g4.a + 'Q² + ' + g4.b + 'Q + ' + g4.CF + '. El precio sube de $' + g4.P + ' a $' + P5_new + '. ¿Cuál es el nuevo Q* que maximiza la ganancia?',
      fn:'CM = dCT/dQ = ' + (2*g4.a) + 'Q + ' + g4.b + '  |  Nueva condición: ' + P5_new + ' = CM',
      options:s_p5.opts, correctIdx:s_p5.correctIdx,

      explanation:P5_new + ' = ' + (2*g4.a) + 'Q + ' + g4.b + ' → Q* = ' + Q5_new + '. El alza de precio lleva a la empresa a producir más. Nueva ganancia: $' + pi5_new + '.'
    });
    buildOneCard(problems[4], 4);
  })();

  /* ════════════════════════════════════════════
     CONCEPTO: CONDICIÓN DE CIERRE
  ════════════════════════════════════════════ */
  addSec(
    '<div class="stag">Concepto 3</div>' +
    '<h2>Condición de cierre: ¿cuándo produce y cuándo cierra?</h2>' +
    '<p>Encontrar Q* con P = CM maximiza la ganancia <em>dado que la empresa produce</em>. Pero a veces conviene no producir nada. La clave es comparar P con los costos medios.</p>' +

    '<div class="rules-grid" style="margin:1rem 0">' +
      '<div class="rcard" style="border-top-color:#4a9a6f">' +
        '<div class="rname" style="color:#4a9a6f">P &gt; CTM</div>' +

      '</div>' +
      '<div class="rcard" style="border-top-color:var(--gold)">' +
        '<div class="rname" style="color:var(--gold)">P = CTM</div>' +

      '</div>' +
      '<div class="rcard" style="border-top-color:#c9a84c">' +
        '<div class="rname">CVM &lt; P &lt; CTM</div>' +
        '<div class="rform" style="color:var(--bad)">π &lt; 0, produce</div>' +
