      '</div>' +
      '<div class="rcard" style="border-top-color:var(--bad)">' +
        '<div class="rname" style="color:var(--bad)">P &lt; CVM</div>' +
        '<div class="rform" style="color:var(--bad)">Cierra</div>' +
        '<div class="rnote">Cada unidad vendida profundiza la pérdida. La pérdida al cerrar (= CF) es menor. <em>Cierra en el corto plazo.</em></div>' +
      '</div>' +
    '</div>' +

    '<div class="callout">' +
      '<strong>¿Por qué CVM es el umbral de cierre?</strong>' +
      '<p>Imagina que ya pagaste la renta del local (costo fijo). Si cierras, pierdes esa renta de todas formas — eso es lo peor que puede pasarte: <strong>pérdida = CF</strong>.</p>' +
      '<p>Si produces, cada unidad te genera P de ingreso y te cuesta CV/Q = CVM. Mientras P ≥ CVM, cada unidad al menos cubre lo que cuesta producirla, y algo de ese ingreso va a pagar la renta. <strong>Produce aunque pierdas, porque pierdes menos que si cierras.</strong></p>' +
      '<p>Pero si P &lt; CVM, cada unidad vendida te hace perder <em>más</em> que si no la produjeras. Mejor cerrar y perder solo la renta.</p>' +
    '</div>' +

    '<div class="callout" style="margin-top:.8rem">' +
      '<strong>Cómo calcular CVM y CTM a partir de CT(Q):</strong>' +
      '<p style="font-family:IBM Plex Mono,monospace;font-size:.83rem;line-height:2;margin:.4rem 0">' +
        'Dado CT(Q) = aQ² + bQ + CF:<br>' +
        'CV(Q) = aQ² + bQ &nbsp;&nbsp;(CT menos el costo fijo)<br>' +
        'CVM = CV/Q = aQ + b &nbsp;&nbsp;(en el Q* que usas)<br>' +
        'CTM = CT/Q = aQ + b + CF/Q &nbsp;&nbsp;(en el Q* que usas)' +
      '</p>' +
    '</div>'
  );

  /* ════════════════════════════════════════════
     BLOQUE CONDICIÓN DE CIERRE — 5 PROBLEMAS
     Each gives full CT(Q), student derives Q* then CVM/CTM, then decides
  ════════════════════════════════════════════ */

  /* Helper: generate a scenario ensuring P falls in a specific zone */
  function genClose(rng, zone) {
    /* zone: 'profit' | 'loss_produce' | 'close' */
    var a  = Math.floor(rng()*2+1);
    var b  = Math.floor(rng()*4+2);
    var CF = Math.floor(rng()*20+10);
    var Qs = Math.floor(rng()*4+3);   /* Q*=3–6 */
    /* at Q*: CV = a·Qs²+b·Qs, CVM = a·Qs+b, CTM = CVM + CF/Qs */
    var CV  = a*Qs*Qs + b*Qs;
    var CVM = a*Qs + b;               /* = CV/Qs */
    var CTM = Math.ceil(CVM + CF/Qs); /* round up so integers work */
    var P, decision, decisionFn;
    if (zone === 'profit') {
      P = CTM + Math.floor(rng()*4+2);
      decision = 'Produce con ganancia (P &gt; CTM)';
      decisionFn = 'P = $' + P + ' &gt; CTM = $' + CTM + ' → ganancia positiva';
    } else if (zone === 'loss_produce') {
      P = CVM + 1;   /* CVM < P < CTM guaranteed since CTM > CVM always */
      if (P >= CTM) P = CVM + Math.max(1, Math.floor((CTM-CVM)/2));
      decision = 'Produce con pérdida en CP (CVM &lt; P &lt; CTM)';
      decisionFn = 'CVM=$'+CVM+' &lt; P=$'+P+' &lt; CTM=$'+CTM+' → produce en CP';
    } else {
      P = Math.max(1, CVM - Math.floor(rng()*2+1));
      decision = 'Cierra (P &lt; CVM)';
      decisionFn = 'P = $' + P + ' &lt; CVM = $' + CVM + ' → cierra';
    }
    /* Recalculate Q* with this P: Q* = (P-b)/(2a) — may differ from Qs, that's fine */
    var Qopt = Math.max(1, Math.round((P-b)/(2*a)));
    var CVopt = a*Qopt*Qopt + b*Qopt;
    var CTopt = CVopt + CF;
    var CVMopt = CVopt / Qopt;
    var CTMopt = CTopt / Qopt;
    return {a:a,b:b,CF:CF,P:P,Qopt:Qopt,CV:CVopt,CT:CTopt,
            CVM:CVMopt.toFixed(1),CTM:CTMopt.toFixed(1),
            decision:decision,decisionFn:decisionFn};
  }

  /* ── Closure problems: 5 varied questions ── */

  /* ---------- shared generator (returns consistent numbers) ---------- */
  function mkC(rng, zone) {
    var a  = Math.floor(rng()*2+1);              /* 1–2 */
    var b  = Math.floor(rng()*4+2);              /* 2–5 */
    var CF = Math.floor(rng()*24+6);             /* 6–29; kept small so CTM stays reasonable */
    /* Fix Q* first, derive P from CM=P so it's always integer */
    var Qs = Math.floor(rng()*4+3);              /* 3–6 */
    var CM_at_Qs = 2*a*Qs + b;                  /* CM = P at Q* */
    /* compute costs at Q* */
    var CV  = a*Qs*Qs + b*Qs;
    var CT  = CV + CF;
    var CVM_raw = CV / Qs;                       /* = a*Qs + b = CM_at_Qs - a*Qs, always integer */
    var CTM_raw = CT / Qs;
    /* Choose P based on zone */
    var P, dec, shortDec;
    if (zone === 'profit') {
      /* P > CTM: add 2–5 above CTM */
      P = Math.ceil(CTM_raw) + Math.floor(rng()*4+2);
      dec = 'Produce con ganancia (P &gt; CTM)';
      shortDec = 'ganancia';
    } else if (zone === 'loss_cp') {
      /* CVM < P < CTM. Use P = floor(CTM_raw) - 1 if gap exists, else adjust */
      var Pmid = Math.floor(CTM_raw);
      if (Pmid <= Math.ceil(CVM_raw)) Pmid = Math.ceil(CVM_raw) + 1;
      P = Pmid;
      dec = 'Produce con pérdida en CP (CVM &lt; P &lt; CTM)';
      shortDec = 'pérdida CP';
    } else { /* close */
      P = Math.max(1, Math.floor(CVM_raw) - Math.floor(rng()*2+1));
      dec = 'Cierra (P &lt; CVM)';
      shortDec = 'cierra';
    }
    /* Recompute Q* for this P (may shift) */
    var Qopt = Math.max(1, Math.round((P - b) / (2*a)));
    var CVo = a*Qopt*Qopt + b*Qopt;
    var CTo = CVo + CF;
    var CVMo = CVo / Qopt;
    var CTMo = CTo / Qopt;
    var pi  = P*Qopt - CTo;
    return {a:a, b:b, CF:CF, P:P, Qopt:Qopt,
            CV:CVo, CT:CTo, CVM:CVMo, CTM:CTMo, pi:pi,
            dec:dec, shortDec:shortDec};
  }

  var cz = ['profit','loss_cp','close','profit','loss_cp'];
  cz = shuffle(cz, rng);
  var gc0=mkC(rng,cz[0]), gc1=mkC(rng,cz[1]), gc2=mkC(rng,cz[2]),
      gc3=mkC(rng,cz[3]), gc4=mkC(rng,cz[4]);

  var closeOpts3 = [
    'Produce con ganancia (P &gt; CTM)',
    'Produce con pérdida en CP (CVM &lt; P &lt; CTM)',
    'Cierra (P &lt; CVM)'
  ];

  /* ── C6: Classic — what should the firm do? ── */
  (function() {
    var g = gc0;
    var sc = shuffleOpts(closeOpts3, g.dec, rng);
    var expl = 'Q* = ' + g.Qopt + ' (de ' + g.P + ' = ' + (2*g.a) + 'Q + ' + g.b + '). ' +
      'CV = $' + g.CV.toFixed(0) + ', CT = $' + g.CT.toFixed(0) + '. ' +
      'CVM = $' + g.CVM.toFixed(2) + ', CTM = $' + g.CTM.toFixed(2) + '. ' +
      'P = $' + g.P + ' → ' + g.dec + '.';
    problems.push({
      title:'Decisión de producción', studentChoice:null, pendingChoice:null,
      questionText:'Una empresa tiene CT = ' + g.a + 'Q² + ' + g.b + 'Q + ' + g.CF + ' y enfrenta P = $' + g.P + '. ¿Qué debe hacer?',
      fn:'Paso 1: Q* (P=CM). Paso 2: CVM=CV/Q*, CTM=CT/Q*. Paso 3: compara P con CVM y CTM.',
      options:sc.opts, correctIdx:sc.correctIdx,
      hint:'Deriva CM = ' + (2*g.a) + 'Q + ' + g.b + ', iguala a ' + g.P + ' para Q*. Luego calcula CVM y CTM en Q*.',
      explanation:expl
    });
    buildOneCard(problems[5], 5);
  })();

  /* ── C7: Given CVM and CTM explicitly — what is the profit/loss? ── */
  (function() {
    var g = gc1;
    var pi_str = g.pi >= 0 ? '$' + g.pi.toFixed(0) : '−$' + Math.abs(g.pi).toFixed(0);
    var w1_pi = (g.pi + Math.floor(rng()*6+3));
    var w2_pi = (g.pi - Math.floor(rng()*6+3));
    var w3_pi = -(g.CF);   /* common mistake: think profit = -CF when losing */
    var s = shuffleOpts(
      [pi_str,
       (w1_pi>=0?'$':'−$')+Math.abs(w1_pi).toFixed(0),
       (w2_pi>=0?'$':'−$')+Math.abs(w2_pi).toFixed(0),
       (w3_pi>=0?'$':'−$')+Math.abs(w3_pi).toFixed(0)],
      pi_str, rng);
    problems.push({
      title:'Ganancia o pérdida', studentChoice:null, pendingChoice:null,
      questionText:'Una empresa tiene CT = ' + g.a + 'Q² + ' + g.b + 'Q + ' + g.CF + ' y P = $' + g.P + '. ¿Cuánto gana o pierde al producir en Q*?',
      fn:'π = IT − CT = P·Q* − CT(Q*)',
      options:s.opts, correctIdx:s.correctIdx,
      hint:'Q* = ' + g.Qopt + '. IT = $' + (g.P*g.Qopt) + '. CT = $' + g.CT.toFixed(0) + '.',
      explanation:'Q* = ' + g.Qopt + '. IT = $' + g.P + '×' + g.Qopt + ' = $' + (g.P*g.Qopt) + '. CT = $' + g.CT.toFixed(0) + '. π = ' + pi_str + '. La empresa ' + (g.pi >= 0 ? 'obtiene ganancia.' : 'opera con pérdida, pero produce porque P > CVM ($' + g.CVM.toFixed(2) + ').')
    });
    buildOneCard(problems[6], 6);
  })();

  /* ── C8: Canvas — sketch AVC and ATC, identify the three zones ── */
  (function() {
    var g = gc2;
    /* Generate three clean price points for the canvas question */
    var Pclose  = Math.max(1, Math.floor(g.CVM) - 2);
    var Ploss   = Math.floor(g.CVM) + 1;
    if (Ploss >= Math.ceil(g.CTM)) Ploss = Math.ceil(g.CVM) + 1;
    var Pprofit = Math.ceil(g.CTM) + 3;
    var s = shuffleOpts(
      ['CVM = $' + g.CVM.toFixed(1) + ', CTM = $' + g.CTM.toFixed(1),
       'CVM = $' + (g.CVM+3).toFixed(1) + ', CTM = $' + (g.CTM-2).toFixed(1),
       'CVM = $' + (g.CVM-2).toFixed(1) + ', CTM = $' + (g.CTM+4).toFixed(1),
       'CVM = $' + g.CTM.toFixed(1) + ', CTM = $' + (g.CTM+5).toFixed(1)],
      'CVM = $' + g.CVM.toFixed(1) + ', CTM = $' + g.CTM.toFixed(1), rng);
    problems.push({
      title:'CVM y CTM en Q*', studentChoice:null, pendingChoice:null,
      questionText:'Una empresa tiene CT = ' + g.a + 'Q² + ' + g.b + 'Q + ' + g.CF + '. En la cantidad que maximiza la ganancia cuando P = $' + g.P + ', ¿cuáles son los valores de CVM y CTM?',
      fn:'CV = CT − CF  |  CVM = CV/Q*  |  CTM = CT/Q*',
      options:s.opts, correctIdx:s.correctIdx,
      hint:'Q* = ' + g.Qopt + '. CV = ' + g.a + '(' + g.Qopt + ')² + ' + g.b + '(' + g.Qopt + ') = $' + g.CV.toFixed(0) + '. CVM = CV/Q*. CTM = CT/Q*.',
      explanation:'Q* = ' + g.Qopt + '. CV = $' + g.CV.toFixed(0) + ', CT = $' + g.CT.toFixed(0) + '. CVM = ' + g.CV.toFixed(0) + '/' + g.Qopt + ' = $' + g.CVM.toFixed(1) + '. CTM = ' + g.CT.toFixed(0) + '/' + g.Qopt + ' = $' + g.CTM.toFixed(1) + '.'
    });
    buildOneCard(problems[7], 7);
  })();

  /* ── C9: Graphical — interactive canvas to sketch AVC & ATC curves and label zones ── */
  (function() {
    var g = gc3;
    /* We'll render an inline canvas widget for this problem card */
    /* Seeded params for drawing: CT = g.a*Q^2 + g.b*Q + g.CF */
    /* CVM(Q) = g.a*Q + g.b   (linear, rising from b) */
    /* CTM(Q) = g.a*Q + g.b + g.CF/Q  (U-shaped) */
    /* CTM min at Q_min = sqrt(CF/a), CTM_min = b + 2*sqrt(a*CF) */
    var Qmin_ctm = Math.round(Math.sqrt(g.CF / g.a));
    if (Qmin_ctm < 1) Qmin_ctm = 1;
    var CTM_min  = Math.round(g.a*Qmin_ctm + g.b + g.CF/Qmin_ctm);
    var CVM_at_Qmin = g.a*Qmin_ctm + g.b;  /* CVM at same Q */
    /* Three threshold prices */
    var P_close  = Math.max(1, CVM_at_Qmin - 2);
    var P_loss   = Math.round((CVM_at_Qmin + CTM_min) / 2);
    var P_profit = CTM_min + 4;
    /* Question: given P_loss, what zone? */
    var ans9 = 'Zona de pérdida: produce en CP (CVM &lt; P &lt; CTM)';
    var s9 = shuffleOpts(
      ['Zona de pérdida: produce en CP (CVM &lt; P &lt; CTM)',
       'Zona de ganancia: produce en LP (P &gt; CTM)',
       'Zona de cierre: no produce (P &lt; CVM)',
       'Punto de equilibrio de largo plazo (P = CTM mínimo)'],
      ans9, rng);
    /* Build a canvas explanation figure that students draw on + answer */
    var graphHTML =
      '<div style="background:var(--surface2);border-radius:8px;padding:.75rem;margin:.6rem 0">' +
        '<p style="font-size:.8rem;color:var(--text3);margin-bottom:.4rem">' +
          'CT = ' + g.a + 'Q² + ' + g.b + 'Q + ' + g.CF +
          ' &nbsp;|&nbsp; CVM = ' + g.a + 'Q + ' + g.b +
          ' &nbsp;|&nbsp; CTM = ' + g.a + 'Q + ' + g.b + ' + ' + g.CF + '/Q' +
        '</p>' +
        '<canvas id="cvGraph9" width="580" height="220" style="width:100%;border-radius:6px;background:#fff"></canvas>' +
      '</div>';
    problems.push({
      title:'Zonas de la curva de costos', studentChoice:null, pendingChoice:null,
      questionText:'Observa la gráfica de CVM y CTM para CT = ' + g.a + 'Q² + ' + g.b + 'Q + ' + g.CF + '. El precio de mercado es P = $' + P_loss + '. ¿En qué zona se encuentra la empresa?',
      fn:graphHTML,
      options:s9.opts, correctIdx:s9.correctIdx,
      hint:'Localiza $' + P_loss + ' en la gráfica. ¿Está la línea de precio por encima de CVM pero debajo de CTM?',
      explanation:'CVM(Q) = ' + g.a + 'Q + ' + g.b + ' → toca su mínimo en $' + g.b + ' cuando Q→0. CTM mínimo ≈ $' + CTM_min + ' en Q≈' + Qmin_ctm + '. Con P = $' + P_loss + ', CVM &lt; P &lt; CTM → la empresa produce con pérdida en el corto plazo.'
    });
    var idx9 = problems.length - 1;
    buildOneCard(problems[idx9], idx9);
    /* Draw the graph after card is in DOM */
    setTimeout(function() {
      var cv = document.getElementById('cvGraph9');
      if (!cv) return;
      var ctx = cv.getContext('2d');
      var W = cv.width, H = cv.height;
      var ox = 44, oy = 12, gw = W-60, gh = H-32;
      var maxQ = 12, maxP = Math.max(P_profit+6, CTM_min+8);
      function xp(q){ return ox + (q/maxQ)*gw; }
      function yp(v){ return oy + gh - (v/maxP)*gh; }
      ctx.clearRect(0,0,W,H);
      /* grid */
      ctx.strokeStyle='#eee'; ctx.lineWidth=0.7;
      for(var gi=1;gi<=5;gi++){ var gy=oy+(gi/5)*gh; ctx.beginPath();ctx.moveTo(ox,gy);ctx.lineTo(ox+gw,gy);ctx.stroke(); }
      /* axes */
      ctx.strokeStyle='#aaa'; ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox,oy+gh);ctx.lineTo(ox+gw+4,oy+gh);ctx.stroke();
      ctx.fillStyle='#777'; ctx.font='11px IBM Plex Mono';
      ctx.fillText('Q',ox+gw+6,oy+gh+4); ctx.fillText('$',ox-14,oy+5);
      /* CVM = g.a*Q + g.b  (linear) */
      ctx.strokeStyle='#c9a84c'; ctx.lineWidth=2.2; ctx.setLineDash([]);
      ctx.beginPath(); var fst=true;
      for(var q=0.5;q<=maxQ;q+=0.3){
        var v=g.a*q+g.b; if(v>maxP)break;
        if(fst){ctx.moveTo(xp(q),yp(v));fst=false;}else ctx.lineTo(xp(q),yp(v));
      } ctx.stroke();
      ctx.fillStyle='#c9a84c'; ctx.font='bold 10px IBM Plex Mono';
      ctx.fillText('CVM',ox+gw-44,yp(g.a*maxQ*0.85+g.b)-6);
      /* CTM = g.a*Q + g.b + g.CF/Q  (U-shape) */
      ctx.strokeStyle='#4a7c3f'; ctx.lineWidth=2.2; ctx.setLineDash([]);
      ctx.beginPath(); fst=true;
      for(var q=0.6;q<=maxQ;q+=0.2){
        var v=g.a*q+g.b+g.CF/q; if(v>maxP||v<0)continue;
        if(fst){ctx.moveTo(xp(q),yp(v));fst=false;}else ctx.lineTo(xp(q),yp(v));
      } ctx.stroke();
      ctx.fillStyle='#4a7c3f'; ctx.font='bold 10px IBM Plex Mono';
      ctx.fillText('CTM',xp(Qmin_ctm)+4,yp(CTM_min)-7);
      /* Shade zone: P_close to CVM (close zone) */
      /* P lines */
      [[P_close,'#8b2500','P cierra'],[P_loss,'#1d4e89','P pérdida'],[P_profit,'#4a9a6f','P ganancia']].forEach(function(pr){
        if(pr[0]<=0||pr[0]>maxP) return;
        ctx.strokeStyle=pr[1]; ctx.lineWidth=1.5; ctx.setLineDash([5,3]);
        ctx.beginPath();ctx.moveTo(ox,yp(pr[0]));ctx.lineTo(ox+gw,yp(pr[0]));ctx.stroke();
        ctx.fillStyle=pr[1]; ctx.font='10px IBM Plex Mono'; ctx.setLineDash([]);
        ctx.fillText('$'+pr[0]+' ('+pr[2]+')',ox+3,yp(pr[0])-4);
      });
      /* y labels */
      [5,10,15,20,25,30].forEach(function(v){
        if(v<=maxP){ctx.fillStyle='#bbb';ctx.font='9px IBM Plex Mono';ctx.fillText('$'+v,ox-26,yp(v)+3);}
      });
    }, 200);
  })();

  /* ── C10: Break-even: at what price does the firm break even (P = CTM min)? ── */
  (function() {
    var g = gc4;
    var Qmin = Math.round(Math.sqrt(g.CF / g.a));
    if (Qmin < 1) Qmin = 1;
    var CTMmin = Math.round(g.a*Qmin + g.b + g.CF/Qmin);
    var s = shuffleOpts(
      ['$' + CTMmin,
       '$' + (CTMmin + Math.floor(rng()*3+2)),
       '$' + Math.max(1, CTMmin - Math.floor(rng()*3+2)),
       '$' + Math.round(g.b + 2*Math.sqrt(g.a*g.CF) + 2)],
      '$' + CTMmin, rng);
    problems.push({
      title:'Precio de equilibrio', studentChoice:null, pendingChoice:null,
      questionText:'Una empresa tiene CT = ' + g.a + 'Q² + ' + g.b + 'Q + ' + g.CF + '. ¿A partir de qué precio la empresa deja de tener pérdidas (punto de equilibrio de largo plazo)?',
      fn:'CTM = CT/Q = ' + g.a + 'Q + ' + g.b + ' + ' + g.CF + '/Q  |  Minimiza CTM: dCTM/dQ = 0',
      options:s.opts, correctIdx:s.correctIdx,
      hint:'El equilibrio de LP ocurre donde CTM es mínimo. Deriva CTM respecto a Q, iguala a 0: ' + g.a + ' = ' + g.CF + '/Q² → Q = √(' + g.CF + '/' + g.a + ').',
      explanation:'CTM = ' + g.a + 'Q + ' + g.b + ' + ' + g.CF + '/Q. dCTM/dQ = ' + g.a + ' − ' + g.CF + '/Q² = 0 → Q_min = √(' + g.CF + '/' + g.a + ') ≈ ' + Qmin + '. CTM_min = ' + g.a + '×' + Qmin + ' + ' + g.b + ' + ' + g.CF + '/' + Qmin + ' = $' + CTMmin + '. En equilibrio LP: P = $' + CTMmin + '.'
    });
    buildOneCard(problems[9], 9);
  })();


}
</script>
</body>
