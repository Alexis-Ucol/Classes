<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACF y PACF — Series de Tiempo Financieras</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green-bg:#1a281a; --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;}

/* WELCOME */
#welcomeScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;}
.wcard{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:2.4rem 2rem;width:100%;max-width:460px;text-align:center;}
.wlogos{display:flex;justify-content:center;align-items:center;gap:1.4rem;margin-bottom:1.6rem;padding-bottom:1.6rem;border-bottom:1px solid var(--border);}
.wlogos img{height:50px;width:auto;object-fit:contain;}
.wlogsep{width:1px;height:40px;background:var(--border);flex-shrink:0;}
.wtitle{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.25rem;}
.wcourse{font-size:.78rem;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1.6rem;}
.flabel{display:block;font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem;text-align:left;}
.finput{width:100%;padding:.7rem .9rem;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.95rem;font-family:inherit;margin-bottom:.9rem;transition:border-color .18s;}
.finput:focus{outline:none;border-color:var(--green);}
.sbtn{width:100%;padding:.85rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .18s;}
.sbtn:hover{background:var(--green-dark);}
.serr{min-height:1.2rem;font-size:.82rem;color:var(--bad);margin-top:.4rem;}
.wfoot{margin-top:1rem;font-size:.75rem;color:var(--text3);}

/* LESSON */
#lessonScreen{display:none;}
.stickybar{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.55rem 1.2rem;display:flex;align-items:center;gap:.7rem;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hlogos{display:flex;gap:.5rem;align-items:center;}
.hlogos img{height:26px;width:auto;}
.hsep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.htitle{font-family:'Crimson Pro',serif;font-size:1rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.halexis{flex:1;display:flex;justify-content:center;align-items:center;}
.hchip{font-size:.7rem;background:var(--green-bg);color:var(--green-dark);padding:.2rem .65rem;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.tbtn{background:none;border:1px solid var(--border);border-radius:7px;padding:.28rem .55rem;cursor:pointer;font-size:.82rem;color:var(--text2);flex-shrink:0;}
.progbar{height:3px;background:var(--border);position:sticky;top:47px;z-index:99;}
.progfill{height:100%;background:var(--green);width:0%;transition:width .4s;}

/* CONTENT */
.lbody{max-width:760px;margin:0 auto;padding:2rem 1.2rem 4rem;}
.section{opacity:0;transform:translateY(16px);transition:opacity .48s,transform .48s;margin-bottom:2.8rem;}
.section.vis{opacity:1;transform:none;}
.stag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.45rem;}
.section h2{font-family:'Crimson Pro',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;}
.section p{color:var(--text2);margin-bottom:.8rem;}
.callout{background:var(--green-bg);border-left:4px solid var(--green);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.callout strong{color:var(--green-dark);}
.callout p{margin-bottom:0;}
.warn{background:var(--gold-bg);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin:1rem 0;}
.warn strong{color:var(--gold);}
.warn p{margin-bottom:0;}

/* DECISION TABLE */
.dtable{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.85rem;}
.dtable th{background:var(--green);color:#fff;padding:.6rem .8rem;text-align:left;}
.dtable td{padding:.6rem .8rem;border:1px solid var(--border);color:var(--text2);}
.dtable tr:nth-child(even) td{background:var(--surface2);}
.dtable .model{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--green-dark);}

/* STEP BOX */
.stepbox{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.3rem;margin:1rem 0;}
.stepbox .step-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--green);font-weight:600;margin-bottom:.6rem;}
.step-row{display:flex;gap:.7rem;align-items:flex-start;margin-bottom:.5rem;}
.step-num{background:var(--green);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;margin-top:.1rem;}
.step-body{flex:1;font-size:.87rem;color:var(--text2);}
.step-body code{font-family:'IBM Plex Mono',monospace;font-size:.82rem;background:var(--surface2);padding:.1rem .3rem;border-radius:3px;color:var(--green-dark);}

/* FORMULA BOX */
.formula{background:var(--surface2);border-radius:8px;padding:.75rem 1rem;margin:.8rem 0;font-family:'IBM Plex Mono',monospace;font-size:.9rem;color:var(--green-dark);text-align:center;}

/* EXAMPLE BOX */
.exbox{background:var(--green-bg);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.3rem;margin:1rem 0;}
.exbox .ex-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--green-dark);font-weight:600;margin-bottom:.6rem;}
.exbox p{color:var(--text);font-size:.88rem;margin-bottom:.5rem;}
.exbox .result{font-family:'IBM Plex Mono',monospace;font-size:.9rem;color:var(--green-dark);font-weight:600;margin-top:.4rem;}

/* PROBLEM CARDS */
.pcrd{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;margin-bottom:1.3rem;overflow:hidden;transition:border-color .25s;}
.pcrd.ok{border-color:var(--ok);}
.pcrd.bad{border-color:var(--bad);}
.phdr{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);}
.pnum{background:var(--green);color:#fff;width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;}
.ptitle{font-weight:600;font-size:.88rem;}
.pbody{padding:1rem;}
.pstmt{background:var(--surface2);border-radius:8px;padding:.85rem .95rem;margin-bottom:.9rem;font-size:.88rem;}
.pfn{display:block;font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:var(--green-dark);margin-top:.45rem;font-weight:500;}

/* WORK AREA TABS */
.wtabs{display:flex;gap:.35rem;margin-bottom:.5rem;flex-wrap:wrap;}
.wtab{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.26rem .68rem;font-size:.78rem;cursor:pointer;color:var(--text2);transition:all .14s;}
.wtab.active,.wtab:hover{background:var(--green);color:#fff;border-color:var(--green);}
.wpanel{display:none;}
.wpanel.active{display:block;}

/* CANVAS */
.cvwrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--surface);}
.dcanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:190px;}
.ctoolbar{display:flex;align-items:center;gap:.35rem;padding:.35rem .55rem;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap;}
.tbtn2{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--text2);}
.tbtn2.on{background:var(--green);color:#fff;border-color:var(--green);}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cdot.sel{border-color:var(--gold);}
.clrbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:.22rem .45rem;font-size:.72rem;cursor:pointer;color:var(--bad);margin-left:auto;}

/* TEXTAREA */
.wtextarea{width:100%;min-height:120px;padding:.65rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.8rem;resize:vertical;}
.wtextarea:focus{outline:none;border-color:var(--green);}

/* PHOTO */
.pzone{border:2px dashed var(--border);border-radius:8px;padding:1.4rem;text-align:center;cursor:pointer;position:relative;transition:border-color .18s;}
.pzone:hover{border-color:var(--green);}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pzicon{font-size:1.7rem;margin-bottom:.35rem;}
.pztxt{font-size:.8rem;color:var(--text3);}
.ppreview{display:none;width:100%;border-radius:8px;margin-top:.5rem;max-height:280px;object-fit:contain;}

/* HINT */
.hintbtn{background:none;border:1px solid var(--gold);color:var(--gold);border-radius:6px;padding:.28rem .65rem;font-size:.78rem;cursor:pointer;margin-bottom:.45rem;}
.hintbox{display:none;background:var(--gold-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:.65rem .85rem;font-size:.83rem;color:var(--text2);}
.hintbox.show{display:block;}

/* MC */
.mcopt.pending{border-color:var(--gold);background:var(--gold-bg);}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-bottom:.6rem;}
.mcopt{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:.86rem;transition:all .13s;user-select:none;}
.mcopt:hover:not(.dis){border-color:var(--green);background:var(--green-bg);}
.mcopt.dis{cursor:default;pointer-events:none;}
.mcopt.sc{border-color:var(--ok);background:var(--ok-bg);color:var(--ok);}
.mcopt.sw{border-color:var(--bad);background:var(--bad-bg);color:var(--bad);}
.mcopt.rc{border-color:var(--ok);background:var(--ok-bg);}
.mcfb{display:none;padding:.65rem .85rem;border-radius:8px;font-size:.83rem;margin-top:.25rem;}
.mcfb.show{display:block;}
.mcfb.fbok{background:var(--ok-bg);color:var(--ok);}
.mcfb.fbbad{background:var(--bad-bg);color:var(--bad);}

/* ASSESSMENT HEADER */
.assess-hdr{background:var(--green);color:#fff;border-radius:10px;padding:1rem 1.3rem;margin-bottom:1.5rem;}
.assess-hdr h3{font-family:'Crimson Pro',serif;font-size:1.3rem;margin-bottom:.2rem;}
.assess-hdr p{font-size:.83rem;opacity:.85;margin:0;}

/* RESULT */
.rpanel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;text-align:center;}
.dlbtn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:.8rem 1.8rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .18s;}
.dlbtn:hover{background:var(--green-dark);}
.dlbtn:disabled{opacity:.6;cursor:wait;}
</style>
</head>

/* ── RNG ── */
function seededRng(seed){var s=0;for(var i=0;i<seed.length;i++)s=(Math.imul(31,s)+seed.charCodeAt(i))|0;return function(){s=(s+0x9e3779b9)|0;var t=s^(s>>>16);t=Math.imul(t,0x21f0aaad);t^=(t>>>15);t=Math.imul(t,0x735a2d97);return((t^(t>>>15))>>>0)/4294967296;};}
function shuffleOpts(opts,correct,rng){var arr=opts.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}return{opts:arr,correctIdx:arr.indexOf(correct)};}

function initCanvas(canvas){
  var dpr=window.devicePixelRatio||1;var rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  ctx.strokeStyle='#2d5a27';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  var drawing=false,lx=0,ly=0;
  var tb=canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e){var r=canvas.getBoundingClientRect();var src=e.touches?e.touches[0]:e;return[src.clientX-r.left,src.clientY-r.top];}
  function onDown(e){e.preventDefault();drawing=true;var p=getPos(e);lx=p[0];ly=p[1];}
  function onMove(e){e.preventDefault();if(!drawing)return;var p=getPos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p[0],p[1]);ctx.stroke();lx=p[0];ly=p[1];}
  function onUp(){drawing=false;saveSession();}
  canvas.addEventListener('mousedown',onDown,{passive:false});canvas.addEventListener('mousemove',onMove,{passive:false});canvas.addEventListener('mouseup',onUp);canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});canvas.addEventListener('touchmove',onMove,{passive:false});canvas.addEventListener('touchend',onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn){btn.addEventListener('click',function(){tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';if(btn.classList.contains('bpen')){ctx.lineWidth=2;}if(btn.classList.contains('bmarker')){ctx.lineWidth=10;ctx.globalAlpha=0.45;}if(btn.classList.contains('beraser')){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=20;}});});
  tb.querySelectorAll('.cdot').forEach(function(dot){dot.addEventListener('click',function(){tb.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');});dot.classList.add('sel');ctx.strokeStyle=dot.dataset.color;ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';tb.querySelectorAll('.tbtn2').forEach(function(b){b.classList.remove('on');});tb.querySelector('.bpen').classList.add('on');});});
  tb.querySelector('.clrbtn').addEventListener('click',function(){ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);});
}

/* ── TWO-TAP MC ── */
function handleMC(probIdx,chosenIdx){
  var prob=problems[probIdx];if(prob.studentChoice!==null)return;
  var opts=document.querySelectorAll('#pc'+probIdx+' .mcopt');
  if(prob.pendingChoice===chosenIdx){
    prob.studentChoice=chosenIdx;prob.pendingChoice=null;
    var isOk=(chosenIdx===prob.correctIdx);
    opts.forEach(function(o){o.classList.add('dis');o.classList.remove('pending');});
    opts.forEach(function(o,i){if(i===prob.correctIdx)o.classList.add('rc');if(i===chosenIdx&&isOk)o.classList.add('sc');if(i===chosenIdx&&!isOk)o.classList.add('sw');});
    var fb=document.getElementById('fb'+probIdx);
    fb.innerHTML=(isOk?'<strong>✓ Correcto.</strong> ':'<strong>✗ Incorrecto.</strong> ')+prob.explanation;
    fb.className='mcfb show '+(isOk?'fbok':'fbbad');
    document.getElementById('pc'+probIdx).classList.add(isOk?'ok':'bad');
    if(isOk)correctCount++;answeredCount++;
    document.getElementById('progFill').style.width=(answeredCount/problems.length*100)+'%';
    saveSession();if(answeredCount===problems.length)setTimeout(showResults,700);return;
  }
  prob.pendingChoice=chosenIdx;opts.forEach(function(o){o.classList.remove('pending');});opts[chosenIdx].classList.add('pending');
}

  var prob=problems[probIdx];if(prob.studentChoice!==null)return;

  var fb=document.getElementById('fb'+probIdx);

}

var ACF_W=520, ACF_H=210;
var ACF_PL=48, ACF_PR=20, ACF_PT=28, ACF_PB=38;
var ACF_CW=ACF_W-ACF_PL-ACF_PR;
var ACF_CH=ACF_H-ACF_PT-ACF_PB;
var ACF_YMIN=-0.4, ACF_YMAX=1.0;
var ACF_NLAGS=8;
var ACF_THRESH=0.253; // 1.96/sqrt(60)
var ACF_BW=18;

function acfLx(k){return Math.round((ACF_PL + k*(ACF_CW/(ACF_NLAGS+1)))*10)/10;}
function acfVy(v){return Math.round((ACF_PT + (ACF_YMAX-v)/(ACF_YMAX-ACF_YMIN)*ACF_CH)*10)/10;}

function acfBarsSVG(vals, thresh, highlight){
  var y0=acfVy(0), yt=acfVy(thresh), yn=acfVy(-thresh);
  var out='';
  // y-axis ticks
  [-0.25,0,0.25,0.50,0.75,1.0].forEach(function(t){
    var y=acfVy(t);
    out+='<line x1="'+(ACF_PL-4)+'" x2="'+(ACF_PL)+'" y1="'+y+'" y2="'+y+'" stroke="#aaa" stroke-width="1"/>';
    out+='<text x="'+(ACF_PL-7)+'" y="'+(y+3.5)+'" text-anchor="end" font-size="9" fill="#888">'+t.toFixed(2)+'</text>';
    if(t===0||t===0.5||t===-0.25){
      out+='<line x1="'+ACF_PL+'" x2="'+(ACF_PL+ACF_CW)+'" y1="'+y+'" y2="'+y+'" stroke="#e0ddd8" stroke-width="0.5" stroke-dasharray="3,3"/>';
    }
  });
  // axes
  out+='<line x1="'+ACF_PL+'" x2="'+ACF_PL+'" y1="'+ACF_PT+'" y2="'+(ACF_PT+ACF_CH)+'" stroke="#ccc" stroke-width="1"/>';
  out+='<line x1="'+ACF_PL+'" x2="'+(ACF_PL+ACF_CW)+'" y1="'+y0+'" y2="'+y0+'" stroke="#999" stroke-width="1.2"/>';
  // threshold lines
  out+='<line x1="'+ACF_PL+'" x2="'+(ACF_PL+ACF_CW)+'" y1="'+yt+'" y2="'+yt+'" stroke="#2a6ebb" stroke-width="1.5" stroke-dasharray="6,4"/>';
  out+='<line x1="'+ACF_PL+'" x2="'+(ACF_PL+ACF_CW)+'" y1="'+yn+'" y2="'+yn+'" stroke="#2a6ebb" stroke-width="1.5" stroke-dasharray="6,4"/>';
  out+='<text x="'+(ACF_PL+ACF_CW+3)+'" y="'+(yt+4)+'" font-size="8.5" fill="#2a6ebb" font-weight="600">+'+thresh+'</text>';
  out+='<text x="'+(ACF_PL+ACF_CW+3)+'" y="'+(yn+4)+'" font-size="8.5" fill="#2a6ebb" font-weight="600">-'+thresh+'</text>';
  // bars
  vals.forEach(function(v,idx){
    var k=idx+1;
    var x=acfLx(k);
    var bx=x-ACF_BW/2;
    var ytop=acfVy(Math.max(v,0));
    var ybot=acfVy(Math.min(v,0));
    var bh=Math.max(Math.abs(ybot-ytop),1);
    var sig=Math.abs(v)>thresh;
    var fill=sig?'#2d5a27':'#b04020';
    out+='<rect x="'+bx+'" y="'+ytop+'" width="'+ACF_BW+'" height="'+bh+'" fill="'+fill+'" rx="2" opacity="0.85"/>';
    // lag label
    out+='<text x="'+x+'" y="'+(ACF_PT+ACF_CH+14)+'" text-anchor="middle" font-size="9" fill="#666">'+k+'</text>';
  });
  // x-axis label
  out+='<text x="'+(ACF_PL+ACF_CW/2)+'" y="'+(ACF_H-2)+'" text-anchor="middle" font-size="9" fill="#888">Rezago (k)</text>';
  return out;
}

function buildAnnotatedACF(){
  var vals=[0.70,0.49,0.343,0.240,0.168,0.118,0.082,0.058];
  var thresh=ACF_THRESH;
  var y0=acfVy(0), yt=acfVy(thresh);
  var svg='<svg viewBox="0 0 '+ACF_W+' '+ACF_H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:520px;border:1px solid var(--border);border-radius:8px;background:var(--surface);display:block;">'+

  svg+='</svg>';
  return svg;
}

function buildSmallACF(vals, thresh, sigColor){
  var W=240,H=178,PL=38,PR=10,PT=20,PB=28;

  function vy(v){return Math.round((PT+(YMAX-v)/(YMAX-YMIN)*CH)*10)/10;}
  var y0=vy(0), yt=vy(thresh), yn=vy(-thresh);
  var out='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;border:1px solid var(--border);border-radius:7px;background:var(--surface);display:block;">';
  // y-axis ticks

  out+='<line x1="'+PL+'" x2="'+(PL+CW)+'" y1="'+y0+'" y2="'+y0+'" stroke="#aaa" stroke-width="1"/>';
  // threshold lines
  out+='<line x1="'+PL+'" x2="'+(PL+CW)+'" y1="'+yt+'" y2="'+yt+'" stroke="#2a6ebb" stroke-width="1.5" stroke-dasharray="5,3"/>';
  out+='<line x1="'+PL+'" x2="'+(PL+CW)+'" y1="'+yn+'" y2="'+yn+'" stroke="#2a6ebb" stroke-width="1.5" stroke-dasharray="5,3"/>';
  // threshold label (right side, small)
  out+='<text x="'+(PL+CW+2)+'" y="'+(yt+3)+'" font-size="7.5" fill="#2a6ebb">+'+thresh+'</text>';
  out+='<text x="'+(PL+CW+2)+'" y="'+(yn+3)+'" font-size="7.5" fill="#2a6ebb">-'+thresh+'</text>';
  // bars
  vals.forEach(function(v,idx){
    var k=idx+1;
    var x=lx(k);
    var bx=x-BW/2;
    var ytop=vy(Math.max(v,0));
    var ybot=vy(Math.min(v,0));

    out+='<rect x="'+bx+'" y="'+ytop+'" width="'+BW+'" height="'+bh+'" fill="'+(sig?sigColor:'#b8b0a4')+'" rx="2" opacity="0.88"/>';
    out+='<text x="'+x+'" y="'+(PT+CH+12)+'" text-anchor="middle" font-size="8" fill="#888">'+k+'</text>';
  });
  out+='<text x="'+(PL+CW/2)+'" y="'+H+'" text-anchor="middle" font-size="8" fill="#aaa">Rezago k</text>';
  out+='</svg>';
  return out;
}

function buildLesson(rng){

  /* PROBLEMA 1 */
  var p1correct = 'La tendencia continúa: si ayer subió, hoy tiende a subir; si ayer bajó, hoy tiende a bajar.';
  var p1s = shuffleOpts([

  problems.push({title:'Autocorrelación positiva de rezago 1',questionText:'Los precios de AMXL muestran una autocorrelación de rezago 1 igual a +0.82. ¿Cuál es la interpretación correcta?',fn:'',hint:'Recuerda: el signo no describe si la serie sube o baja. Describe si la tendencia de ayer continúa o se invierte.',options:p1s.opts,correctIdx:p1s.correctIdx,explanation:'Autocorrelación positiva significa que la tendencia del día anterior tiende a continuar — no que la serie suba. Si venía subiendo, tiende a seguir subiendo. Si venía bajando, tiende a seguir bajando. El signo describe el patrón, no la dirección.',studentChoice:null,pendingChoice:null});

  /* ═══════════════════════════════════════════
     SECCIÓN 2: La gráfica ACF y las líneas azules
     ═══════════════════════════════════════════ */
  addSection(
    '<div class="stag">Concepto 2 de 5</div>'+
    '<h2>La gráfica ACF y las líneas azules</h2>'+

    '<p>Hasta ahora calculamos la autocorrelación en un rezago a la vez. La <strong>gráfica ACF</strong> muestra todos los rezagos juntos de una sola vez: en el eje horizontal están los rezagos k = 1, 2, 3, ..., y en el eje vertical el valor de la autocorrelación en cada uno. Cada barra es r<sub>k</sub> — la autocorrelación de la serie consigo misma k periodos atrás.</p>'+

    '<h2 style="margin-top:1.4rem;">Las líneas azules punteadas</h2>'+
    '<p>En toda gráfica ACF aparecen dos líneas azules horizontales punteadas, una por encima y una por debajo del cero. Su posición se calcula con esta fórmula:</p>'+
    '<div class="formula">Líneas azules = ±1.96 / √n</div>'+
    '<p>Donde <strong>n</strong> es el número de observaciones de la serie. Cuantas más observaciones, más angosto es el intervalo.</p>'+

    '<div class="exbox">'+
      '<div class="ex-label">Ejemplo guiado — calcular el umbral</div>'+
      '<p>Una serie tiene n = '+n1+' observaciones. ¿Dónde están las líneas azules?</p>'+
      '<p><strong>Paso 1:</strong> √'+n1+' = '+sqrtN1+'</p>'+
      '<p><strong>Paso 2:</strong> 1.96 ÷ '+sqrtN1+' = '+thresh1+'</p>'+
      '<p class="result">Las líneas azules están en ±'+thresh1+'.</p>'+
    '</div>'+

    '<h2 style="margin-top:1.4rem;">¿Qué significa cruzar la línea?</h2>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin:1rem 0;">'+
      '<div class="callout" style="margin:0;">'+
        '<strong>Barra que CRUZA la línea</strong>'+
        '<p style="margin-top:.4rem;">La autocorrelación en ese rezago es <em>estadísticamente significativa</em>. No es ruido — hay una relación real entre el valor de hoy y el de hace k días. Debes tomarla en cuenta.</p>'+
      '</div>'+
      '<div class="warn" style="margin:0;">'+
        '<strong>Barra que NO cruza la línea</strong>'+
        '<p style="margin-top:.4rem;">La autocorrelación en ese rezago podría explicarse por puro azar. No hay evidencia suficiente de que la relación sea real. Para efectos prácticos, trátala como cero.</p>'+
      '</div>'+
    '</div>'+
    '<p>Esto aplica en ambas direcciones: una barra puede cruzar la línea azul superior (autocorrelación positiva significativa) o la inferior (autocorrelación negativa significativa).</p>'+

    '<div class="warn" style="margin:1rem 0;">'+
      '<strong>El rezago 0 — ignóralo siempre:</strong>'+
      '<p style="margin-top:.3rem;">En R, la gráfica ACF siempre comienza con una barra gigante en k = 0 que vale exactamente 1.0. Eso es trivial: cualquier serie está perfectamente correlacionada <em>consigo misma</em> en el mismo instante. No dice nada útil. Empieza tu lectura siempre desde k = 1.</p>'+
    '</div>'+

    '<div class="exbox" style="margin:1rem 0;">'+
      '<div class="ex-label">Gráfica ACF anotada — rendimientos de AMXL (n = 60 observaciones)</div>'+
      '<p style="font-size:.84rem;color:var(--text2);margin-bottom:.7rem;">Ahora que sabes qué son las líneas y qué significa cruzarlas, observa la gráfica real. Identifica qué rezagos son significativos y cuáles no.</p>'+
      '<div style="overflow-x:auto;">'+buildAnnotatedACF()+'</div>'+
      '<p style="font-size:.82rem;color:var(--text2);margin-top:.7rem;">'+
        '<strong style="color:var(--green-dark);">Verde oscuro:</strong> barra significativa — cruza la línea azul. '+
        '<strong style="color:var(--bad);">Rojo oscuro:</strong> no significativa — queda dentro. '+
        'Solo los rezagos 1, 2 y 3 muestran autocorrelación real en esta serie.'+
      '</p>'+
    '</div>'+

    '<div style="margin-top:1.4rem;">'+
      '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.72rem;letter-spacing:.08em;color:var(--green);font-weight:600;text-transform:uppercase;margin-bottom:.6rem;">Patrones ACF — así se ven en la práctica</div>'+
      '<p style="font-size:.85rem;color:var(--text2);margin-bottom:.8rem;">Los tres patrones que encontrarás tienen formas muy distintas. Observa cada uno antes de aprender a interpretarlos formalmente en el siguiente concepto.</p>'+
      '<div class="mtabs" id="acfPatternTabs">'+
        '<button class="mtab active" onclick="switchACFPattern(\'ar\',this)">AR — decaimiento gradual</button>'+
        '<button class="mtab" onclick="switchACFPattern(\'ma\',this)">MA — corte abrupto</button>'+
        '<button class="mtab" onclick="switchACFPattern(\'wn\',this)">Ruido blanco</button>'+
      '</div>'+
      '<div id="acfPatternChart" style="overflow-x:auto;">'+buildSwitchableACF('ar')+'</div>'+
      '<div id="acfPatternDesc" style="margin-top:.6rem;font-size:.84rem;color:var(--text2);background:var(--surface2);border-radius:8px;padding:.7rem .9rem;">'+acfPatternDesc('ar')+'</div>'+
    '</div>'
  );

  /* PROBLEMA 2 */

    p2wrong3  = 'Solo es significativa si el rezago es k = 1.';
  } else {
    p2correct = 'No, la barra no es significativa: '+acfTest+' < '+thresh1+', no rebasa la línea azul.';
    p2wrong1  = 'Sí, '+acfTest+' rebasa la línea azul de ±'+thresh1+'.';

  /* ═══════════════════════════════════════════
     SECCIÓN 3: Patrones de la ACF
     ═══════════════════════════════════════════ */
  addSection(
    '<div class="stag">Concepto 3 de 5</div>'+
    '<h2>¿Qué forma tiene la ACF y qué nos dice?</h2>'+
    '<p>No basta con saber si hay autocorrelación. La <em>forma</em> del patrón de la ACF nos dice algo sobre qué tipo de modelo necesita la serie. Hay dos patrones fundamentales — y la diferencia entre ellos es visual e inmediata una vez que sabes qué buscar.</p>'+

    '<div class="exbox" style="margin:1rem 0;">'+
      '<div class="ex-label">Ejemplo guiado — los dos patrones lado a lado (n = 60, umbral = ±0.253)</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:.9rem;">'+

        '<div>'+
          '<div style="font-size:.75rem;font-weight:700;color:var(--green-dark);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;">CEMEX — ACF se corta</div>'+
          '<div style="overflow-x:auto;">'+buildSmallACF([0.62,0.45,0.03,-0.04,0.02,0.01,-0.03,0.02], 0.253, '#2d5a27')+'</div>'+
          '<div style="margin-top:.5rem;font-size:.82rem;color:var(--text2);">'+
            'Rezagos 1 y 2: significativos. Rezago 3 en adelante: todos dentro de las líneas. '+
            'La ACF <strong>se corta abruptamente</strong> después del rezago 2.'+
          '</div>'+
          '<div style="margin-top:.45rem;background:var(--green-bg);border-radius:6px;padding:.5rem .7rem;font-size:.82rem;">'+
            '→ Sugiere <strong>MA(2)</strong>. El número de barras significativas antes del corte = orden q.'+
          '</div>'+
        '</div>'+

        '<div>'+
          '<div style="font-size:.75rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem;">WALMEX — ACF se desvanece</div>'+
          '<div style="overflow-x:auto;">'+buildSmallACF([0.72,0.518,0.373,0.269,0.193,0.139,0.100,0.072], 0.253, '#8a6000')+'</div>'+
          '<div style="margin-top:.5rem;font-size:.82rem;color:var(--text2);">'+
            'Rezagos 1, 2, 3 y 4: significativos. Las barras disminuyen gradualmente, '+
            'sin un punto de corte claro.'+
          '</div>'+
          '<div style="margin-top:.45rem;background:var(--gold-bg);border-radius:6px;padding:.5rem .7rem;font-size:.82rem;">'+
            '→ Sugiere <strong>AR o ARMA</strong>. Para saber cuál, necesitamos la PACF.'+
          '</div>'+
        '</div>'+

      '</div>'+
      '<div style="background:var(--surface2);border-radius:8px;padding:.7rem .9rem;font-size:.83rem;color:var(--text2);">'+
        '<strong>La pregunta clave al mirar cualquier ACF:</strong> ¿Hay un punto donde las barras caen bruscamente dentro de las líneas y ya no salen? Si sí → se corta → MA. Si no, las barras van bajando suavemente → se desvanece → AR o ARMA.'+
      '</div>'+
    '</div>'+

    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-top:1rem;">'+
      '<div class="callout" style="margin:0;">'+
        '<strong>ACF se corta en rezago q</strong>'+
        '<p style="margin-top:.3rem;font-size:.85rem;">Exactamente q barras significativas, luego silencio total. El corte es abrupto — una barra que sobresale, la siguiente adentro.</p>'+
        '<p style="margin-top:.3rem;font-size:.85rem;"><strong>Modelo: MA(q)</strong></p>'+
      '</div>'+
      '<div class="warn" style="margin:0;">'+
        '<strong>ACF se desvanece</strong>'+
        '<p style="margin-top:.3rem;font-size:.85rem;">Las barras decrecen gradualmente. Pueden ser varias significativas seguidas, pero no hay un corte limpio — van bajando poco a poco.</p>'+
        '<p style="margin-top:.3rem;font-size:.85rem;"><strong>Modelo: AR o ARMA</strong> (necesita PACF)</p>'+
      '</div>'+
    '</div>'
  );

  /* PROBLEMA 3 */
  var p3correct = 'MA(1): la ACF se corta abruptamente después del primer rezago.';
  var p3s = shuffleOpts([
    p3correct,
    'AR(1): la ACF se corta abruptamente después del primer rezago.',
    'ARMA: ambas funciones ACF y PACF se desvanecen gradualmente.',
    'Ruido blanco: no hay ninguna barra significativa.'
  ], p3correct, rng);
  problems.push({title:'Identificar patrón ACF',questionText:'La ACF de una serie muestra: rezago 1 = 0.62 (significativo), rezago 2 = −0.04 (no significativo), rezagos 3 en adelante todos dentro de las líneas azules. ¿Qué tipo de proceso sugiere este patrón?',fn:'',hint:'Cuenta cuántos rezagos son significativos antes del corte. Ese número es el orden del proceso MA.',options:p3s.opts,correctIdx:p3s.correctIdx,explanation:'Cuando la ACF tiene exactamente una barra significativa y luego se corta, indica un proceso MA(1). El número de barras significativas antes del corte es el orden "q" del proceso MA.',studentChoice:null,pendingChoice:null});
  buildOneCard(problems[problems.length-1],problems.length-1);

  /* ═══════════════════════════════════════════
     SECCIÓN 4: La PACF y la tabla de decisión
     ═══════════════════════════════════════════ */
  addSection(
    '<div class="stag">Concepto 4 de 5</div>'+
    '<h2>La PACF y la tabla de decisión</h2>'+
    '<p>La ACF sola no siempre permite distinguir entre un proceso AR y uno ARMA. Para eso existe la <strong>función de autocorrelación parcial (PACF)</strong>.</p>'+
    '<div class="callout"><strong>¿Qué mide la PACF?</strong><p>La autocorrelación parcial en el rezago <em>k</em> mide la relación entre <em>t</em> y <em>t−k</em> <em>eliminando</em> el efecto de todos los rezagos intermedios (t−1, t−2, ..., t−k+1). Es como preguntar: "¿Hay relación directa entre hoy y hace k días, más allá de lo que ya explican los días intermedios?"</p></div>'+
    '<p>Al combinar los patrones de ACF y PACF, podemos identificar el tipo de modelo con mucha mayor precisión. Esta es la <strong>tabla de decisión</strong>:</p>'+
    '<table class="dtable">'+
      '<thead><tr><th>ACF</th><th>PACF</th><th>Modelo sugerido</th></tr></thead>'+
      '<tbody>'+
        '<tr><td>Se desvanece (decrece gradualmente)</td><td>Se corta en rezago <em>p</em></td><td class="model">AR(p)</td></tr>'+
        '<tr><td>Se corta en rezago <em>q</em></td><td>Se desvanece</td><td class="model">MA(q)</td></tr>'+
        '<tr><td>Se desvanece</td><td>Se desvanece</td><td class="model">ARMA(p,q)</td></tr>'+
        '<tr><td>Ninguna barra significativa</td><td>Ninguna barra significativa</td><td class="model">Ruido blanco</td></tr>'+
      '</tbody>'+
    '</table>'+
    '<div class="warn"><strong>La zona gris de ARMA:</strong><p>Cuando ambas funciones se desvanecen, el modelo es ARMA pero no podemos determinar p y q solo visualmente. En ese caso, usaremos <code>auto.arima()</code> como herramienta de apoyo en la siguiente sesión.</p></div>'+
    '<div class="exbox">'+
      '<div class="ex-label">Ejemplo guiado — aplicar la tabla</div>'+
      '<p>Serie: rendimientos de AMXL. ACF: decae exponencialmente desde rezago 1, nunca hay un corte claro. PACF: rezago 1 significativo (0.61), rezago 2 significativo (0.29), rezago 3 dentro de las líneas azules.</p>'+
      '<p><strong>Paso 1:</strong> ACF se desvanece → no es MA puro.</p>'+
      '<p><strong>Paso 2:</strong> PACF se corta después del rezago 2 → sugiere AR de orden 2.</p>'+
      '<p class="result">Conclusión: AR(2). La tabla nos da la respuesta directamente.</p>'+
    '</div>'+
    '<div class="callout" style="margin-top:1rem;">'+
      '<strong>Nota importante para la práctica real:</strong>'+
      '<p style="margin-top:.4rem;">Los ejercicios de esta guía usan series simples para enseñar a leer los patrones. En semanas futuras, cuando trabajen con datos reales, la ACF y PACF <em>nunca</em> se aplican sobre los precios directamente — los precios no son estacionarios. Primero se transforma la serie (típicamente con log-rendimientos: <code>diff(log(precio))</code>), se verifica que el resultado sea estacionario, y <em>después</em> se corren ACF y PACF sobre esa serie transformada. La tabla de decisión aplica exactamente igual — solo cambia el dato de entrada.</p>'+
    '</div>'
  );

  /* PROBLEMA 4 */
  var p4correct = 'AR(2): la PACF se corta en el rezago 2 mientras la ACF se desvanece.';
  var p4s = shuffleOpts([
    p4correct,
    'MA(2): la ACF se corta en el rezago 2 mientras la PACF se desvanece.',
    'ARMA(2,2): ambas funciones se desvanecen gradualmente.',
    'AR(1): la PACF tiene una sola barra significativa antes de cortarse.'
  ], p4correct, rng);

  doc.setFillColor(74,124,63);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');
  doc.rect(M,166,TW,8,'F');doc.text('RESUMEN DE PROBLEMAS',M+4,172);
  var sy=178;
  problems.forEach(function(prob,i){
    var ok=document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255,ok?240:232,ok?232:228);doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?45:139,ok?106:37,ok?79:0);doc.circle(M+6,sy+5,2.5,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');doc.text(ok?'V':'X',M+4.5,sy+6.5);
    doc.setTextColor(26,26,22);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('Problema '+(i+1)+': '+pdfText(prob.title),M+12,sy+6.5);
    doc.setTextColor(ok?45:139,ok?106:37,ok?79:0);doc.text(ok?'Correcto':'Incorrecto',PW-M-24,sy+6.5);
    sy+=12;
  });

  // per-problem pages
  for(var i=0;i<problems.length;i++){
    var prob=problems[i];doc.addPage();var wy=0;
    doc.setFillColor(26,26,22);doc.rect(0,0,PW,20,'F');
    doc.setFillColor(201,168,76);doc.rect(0,0,PW,3,'F');
    doc.setTextColor(201,168,76);doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text('SERIES DE TIEMPO FINANCIERAS  ·  ACF y PACF',M,10);
    doc.setTextColor(232,228,216);doc.setFontSize(10.5);doc.setFont('helvetica','bold');doc.text('Problema '+(i+1)+' de '+total+'  —  '+pdfText(prob.title),M,17);
    wy=25;
    var qRaw=pdfText(prob.questionText);var qFn=pdfText(prob.fn||'');
    doc.setFontSize(8.5);doc.setFont('helvetica','normal');var qLines=doc.splitTextToSize(qRaw,TW-10);
    doc.setFontSize(7.5);doc.setFont('courier','bold');var fnLines=qFn?doc.splitTextToSize(qFn,TW-14):[];
    var qBoxH=8+qLines.length*5+(qFn?fnLines.length*4.8+5:0)+4;
    doc.setFillColor(240,237,230);doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(74,124,63);doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.text('PREGUNTA',M+4,wy+6);
    doc.setTextColor(26,26,22);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
    var qy=wy+12;qLines.forEach(function(ln,li){doc.text(ln,M+4,qy+li*5);});
    if(qFn){var fny=qy+qLines.length*5+3;doc.setTextColor(45,90,35);doc.setFontSize(7.5);doc.setFont('courier','bold');fnLines.forEach(function(ln,li){doc.text(ln,M+4,fny+li*4.8);});}
    wy+=qBoxH+4;
    var isOk=document.getElementById('pc'+i).classList.contains('ok');
    var chosen=prob.studentChoice!=null?pdfText(prob.options[prob.studentChoice]||'-'):'-';
    var corr=pdfText(prob.options[prob.correctIdx]||'');var expRaw=pdfText(prob.explanation||'');
    var textIndent=M+14;var textW=TW-18;
    doc.setFontSize(8.5);doc.setFont('helvetica','bold');var chLines=doc.splitTextToSize('Respuesta: '+chosen,textW);
    doc.setFontSize(8);doc.setFont('helvetica','normal');var coLines=doc.splitTextToSize('Correcta: '+corr,textW);
    doc.setFontSize(7.5);doc.setFont('helvetica','normal');var exLines=doc.splitTextToSize('Explicacion: '+expRaw,textW);
    var lineH_ch=5.0,lineH_co=4.8,lineH_ex=4.6;
    var contentH=chLines.length*lineH_ch+coLines.length*lineH_co+exLines.length*lineH_ex;
    var ansBoxH=contentH+14;
    if(wy+ansBoxH>PH-18&&wy>40){doc.addPage();wy=20;}
    doc.setFillColor(isOk?232:255,isOk?240:232,isOk?232:228);doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?45:139,isOk?106:37,isOk?79:0);doc.circle(M+7,wy+8,3.5,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(isOk?'OK':'X',M+4.2,wy+10.5);
    var ay=wy+7;
    doc.setTextColor(26,26,22);doc.setFontSize(8.5);doc.setFont('helvetica','bold');chLines.forEach(function(ln){if(ay>PH-14){doc.addPage();ay=20;}doc.text(ln,textIndent,ay);ay+=lineH_ch;});ay+=2;
    doc.setTextColor(45,106,79);doc.setFontSize(8);doc.setFont('helvetica','normal');coLines.forEach(function(ln){if(ay>PH-14){doc.addPage();ay=20;}doc.text(ln,textIndent,ay);ay+=lineH_co;});ay+=2;
    doc.setTextColor(90,85,80);doc.setFontSize(7.5);doc.setFont('helvetica','normal');exLines.forEach(function(ln){if(ay>PH-14){doc.addPage();ay=20;}doc.text(ln,textIndent,ay);ay+=lineH_ex;});
    wy=ay+6;
    doc.setFillColor(74,124,63);doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F');doc.text('TRABAJO DEL ESTUDIANTE',M+4,wy+5.5);wy+=11;
    var dc=document.getElementById('dc'+i);
    if(dc){try{var imgD=dc.toDataURL('image/png');var ar=dc.height/dc.width;var iw=TW;var ih=Math.min(iw*ar,68);doc.addImage(imgD,'PNG',M,wy,iw,ih);wy+=ih+4;}catch(e){}}
    var ta=document.getElementById('ta'+i);
    if(ta&&ta.value.trim()){if(wy>PH-30){doc.addPage();wy=20;}doc.setTextColor(26,26,22);doc.setFontSize(8);doc.setFont('courier','normal');var taLines=doc.splitTextToSize(ta.value,TW);taLines.slice(0,16).forEach(function(ln){if(wy>PH-15){doc.addPage();wy=20;}doc.text(ln,M,wy);wy+=5;});wy+=2;}
    var pp=document.getElementById('pp'+i);
    if(pp&&pp.src&&pp.src.indexOf('data:')===0){if(wy>PH-55){doc.addPage();wy=20;}try{doc.addImage(pp.src,'JPEG',M,wy,TW,68);wy+=72;}catch(e){}}
  }
  var pages=doc.internal.getNumberOfPages();
  for(var p=1;p<=pages;p++){doc.setPage(p);doc.setFillColor(201,168,76);doc.rect(0,PH-3,PW,3,'F');doc.setTextColor(130,120,100);doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.text(name+'  ·  '+group+'  ·  Codigo: '+code+'  ·  Pagina '+p+'/'+pages,PW/2,PH-5,{align:'center'});}
  doc.save('ACF_PACF_'+name.replace(/\s+/g,'_')+'_'+group.replace(/\s+/g,'_')+'.pdf');
  btn.innerHTML='⬇ &nbsp;Descargar resultado PDF';btn.disabled=false;
}
</script>
</body>
</html>
