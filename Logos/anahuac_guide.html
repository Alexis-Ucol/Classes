<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecuaciones de Primer Grado — Secundaria Anáhuac Colima</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — Anáhuac palette ── */
:root {
  --blue:       #1a4a8a;
  --blue-dark:  #0f2d5e;
  --blue-bg:    #e8eef7;
  --orange:     #e07b1a;
  --orange-bg:  #fdf3e7;
  --bg:         #f5f7fa;
  --surface:    #ffffff;
  --surface2:   #edf0f5;
  --border:     #d4d9e3;
  --text:       #141820;
  --text2:      #3a4050;
  --text3:      #6a7080;
  --ok:         #1a6a4a;
  --ok-bg:      rgba(26,106,74,.10);
  --bad:        #b03010;
  --bad-bg:     rgba(176,48,16,.08);
  --shadow:     0 4px 24px rgba(26,74,138,.13);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --blue-bg:#1a2040; --orange-bg:#281e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--orange); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:.8rem; padding-bottom:.8rem; border-bottom:1px solid var(--border); }
.wlogos img { height:110px; width:auto; object-fit:contain; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; color:var(--blue-dark); }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--blue); }
.sbtn { width:100%; padding:.85rem; background:var(--blue); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--blue-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hchip { font-size:.7rem; background:var(--blue-bg); color:var(--blue-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--blue); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--orange); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--blue-bg); border-left:4px solid var(--blue); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--blue-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--blue); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--blue-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--blue); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--blue-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--blue); color:#fff; border-color:var(--blue); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--orange); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--blue); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--blue); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--orange); color:var(--orange); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--orange-bg); border-left:3px solid var(--orange); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; -webkit-user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--blue); background:var(--blue-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--blue); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--blue-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── STEP BOX ── */
.stepbox { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.2rem; margin:.9rem 0; }
.stepbox .step { display:flex; gap:.8rem; margin-bottom:.6rem; align-items:flex-start; }
.stepbox .step:last-child { margin-bottom:0; }
.stepnum { background:var(--blue); color:#fff; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; flex-shrink:0; margin-top:.15rem; }
.steptext { font-size:.86rem; color:var(--text2); }
.mono { font-family:'IBM Plex Mono',monospace; font-size:.82rem; color:var(--blue-dark); font-weight:500; }
</style>
</head>

<script>
var studentData   = {};
var problems      = [];
var answeredCount = 0;
var correctCount  = 0;

function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}

function hashName(s) {
  var h = 0;
  for (var i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return Math.abs(h);
}

function startLesson() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var err   = document.getElementById('startErr');
  if (!name || !group) { err.textContent = 'Por favor completa ambos campos.'; return; }
  err.textContent = '';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  var seed = hashName(name + group);
  var rng = (function(s) {
    return function() {
      s = (s * 1664525 + 1013904223) & 0xffffffff;
      return (s >>> 0) / 4294967296;
    };
  })(seed);
  buildLesson(rng);
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

function initCanvas(canvas) {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#1a4a8a';
  ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) { var r = canvas.getBoundingClientRect(); var src = e.touches ? e.touches[0] : e; return [src.clientX - r.left, src.clientY - r.top]; }
  function onDown(e) { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e) { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp() { drawing = false; }
  canvas.addEventListener('mousedown',  onDown, {passive:false});
  canvas.addEventListener('mousemove',  onMove, {passive:false});
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, {passive:false});
  canvas.addEventListener('touchmove',  onMove, {passive:false});
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

function switchTab(idx, panel, btn) {
  var prefix = 'wp_' + idx + '_';
  document.querySelectorAll('[id^="' + prefix + '"]').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById(prefix + panel).classList.add('active');
  btn.closest('.wtabs').querySelectorAll('.wtab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

function handlePhoto(idx, input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('pp' + idx);
    img.src = e.target.result; img.style.display = 'block';
    document.getElementById('pz' + idx).style.opacity = '0.4';
  };
  reader.readAsDataURL(input.files[0]);
}

function toggleHint(idx) {
  document.getElementById('hint' + idx).classList.toggle('show');
}

function showResults() {
  var rb = document.getElementById('s_results');
  if (!rb) return;
  rb.style.display = 'block';
  setTimeout(function() { rb.classList.add('vis'); rb.scrollIntoView({behavior:'smooth', block:'center'}); }, 50);
}

function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  prob.studentChoice = chosenIdx;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  opts.forEach(function(o) { o.classList.add('dis'); });
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

function buildLesson(rng) {
  var body = document.getElementById('lessonBody');

  // ── SECTION 1: Concepto ──
  var sec1 = document.createElement('div');
  sec1.className = 'section';
  sec1.innerHTML =
    '<div class="stag">Concepto</div>' +
    '<h2>¿Qué es una ecuación de primer grado?</h2>' +
    '<p>Una <strong>ecuación de primer grado</strong> (también llamada ecuación lineal) es una igualdad matemática en la que la incógnita —normalmente representada como <span class="mono">x</span>— aparece con exponente 1. Su forma general es:</p>' +
    '<div class="callout"><strong class="mono">ax + b = c</strong><p>donde <em>a</em>, <em>b</em> y <em>c</em> son números conocidos, y <em>x</em> es el valor que buscamos.</p></div>' +
    '<p>El objetivo es <strong>despejar x</strong>: aislarla en un lado de la ecuación realizando las mismas operaciones en ambos lados.</p>' +
    '<div class="rules-grid">' +
      '<div class="rcard"><div class="rname">Regla de suma</div><div class="rform">Si x − b = c → x = c + b</div><div class="rnote">Suma el mismo número a ambos lados.</div></div>' +
      '<div class="rcard"><div class="rname">Regla de división</div><div class="rform">Si ax = c → x = c ÷ a</div><div class="rnote">Divide ambos lados entre el coeficiente.</div></div>' +
    '</div>' +
    '<p style="margin-top:.8rem"><strong>Ejemplo resuelto:</strong> Resuelve <span class="mono">3x + 5 = 14</span></p>' +
    '<div class="stepbox">' +
      '<div class="step"><div class="stepnum">1</div><div class="steptext">Resta 5 a ambos lados: <span class="mono">3x = 14 − 5 = 9</span></div></div>' +
      '<div class="step"><div class="stepnum">2</div><div class="steptext">Divide entre 3: <span class="mono">x = 9 ÷ 3 = 3</span></div></div>' +
      '<div class="step"><div class="stepnum">3</div><div class="steptext">Verifica: <span class="mono">3(3) + 5 = 9 + 5 = 14 ✓</span></div></div>' +
    '</div>';
  body.appendChild(sec1);

  // ── PROBLEM 1 ──
  var a = Math.floor(rng() * 4) + 2;        // coeficiente 2–5
  var x = Math.floor(rng() * 8) + 2;        // solución 2–9
  var b = Math.floor(rng() * 10) + 1;       // término independiente 1–10
  var c = a * x + b;                        // resultado

  var correct = 'x = ' + x;
  var wrong1  = 'x = ' + (x + 1);
  var wrong2  = 'x = ' + (x - 1);
  var wrong3  = 'x = ' + Math.floor(c / a);

  // deduplicate wrong answers
  var pool = [wrong1, wrong2, wrong3].filter(function(w) { return w !== correct; });
  while (pool.length < 3) { pool.push('x = ' + (x + pool.length + 2)); }
  pool = pool.slice(0, 3);

  var shuffled = shuffleOpts([correct, pool[0], pool[1], pool[2]], correct, rng);

  problems.push({
    title: 'Resuelve la ecuación',
    questionText: 'Resuelve la siguiente ecuación para encontrar el valor de <strong>x</strong>.',
    fn: a + 'x + ' + b + ' = ' + c,
    options: shuffled.opts,
    correctIdx: shuffled.correctIdx,
    explanation: 'Resta ' + b + ' a ambos lados: ' + a + 'x = ' + (c - b) + '. Luego divide entre ' + a + ': x = ' + x + '.',
    hint: 'Primero pasa el número ' + b + ' al otro lado restando. Después divide el coeficiente de x.',
    studentChoice: null
  });
  buildOneCard(problems[problems.length - 1], problems.length - 1);
}

  doc.setFillColor(26,74,138);  doc.rect(0,4,PW,56,'F');

  doc.text(new Date().toLocaleString('es-MX', {dateStyle:'long', timeStyle:'short'}), M, 52);
  doc.setFillColor(224,123,26); doc.rect(0,60,PW,2,'F');

  doc.setFillColor(237,240,245); doc.roundedRect(M,68,TW,32,3,3,'F');

  doc.text('ALUMNO', M+4, 77); doc.text('GRUPO', 130, 77);
  doc.setTextColor(20,24,32); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text(name, M+4, 86); doc.text(group, 130, 86);

  var sc = pct>=70?[26,106,74]:pct>=50?[224,123,26]:[176,48,16];
  doc.setFillColor(255,255,255); doc.roundedRect(M,110,TW,48,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,110,TW,48,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(42); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 143, {align:'center'});
  doc.setTextColor(130,140,160); doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correcta(s) de '+total+' pregunta(s)', PW/2, 153, {align:'center'});

  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(224,123,26); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,140,160); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+' · '+group+'  ·  Página '+p+'/'+pages, PW/2, PH-5, {align:'center'});
  }

  doc.save('EcuacionesPrimerGrado_' + name.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF';
  btn.disabled = false;
}
