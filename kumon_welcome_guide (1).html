<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía de Aprendizaje — Kumon</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — Kumon palette ── */
:root {
  --sky:        #5BC8F5;
  --sky-dark:   #1aa8e0;
  --sky-bg:     #e8f7fd;
  --black:      #1a1a1a;
  --black-soft: #2e2e2e;
  --bg:         #f0faff;
  --surface:    #ffffff;
  --surface2:   #e8f7fd;
  --border:     #b8e6f8;
  --text:       #1a1a1a;
  --text2:      #3a3a3a;
  --text3:      #6a7a80;
  --ok:         #1a8a5a;
  --ok-bg:      rgba(26,138,90,.10);
  --bad:        #c03020;
  --bad-bg:     rgba(192,48,32,.08);
  --shadow:     0 4px 28px rgba(91,200,245,.22);
  --accent:     #1a1a1a;
  --accent-bg:  #1a1a1a;
}
[data-theme="dark"] {
  --bg:#0e1a20; --surface:#152028; --surface2:#1c2c38;
  --border:#2a4050; --text:#e8f4fa; --text2:#a0bac8; --text3:#607888;
  --sky-bg:#0e2438; --black:#e8f4fa; --black-soft:#c0d8e8;
  --ok:#3aaa7a; --ok-bg:rgba(58,170,122,.12);
  --bad:#d05040; --bad-bg:rgba(208,80,64,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; background: linear-gradient(160deg, #e0f6ff 0%, #f0faff 60%, #fff 100%); }
.wcard { background:var(--surface); border-radius:20px; box-shadow:var(--shadow); padding:2.6rem 2.2rem; width:100%; max-width:460px; text-align:center; border-top:5px solid var(--sky); }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1rem; padding-bottom:.9rem; border-bottom:1px solid var(--border); }
.kumon-logo img { height:70px; width:auto; object-fit:contain; }
.wtitle { font-family:'Nunito',sans-serif; font-size:1.7rem; font-weight:800; margin-bottom:.25rem; color:var(--black); letter-spacing:-.01em; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; margin-bottom:1.6rem; font-weight:600; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.07em; margin-bottom:.3rem; text-align:left; font-weight:700; }
.finput { width:100%; padding:.72rem .95rem; border:2px solid var(--border); border-radius:10px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; font-weight:600; }
.finput:focus { outline:none; border-color:var(--sky); }
.sbtn { width:100%; padding:.88rem; background:var(--sky); color:var(--black); border:none; border-radius:12px; font-size:1rem; font-weight:800; cursor:pointer; transition:background .18s, transform .12s; letter-spacing:.02em; }
.sbtn:hover { background:var(--sky-dark); color:#fff; transform:translateY(-1px); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; font-weight:600; }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 10px rgba(91,200,245,.18); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogo-mini { background:#5BC8F5; border-radius:7px; padding:.18rem .55rem; display:flex; align-items:center; gap:.18rem; }
.hlogo-mini span { font-family:'Nunito',sans-serif; font-size:.82rem; font-weight:900; color:#1a1a1a; letter-spacing:.05em; }
.hlogo-face { width:14px; height:14px; border-radius:50%; border:1.8px solid #1a1a1a; position:relative; flex-shrink:0; }
.hlogo-face::before { content:''; position:absolute; bottom:2px; left:50%; transform:translateX(-50%); width:6px; height:3px; border-bottom:1.5px solid #1a1a1a; border-radius:0 0 4px 4px; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hchip { font-size:.7rem; background:var(--sky-bg); color:var(--sky-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; font-weight:700; border:1px solid var(--border); }
.tbtn { background:none; border:1.5px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; font-weight:600; }
.progbar { height:4px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--sky); width:0%; transition:width .4s; border-radius:0 2px 2px 0; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.13em; text-transform:uppercase; color:var(--sky-dark); font-weight:800; margin-bottom:.45rem; }
.section h2 { font-family:'Nunito',sans-serif; font-size:1.65rem; font-weight:800; margin-bottom:.7rem; color:var(--black); }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--sky-bg); border-left:4px solid var(--sky); border-radius:0 12px 12px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--sky-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:.9rem; border-top:3px solid var(--sky); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; font-weight:700; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--sky-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:2px solid var(--border); border-radius:14px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--sky-bg); border-bottom:1px solid var(--border); }
.pnum { background:var(--sky); color:var(--black); width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:900; flex-shrink:0; }
.ptitle { font-weight:700; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:10px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--sky-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1.5px solid var(--border); border-radius:7px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; font-weight:700; }
.wtab.active, .wtab:hover { background:var(--sky); color:var(--black); border-color:var(--sky); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1.5px solid var(--border); border-radius:10px; overflow:hidden; background:#fff; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); font-weight:600; }
.tbtn2.on { background:var(--sky); color:var(--black); border-color:var(--sky); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--sky-dark); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1.5px solid var(--border); border-radius:10px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--sky); }

/* ── PHOTO ── */
.pzone { border:2.5px dashed var(--border); border-radius:10px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--sky); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); font-weight:600; }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:2px solid var(--sky); color:var(--sky-dark); border-radius:8px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; font-weight:700; transition:all .14s; }
.hintbtn:hover { background:var(--sky-bg); }
.hintbox { display:none; background:var(--sky-bg); border-left:3px solid var(--sky); border-radius:0 10px 10px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:2px solid var(--border); border-radius:10px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; -webkit-user-select:none; font-weight:600; }
.mcopt:hover:not(.dis) { border-color:var(--sky); background:var(--sky-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:10px; font-size:.83rem; margin-top:.25rem; font-weight:600; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--sky); color:var(--black); border:none; border-radius:12px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:800; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--sky-dark); color:#fff; }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── STEP BOX ── */
.stepbox { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:1rem 1.2rem; margin:.9rem 0; }
.stepbox .step { display:flex; gap:.8rem; margin-bottom:.6rem; align-items:flex-start; }
.stepbox .step:last-child { margin-bottom:0; }
.stepnum { background:var(--sky); color:var(--black); border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:900; flex-shrink:0; margin-top:.15rem; }
.steptext { font-size:.86rem; color:var(--text2); }
.mono { font-family:'IBM Plex Mono',monospace; font-size:.82rem; color:var(--sky-dark); font-weight:500; }

/* ── DARK MODE TOGGLE ── */
[data-theme="dark"] body { background:var(--bg); }
[data-theme="dark"] #welcomeScreen { background: linear-gradient(160deg, #0a1820 0%, #0e1a24 60%, #121e28 100%); }
</style>
</head>

<script>
/* ── STATE ── */
var studentData = {};
var problems    = [];
var answeredCount = 0;
var correctCount  = 0;
var pendingConfirm = {};   // two-tap confirmation per problem

/* ── THEME ── */
function toggleTheme() {
  var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
}

/* ── NAME HASH → SEED ── */
function hashName(s) {
  var h = 2166136261;
  for (var i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

/* ── SHUFFLE OPTIONS ── */
function shuffleOpts(arr, correct, rng) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

/* ── START ── */
function startLesson() {
  var name  = document.getElementById('nameInput').value.trim();
  var group = document.getElementById('groupInput').value.trim();
  var err   = document.getElementById('errMsg');
  if (!name)  { err.textContent = 'Por favor escribe tu nombre.'; return; }
  if (!group) { err.textContent = 'Por favor escribe tu nivel o grupo.'; return; }
  err.textContent = '';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  var seed = hashName(name + group);
  var rng = (function(s) {
    return function() {
      s = (s * 1664525 + 1013904223) & 0xffffffff;
      return (s >>> 0) / 4294967296;
    };
  })(seed);
  buildLesson(rng);
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

/* ── CANVAS ── */
function initCanvas(canvas) {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#1aa8e0';
  ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) { var r = canvas.getBoundingClientRect(); var src = e.touches ? e.touches[0] : e; return [src.clientX - r.left, src.clientY - r.top]; }
  function onDown(e) { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e) {
    e.preventDefault();
    if (!drawing) return;
    var p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p[0], p[1]); ctx.stroke();
    lx = p[0]; ly = p[1];
  }
  function onUp(e) { e.preventDefault(); drawing = false; }
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup',   onUp);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove',  onMove, { passive: false });
  canvas.addEventListener('touchend',   onUp,   { passive: false });
  // toolbar
  if (tb) {
    tb.querySelectorAll('.cdot').forEach(function(dot) {
      dot.addEventListener('click', function() {
        tb.querySelectorAll('.cdot').forEach(function(d){ d.classList.remove('sel'); });
        dot.classList.add('sel');
        ctx.strokeStyle = dot.dataset.color;
      });
    });
    var eraserBtn = tb.querySelector('.tbtn2[data-action="eraser"]');
    if (eraserBtn) {
      eraserBtn.addEventListener('click', function() {
        var on = eraserBtn.classList.toggle('on');
        ctx.globalCompositeOperation = on ? 'destination-out' : 'source-over';
      });
    }
    var clrBtn = tb.querySelector('.clrbtn');
    if (clrBtn) {
      clrBtn.addEventListener('click', function() {
        ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
      });
    }
  }
}

/* ── WORK AREA TAB SWITCH ── */
function switchTab(probIdx, tab) {
  var panels = document.querySelectorAll('#wp-' + probIdx + ' .wpanel');
  var tabs   = document.querySelectorAll('#wt-' + probIdx + ' .wtab');
  panels.forEach(function(p){ p.classList.remove('active'); });
  tabs.forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('panel-' + probIdx + '-' + tab).classList.add('active');
  document.querySelector('#wt-' + probIdx + ' [data-tab="' + tab + '"]').classList.add('active');
}

/* ── PHOTO PREVIEW ── */
function handlePhoto(input, idx) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('pp' + idx);
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

/* ── HINT ── */
function toggleHint(idx) {
  var box = document.getElementById('hint' + idx);
  box.classList.toggle('show');
}

/* ── TWO-TAP MC ANSWER ── */
function selectOpt(probIdx, optEl, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null && prob.studentChoice !== undefined && prob.studentChoice !== -1) return; // already locked

  var allOpts = optEl.closest('.mcopts').querySelectorAll('.mcopt');

  // First tap — highlight as pending confirm
  if (pendingConfirm[probIdx] !== chosenIdx) {
    allOpts.forEach(function(o){ o.style.opacity = '0.5'; o.style.borderColor = ''; });
    optEl.style.opacity = '1';
    optEl.style.borderColor = 'var(--sky)';
    optEl.style.background  = 'var(--sky-bg)';
    pendingConfirm[probIdx] = chosenIdx;
    var fb = document.getElementById('fb' + probIdx);
    fb.className = 'mcfb show';
    fb.style.background = 'var(--sky-bg)';
    fb.style.color = 'var(--sky-dark)';
    fb.textContent = 'Toca de nuevo para confirmar tu respuesta.';
    return;
  }

  // Second tap — lock answer
  pendingConfirm[probIdx] = undefined;
  prob.studentChoice = chosenIdx;
  var correct = (chosenIdx === prob.correctIdx);
  if (correct) correctCount++;
  answeredCount++;

  allOpts.forEach(function(o, i){
    o.classList.add('dis');
    o.style.opacity = ''; o.style.borderColor = ''; o.style.background = '';
    if (i === prob.correctIdx) o.classList.add('rc');
  });
  if (correct) { optEl.classList.add('sc'); }
  else         { optEl.classList.add('sw'); }

  var fb = document.getElementById('fb' + probIdx);
  fb.style.background = ''; fb.style.color = '';
  if (correct) {
    fb.className = 'mcfb show fbok';
    fb.textContent = '✓ ¡Correcto! ' + (prob.explanation || '');
  } else {
    fb.className = 'mcfb show fbbad';
    fb.textContent = '✗ ' + (prob.explanation || 'Revisa el procedimiento.');
  }

  // Update progress
  var pct = Math.round(answeredCount / problems.length * 100);
  document.getElementById('progFill').style.width = pct + '%';

  // Show result panel when all answered
  if (answeredCount === problems.length) {
    setTimeout(function() {
      document.getElementById('resultZone').style.display = 'block';
      var scorePct = Math.round(correctCount / problems.length * 100);
      document.getElementById('scorePct').textContent = scorePct + '%';
      document.getElementById('scoreDetail').textContent = correctCount + ' / ' + problems.length + ' correctas';
      document.getElementById('resultZone').scrollIntoView({ behavior: 'smooth' });
    }, 600);
  }
}

/* ── BUILD ONE PROBLEM CARD ── */
function buildOneCard(prob, i) {
  var opts = '';

    opts +=
      '<div class="mcopt" onclick="selectOpt(' + i + ',this,' + idx + ')">' +
        '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.78rem;color:var(--text3);flex-shrink:0">' +
          String.fromCharCode(65 + idx) +
        '<\/span>' +
        '<span>' + o + '<\/span>' +
      '<\/div>';
  });

  var card = document.createElement('div');
  card.className = 'pcrd';
  card.id = 'card' + i;
  card.innerHTML =
    '<div class="phdr">' +
      '<div class="pnum">' + (i + 1) + '<\/div>' +
      '<div class="ptitle">' + prob.title + '<\/div>' +
    '<\/div>' +
    '<div class="pbody">' +
      '<div class="pstmt">' + prob.questionText +
        (prob.fn ? '<code class="pfn">' + prob.fn + '<\/code>' : '') +
      '<\/div>' +
      '<div class="wtabs" id="wt-' + i + '">' +
        '<button class="wtab active" data-tab="draw"  onclick="switchTab(' + i + ',\'draw\')">✏️ Traza<\/button>' +
        '<button class="wtab"        data-tab="type"  onclick="switchTab(' + i + ',\'type\')">⌨️ Escribe<\/button>' +
        '<button class="wtab"        data-tab="photo" onclick="switchTab(' + i + ',\'photo\')">📷 Foto<\/button>' +
      '<\/div>' +
      '<div id="wp-' + i + '">' +
        '<div class="wpanel active" id="panel-' + i + '-draw">' +
          '<div class="cvwrap">' +
            '<canvas class="dcanvas" id="dc' + i + '"><\/canvas>' +
            '<div class="ctoolbar">' +
              '<button class="tbtn2" data-action="eraser">Borrador<\/button>' +
              '<div class="cdot sel" data-color="#1aa8e0" style="background:#1aa8e0"><\/div>' +
              '<div class="cdot" data-color="#1a1a1a" style="background:#1a1a1a"><\/div>' +
              '<div class="cdot" data-color="#e05030" style="background:#e05030"><\/div>' +
              '<button class="clrbtn">Limpiar<\/button>' +
            '<\/div>' +
          '<\/div>' +
        '<\/div>' +
        '<div class="wpanel" id="panel-' + i + '-type">' +
          '<textarea class="wtextarea" placeholder="Escribe tu procedimiento aquí…"><\/textarea>' +
        '<\/div>' +
        '<div class="wpanel" id="panel-' + i + '-photo">' +
          '<div class="pzone">' +
            '<input type="file" accept="image/*" capture="environment" onchange="handlePhoto(this,' + i + ')">' +
            '<div class="pzicon">📷<\/div>' +
            '<div class="pztxt">Toca para subir o tomar una foto de tu trabajo<\/div>' +
          '<\/div>' +
          '<img class="ppreview" id="pp' + i + '" alt="trabajo del alumno">' +
        '<\/div>' +
      '<\/div>' +
      '<button class="hintbtn" onclick="toggleHint(' + i + ')">💡 Ver pista<\/button>' +
      '<div class="hintbox" id="hint' + i + '">' + (prob.hint || '') + '<\/div>' +
      '<div style="margin-top:.7rem">' +
        '<div style="font-size:.65rem;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:.5rem;font-weight:700">Selecciona tu respuesta:<\/div>' +
        '<div class="mcopts">' + opts + '<\/div>' +
        '<div class="mcfb" id="fb' + i + '"><\/div>' +
      '<\/div>' +
    '<\/div>';
  document.getElementById('lessonBody').appendChild(card);
  setTimeout(function() {
    var c = document.getElementById('dc' + i);
    if (c) initCanvas(c);
  }, 80);
}

/* ── PDF EXPORT ── */
async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.textContent = 'Generando PDF…';
  btn.disabled = true;
  var jspdf = window.jspdf;
  var doc   = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW = 215.9, M = 18, TW = PW - M * 2, PH = doc.internal.pageSize.height;
  var name = studentData.name, group = studentData.group;
  var total = problems.length;
  var pct = Math.round(correctCount / total * 100);

  // Cover — Kumon sky blue header
  doc.setFillColor(91, 200, 245); doc.rect(0, 0, PW, 5, 'F');
  doc.setFillColor(26, 26, 26);   doc.rect(0, 5, PW, 55, 'F');
  doc.setTextColor(91, 200, 245); doc.setFontSize(7); doc.setFont('helvetica', 'bold');
  doc.text('Kumon  ·  Guía de Aprendizaje', M, 17);
  doc.setTextColor(232, 244, 250); doc.setFontSize(19); doc.setFont('helvetica', 'bold');
  doc.text('Guía de Aprendizaje', M, 40);
  doc.setTextColor(150, 170, 190); doc.setFontSize(8); doc.setFont('helvetica', 'normal');
  doc.text(new Date().toLocaleString('es-MX', { dateStyle: 'long', timeStyle: 'short' }), M, 52);
  doc.setFillColor(91, 200, 245); doc.rect(0, 60, PW, 2, 'F');

  doc.setFillColor(232, 247, 253); doc.roundedRect(M, 68, TW, 32, 3, 3, 'F');
  doc.setTextColor(106, 122, 128); doc.setFontSize(6.5); doc.setFont('helvetica', 'normal');
  doc.text('ALUMNO', M + 4, 77); doc.text('NIVEL / GRUPO', 130, 77);
  doc.setTextColor(26, 26, 26); doc.setFontSize(10); doc.setFont('helvetica', 'bold');
  doc.text(name, M + 4, 86); doc.text(group, 130, 86);

  var sc = pct >= 70 ? [26, 138, 90] : pct >= 50 ? [26, 168, 224] : [192, 48, 32];
  doc.setFillColor(255, 255, 255); doc.roundedRect(M, 110, TW, 48, 4, 4, 'F');
  doc.setDrawColor(sc[0], sc[1], sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M, 110, TW, 48, 4, 4, 'S');
  doc.setTextColor(sc[0], sc[1], sc[2]); doc.setFontSize(42); doc.setFont('helvetica', 'bold');
  doc.text(pct + '%', PW / 2, 143, { align: 'center' });
  doc.setTextColor(130, 140, 160); doc.setFontSize(9); doc.setFont('helvetica', 'normal');
  doc.text(correctCount + ' correcta(s) de ' + total + ' pregunta(s)', PW / 2, 153, { align: 'center' });

  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(91, 200, 245); doc.rect(0, PH - 3, PW, 3, 'F');
    doc.setTextColor(130, 140, 160); doc.setFontSize(6.5); doc.setFont('helvetica', 'normal');
    doc.text(name + ' · ' + group + '  ·  Página ' + p + '/' + pages, PW / 2, PH - 5, { align: 'center' });
  }

  doc.save('GuiaKumon_' + name.replace(/\s+/g, '_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar Resultados PDF';
  btn.disabled = false;
}
