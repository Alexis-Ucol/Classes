<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>General Annuities — Facultad de Economía</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green-bg:#1a281a; --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.halexis { flex:1; display:flex; justify-content:center; align-items:center; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (graph toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopt.pending { border-color:var(--gold); background:var(--surface); }
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── FORMULA DRAG WIDGET ── */
.tile-formula { background:var(--surface2); border-radius:12px; padding:1.2rem 1rem; margin:1rem 0; }
.fbank { display:flex; flex-wrap:wrap; gap:.45rem; padding:.75rem; background:var(--surface2); border:1px solid var(--border); border-radius:8px; margin-bottom:.75rem; min-height:44px; }
.fchip { display:inline-flex; align-items:center; padding:.3rem .75rem; background:var(--green); color:#fff; border-radius:20px; font-family:'IBM Plex Mono',monospace; font-size:.82rem; font-weight:600; cursor:grab; user-select:none; transition:opacity .15s; }
.fchip:active { cursor:grabbing; opacity:.7; }
.fchip.fplaced { display:none; }
.fslot { display:inline-flex; align-items:center; justify-content:center; min-width:48px; min-height:28px; border:2px dashed var(--gold); border-radius:6px; background:var(--gold-bg); vertical-align:middle; cursor:default; transition:background .15s; position:relative; }
.fslot.fover { background:var(--green-bg); border-color:var(--green); border-style:solid; }
.fslot.fcorrect { border-color:var(--ok); background:var(--ok-bg); border-style:solid; }
.fslot.fwrong { border-color:var(--bad); background:var(--bad-bg); border-style:solid; animation:shake .3s; }
.fchip-placed { font-family:'IBM Plex Mono',monospace; font-size:.78rem; font-weight:700; color:var(--green-dark); cursor:pointer; padding:0 .25rem; }
/* exponent slot — smaller, raised */
.fslot-exp { display:inline-flex; align-items:center; justify-content:center; min-width:26px; min-height:20px; border:2px dashed var(--gold); border-radius:4px; background:var(--gold-bg); cursor:default; transition:background .15s; }
.fslot-exp.fover { background:var(--green-bg); border-color:var(--green); border-style:solid; }
.fslot-exp.fcorrect { border-color:var(--ok); background:var(--ok-bg); border-style:solid; }
.fslot-exp.fwrong { border-color:var(--bad); background:var(--bad-bg); border-style:solid; }
.tile-check-btn { background:var(--gold); color:#1a1a16; border:none; border-radius:8px; padding:.5rem 1.2rem; font-weight:600; cursor:pointer; font-size:.85rem; margin-top:.8rem; transition:background .15s; }
.tile-check-btn:hover { background:#b8943a; }
.tile-fb { margin-top:.5rem; font-size:.82rem; padding:.5rem .8rem; border-radius:8px; display:none; }
.tile-fb.show { display:block; }
.tile-fb.ok  { background:var(--ok-bg);  color:var(--ok); }
.tile-fb.bad { background:var(--bad-bg); color:var(--bad); }
.tile-reset-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:.35rem .8rem; font-size:.76rem; cursor:pointer; color:var(--text3); margin-left:.6rem; }

/* ── STEP WIDGET ── */
.step-widget { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.2rem; margin:1rem 0; }
.step-row { display:flex; align-items:center; gap:.6rem; margin-bottom:.7rem; flex-wrap:wrap; }
.step-eq { font-family:'IBM Plex Mono',monospace; font-size:.88rem; color:var(--text2); }
.step-input { font-family:'IBM Plex Mono',monospace; font-size:.88rem; border:1.5px solid var(--border); border-radius:6px; padding:.3rem .6rem; width:110px; background:var(--surface2); color:var(--text); transition:border-color .18s; }
.step-input:focus { outline:none; border-color:var(--green); }
.step-input.ok  { border-color:var(--ok); background:var(--ok-bg); }
.step-input.bad { border-color:var(--bad); background:var(--bad-bg); }
.step-check { background:var(--green); color:#fff; border:none; border-radius:6px; padding:.3rem .75rem; font-size:.8rem; cursor:pointer; font-weight:600; }
.step-fb { font-size:.78rem; margin-left:.3rem; }
.step-fb.ok  { color:var(--ok); }
.step-fb.bad { color:var(--bad); }

/* ── TIMELINE / SLIDER WIDGET ── */
.calc-widget { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:1rem 0; }
.calc-grid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:1rem; }
@media(max-width:480px){ .calc-grid { grid-template-columns:1fr; } }
.cg label { font-size:.73rem; color:var(--text3); display:block; margin-bottom:.2rem; }
.cg select { width:100%; padding:.38rem .6rem; border:1.5px solid var(--border); border-radius:7px; background:var(--surface2); color:var(--text); font-size:.85rem; }
.cg select:focus { outline:none; border-color:var(--green); }
.result-box { background:var(--green-bg); border:1.5px solid var(--green); border-radius:10px; padding:.85rem 1.1rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:.5rem; margin-top:.8rem; }
.result-label { font-size:.73rem; text-transform:uppercase; letter-spacing:.07em; color:var(--green-dark); }
.result-value { font-family:'IBM Plex Mono',monospace; font-size:1.35rem; font-weight:700; color:var(--green-dark); }
.ip-box { background:var(--gold-bg); border:1.5px solid var(--gold); border-radius:10px; padding:.7rem 1rem; margin-top:.6rem; font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:#5a4010; }

/* ── TIMELINE BARS ── */
.tl-wrap { overflow-x:auto; margin-top:.8rem; }
.tl-canvas { display:block; width:100%; height:140px; }

/* ── MATCHING WIDGET ── */
.match-widget { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.2rem; margin:1rem 0; }
.match-row { display:flex; align-items:center; gap:.6rem; margin-bottom:.6rem; flex-wrap:wrap; }
.match-term { background:var(--green-bg); border:1.5px solid var(--green); border-radius:8px; padding:.45rem .75rem; font-size:.9rem; color:var(--green-dark); font-weight:700; min-width:54px; text-align:center; font-family:'IBM Plex Mono',monospace; }
.match-arrow { color:var(--text3); font-size:1rem; }
.match-select { border:1.5px solid var(--border); border-radius:8px; padding:.4rem .5rem; background:var(--surface2); color:var(--text); font-size:.82rem; flex:1; min-width:180px; }
.match-select:focus { outline:none; border-color:var(--green); }
.match-select.ok  { border-color:var(--ok); background:var(--ok-bg); }
.match-select.bad { border-color:var(--bad); background:var(--bad-bg); }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }


</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">

    var dc = document.getElementById('dc' + i);
    if (dc && dc.width) {
      var blank = document.createElement('canvas');
      blank.width = dc.width; blank.height = dc.height;
      drawings.push(dc.toDataURL() === blank.toDataURL() ? null : dc.toDataURL('image/png'));
    } else { drawings.push(null); }
    var ta = document.getElementById('ta' + i);
    texts.push(ta ? ta.value : '');
    var pp = document.getElementById('pp' + i);
    photos.push((pp && pp.src && pp.src.indexOf('data:') === 0) ? pp.src : null);
  });
  var state = {
    name: studentData.name, group: studentData.group,
    answeredCount: answeredCount, correctCount: correctCount,
    choices: problems.map(function(p) { return p.studentChoice; }),
    drawings: drawings, texts: texts, photos: photos
  };
  try { localStorage.setItem(lsKey(), JSON.stringify(state)); } catch(e) {}
}

function loadSession(name, group) {
  var key = 'GA1__' + (name + '__' + group).replace(/\s+/g, '_');
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}

function restoreSession() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var saved = loadSession(name, group);
  if (!saved) return;
  document.getElementById('restoreBar').style.display = 'none';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
  saved.choices.forEach(function(choice, idx) {
    if (choice !== null && choice !== undefined) confirmMC(idx, choice);
  });
  setTimeout(function() {
    if (saved.drawings) {
      saved.drawings.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var dc = document.getElementById('dc' + i);
        if (!dc || !dc.width) return;
        var img = new Image();
        img.onload = function() {
          var dpr = window.devicePixelRatio || 1;
          dc.getContext('2d').drawImage(img, 0, 0, dc.width / dpr, dc.height / dpr);
        };
        img.src = dataUrl;
      });
    }
    if (saved.texts) {
      saved.texts.forEach(function(text, i) {
        if (!text) return;
        var ta = document.getElementById('ta' + i);
        if (ta) ta.value = text;
      });
    }
    if (saved.photos) {
      saved.photos.forEach(function(dataUrl, i) {
        if (!dataUrl) return;
        var pp = document.getElementById('pp' + i);
        if (!pp) return;
        pp.src = dataUrl; pp.style.display = 'block';
        var pz = document.getElementById('pz' + i);
        if (pz) pz.style.opacity = '0.4';
      });
    }
  }, 300);
}

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; saveSession(); }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   ANSWER HANDLER — two-tap confirmation (Rule 8)
   Prevents accidental answer selection while scrolling on mobile.
   First tap highlights in gold (pending). Second tap on same option confirms.
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  // Second tap on same option → confirm
  if (prob.pendingChoice === chosenIdx) {
    prob.studentChoice = chosenIdx;
    prob.pendingChoice = null;
    var isOk = (chosenIdx === prob.correctIdx);
    opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
    opts.forEach(function(o, i) {
      if (i === prob.correctIdx) o.classList.add('rc');
      if (i === chosenIdx && isOk)  o.classList.add('sc');
      if (i === chosenIdx && !isOk) o.classList.add('sw');
    });
    var fb = document.getElementById('fb' + probIdx);
    fb.innerHTML = (isOk ? '<strong>✓ Correct.</strong> ' : '<strong>✗ Incorrect.</strong> ') + prob.explanation;
    fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
    document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
    if (isOk) correctCount++;
    answeredCount++;
    document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
    saveSession();
    if (answeredCount === problems.length) setTimeout(showResults, 700);
    return;
  }

  // First tap → highlight as pending, clear any previous pending
  prob.pendingChoice = chosenIdx;
  opts.forEach(function(o) { o.classList.remove('pending'); });
  opts[chosenIdx].classList.add('pending');
}

// Direct confirm — used by restoreSession to bypass two-tap
function confirmMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  prob.studentChoice = chosenIdx;
  prob.pendingChoice = null;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o) { o.classList.add('dis'); o.classList.remove('pending'); });
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  saveSession();
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ════════════════════════════════════════
   FORMULA DRAG & DROP  (mouse + touch)
   Adapted from proven pattern in costos_produccion guide
════════════════════════════════════════ */
var _fDndSelected  = null;   // tap-selected chip (desktop fallback)
var _fTouchClone   = null;   // ghost during touch drag
var _fTouchChipIdx = null;   // chip idx being touch-dragged
var _fPending      = {};     // slotId → chipIdx

/* ── Desktop drag ── */
function fDragStart(e) {
  e.dataTransfer.setData('fChipIdx', e.currentTarget.getAttribute('data-idx'));
  e.dataTransfer.effectAllowed = 'move';
  var chip = e.currentTarget;
  e.dataTransfer.setDragImage(chip, chip.offsetWidth / 2, chip.offsetHeight / 2);
  chip.style.opacity = '0.35';
}
function fDragEnd(e) { e.currentTarget.style.opacity = ''; }
function fDragOver(e)  { e.preventDefault(); e.currentTarget.classList.add('fover'); }
function fDragLeave(e) { e.currentTarget.classList.remove('fover'); }
function fDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('fover');
  fPlaceChip(e.dataTransfer.getData('fChipIdx'), e.currentTarget);
}

/* ── Touch drag ── */
function fTouchStart(e) {
  var chip = e.currentTarget;
  if (chip.classList.contains('fplaced')) return;
  _fTouchChipIdx = chip.getAttribute('data-idx');
  var rect = chip.getBoundingClientRect();
  _fTouchClone = chip.cloneNode(true);
  _fTouchClone.style.cssText = 'position:fixed;z-index:9999;pointer-events:none;opacity:.85;' +
    'width:' + rect.width + 'px;left:' + rect.left + 'px;top:' + rect.top + 'px;margin:0;';
  document.body.appendChild(_fTouchClone);
  chip.style.opacity = '0.3';
  e.preventDefault();
}
function fTouchMove(e) {
  if (!_fTouchClone) return;
  var t = e.touches[0];
  _fTouchClone.style.left = (t.clientX - _fTouchClone.offsetWidth  / 2) + 'px';
  _fTouchClone.style.top  = (t.clientY - _fTouchClone.offsetHeight / 2) + 'px';
  e.preventDefault();
}
function fTouchEnd(e) {
  if (!_fTouchClone || _fTouchChipIdx == null) return;
  var t = e.changedTouches[0];
  document.body.removeChild(_fTouchClone);
  _fTouchClone = null;
  var chip = document.getElementById('fchip_' + _fTouchChipIdx);
  if (chip) chip.style.opacity = '';
  var el = document.elementFromPoint(t.clientX, t.clientY);
  var zone = null;
  while (el && el !== document.body) {
    if (el.classList && el.classList.contains('fslot')) { zone = el; break; }
    el = el.parentElement;
  }
  if (zone) fPlaceChip(_fTouchChipIdx, zone);
  _fTouchChipIdx = null;
  e.preventDefault();
}

/* ── Tap fallback (desktop click-to-select then click-slot) ── */
function fTap(e) {
  if (e.sourceCapabilities && !e.sourceCapabilities.firesTouchEvents) return; // touch handles itself
  // actually use for desktop too as fallback when drag not available
}

/* ── Place chip into slot ── */
function fPlaceChip(idx, zone) {
  var chip = document.getElementById('fchip_' + idx);
  if (!chip || chip.classList.contains('fplaced')) return;
  var slotId = zone.getAttribute('data-slot');
  // If slot already occupied, return old chip
  if (_fPending[slotId] !== undefined) {
    var old = document.getElementById('fchip_' + _fPending[slotId]);
    if (old) { old.classList.remove('fplaced'); old.style.opacity = ''; }
  }
  zone.innerHTML = '';  // always clear label span before placing
  _fPending[slotId] = idx;
  chip.classList.add('fplaced');
  // If this is the 'm' slot, also fill the mirrored sm2 slot
  if (slotId === 'sm') {
    var zone2 = document.querySelector('[data-slot="sm2"]');
    if (zone2) {
      if (_fPending['sm2'] !== undefined) {
        var old2 = document.getElementById('fchip_' + _fPending['sm2']);
        if (old2 && old2 !== chip) { old2.classList.remove('fplaced'); old2.style.opacity=''; }
      }
      zone2.innerHTML = '';  // always clear label span
      _fPending['sm2'] = idx;
      var d2 = document.createElement('div');
      d2.className = 'fchip-placed';
      d2.textContent = chip.getAttribute('data-val');
      d2.title = 'Click to remove';
      d2.onclick = function(ev) { ev.stopPropagation(); fRemove('sm2', zone2); };
      zone2.appendChild(d2);
    }
  }
  var display = document.createElement('div');
  display.className = 'fchip-placed';
  display.textContent = chip.getAttribute('data-val');
  display.title = 'Click to remove';
  display.onclick = (function(z, i){ return function(ev){ ev.stopPropagation(); fRemove(slotId, z); }; })(zone, idx);
  zone.appendChild(display);
}

function fRemove(slotId, zone) {
  var idx = _fPending[slotId];
  if (idx === undefined) return;
  zone.innerHTML = '';
  zone.classList.remove('fcorrect','fwrong','fover');
  delete _fPending[slotId];
  // If removing 'm', also clear sm2 mirror
  if (slotId === 'sm') {
    var zone2 = document.querySelector('[data-slot="sm2"]');
    if (zone2) { zone2.innerHTML = ''; zone2.classList.remove('fcorrect','fwrong','fover'); delete _fPending['sm2']; }
  }
  var chip = document.getElementById('fchip_' + idx);
  if (chip) { chip.classList.remove('fplaced'); chip.style.opacity = ''; }
}

function fCheck(correctMap, fbId) {
  var slots = Object.keys(correctMap);
  var allFilled = slots.every(function(s){ return _fPending[s] !== undefined; });
  var fb = document.getElementById(fbId);
  if (!allFilled) { fb.textContent = 'Fill all slots first!'; fb.className = 'tile-fb show bad'; return; }
  var allOk = true;
  slots.forEach(function(s) {
    var zone = document.querySelector('[data-slot="'+s+'"]');
    if (!zone) return;
    var chip = document.getElementById('fchip_' + _fPending[s]);
    var val = chip ? chip.getAttribute('data-val') : null;
    var ok = val === correctMap[s];
    zone.classList.toggle('fcorrect', ok);
    zone.classList.toggle('fwrong', !ok);
    if (!ok) allOk = false;
  });
  fb.className = 'tile-fb show ' + (allOk ? 'ok' : 'bad');
  fb.textContent = allOk ? '✓ All values are correct!' : '✗ Some slots are wrong — reset and try again.';
}

function fReset(fbId) {
  document.querySelectorAll('[data-slot]').forEach(function(z){ z.innerHTML=''; z.classList.remove('fcorrect','fwrong','fover'); });
  document.querySelectorAll('.fchip').forEach(function(c){ c.classList.remove('fplaced'); c.style.opacity=''; });
  _fPending = {};
  var fb = document.getElementById(fbId);
  if (fb) { fb.className='tile-fb'; fb.textContent=''; }
}

function fInitTouch() {
  document.querySelectorAll('#fbank .fchip').forEach(function(chip) {
    chip.addEventListener('touchstart', fTouchStart, { passive:false });
    chip.addEventListener('touchmove',  fTouchMove,  { passive:false });
    chip.addEventListener('touchend',   fTouchEnd,   { passive:false });
  });
}

/* ── STEP CHECKER ── */
function checkStep(inputId, fbId, correct, tol) {
  var input = document.getElementById(inputId);
  var fb    = document.getElementById(fbId);
  var val   = parseFloat(input.value.replace(/,/g,'.'));
  tol = tol || 0.0005;
  if (isNaN(val)) { input.classList.add('bad'); fb.textContent = '✗ Enter a number'; fb.className='step-fb bad'; return false; }
  var ok = Math.abs(val - correct) / (Math.abs(correct) || 1) < tol || Math.abs(val - correct) < tol;
  input.classList.toggle('ok', ok);
  input.classList.toggle('bad', !ok);
  input.disabled = ok;
  fb.textContent = ok ? '✓' : '✗ Try again';
  fb.className = 'step-fb ' + (ok ? 'ok' : 'bad');
  return ok;
}

/* ── LIVE CALC ── */
function updateCalc(params) {
  var pmt = parseFloat(document.getElementById(params.pmtId).value) || 0;
  var iNom = parseFloat(document.getElementById(params.iId).value) || 0;
  var m   = parseFloat(document.getElementById(params.mId).value) || 2;
  var p   = parseFloat(document.getElementById(params.pId).value) || 12;
  var yrs = parseFloat(document.getElementById(params.yrsId).value) || 1;

  var ip = Math.pow(1 + iNom/100/m, m/p) - 1;
  var n  = yrs * p;
  var FV = pmt * (Math.pow(1+ip, n) - 1) / ip;
  var PV = pmt * (1 - Math.pow(1+ip,-n)) / ip;

  document.getElementById(params.ipDisplayId).textContent  = (ip*100).toFixed(6) + '%';
  document.getElementById(params.fvDisplayId).textContent  = '$' + FV.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById(params.pvDisplayId).textContent  = '$' + PV.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById(params.nDisplayId).textContent   = n + ' pmts';

  // draw timeline bars
  var canvas = document.getElementById(params.canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth || 600; var H = 120;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0,0,W,H);
  var steps = Math.min(n, 36);
  var barW  = Math.max(2, Math.floor((W - 20) / steps) - 2);
  var maxFV = FV || 1;
  for (var k = 1; k <= steps; k++) {
    var fvK = pmt * (Math.pow(1+ip,k)-1) / ip;
    var bh  = Math.max(2, Math.round((fvK / maxFV) * (H-30)));
    var bx  = 10 + (k-1) * (barW+2);
    var by  = H - bh - 16;
    var ratio = k/steps;
    var r = Math.round(74 + (201-74)*ratio);
    var g2= Math.round(124+(168-124)*ratio);
    var b = Math.round(63 + (76-63)*ratio);
    ctx.fillStyle = 'rgb('+r+','+g2+','+b+')';
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(bx,by,barW,bh,2) : ctx.rect(bx,by,barW,bh);
    ctx.fill();
  }
  ctx.fillStyle = '#7a7468';
  ctx.font = '10px IBM Plex Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Payment 1', 10 + barW/2, H-4);
  ctx.fillText('Payment '+steps, 10+(steps-1)*(barW+2)+barW/2, H-4);
}

// Vertical CSS fraction — inline, no MathJax
function frac(num, den) {
  return '<span style="display:inline-flex;flex-direction:column;align-items:center;' +
         'vertical-align:middle;margin:0 .18rem;line-height:1.2;">' +
           '<span style="font-size:.82em;border-bottom:1.8px solid currentColor;' +
           'padding:0 .2em .1em;white-space:nowrap;">' + num + '</span>' +
           '<span style="font-size:.82em;padding:.1em .2em 0;white-space:nowrap;">' + den + '</span>' +
         '</span>';
}

// Raised small fraction as superscript — inline-block so vertical-align:super works
function expFrac(num, den) {
  return '<span style="display:inline-block;vertical-align:super;font-size:.6em;' +
         'line-height:1.2;margin-left:.1em;text-align:center;">' +
           '<span style="display:block;border-bottom:1px solid currentColor;' +
           'padding:0 .2em .05em;white-space:nowrap;">' + num + '</span>' +
           '<span style="display:block;padding:.05em .2em 0;white-space:nowrap;">' + den + '</span>' +
         '</span>';
}

// Small superscript (single value, not fraction)
function sup(val) {
  return '<span style="display:inline-block;vertical-align:super;font-size:.65em;' +
         'line-height:1;margin-left:.04em;">' + val + '</span>';
}

      '<div style="margin:.3rem 0 0 .5rem;">' +
        'i<sub>p</sub>&nbsp;=&nbsp;' +
        '(1&nbsp;+&nbsp;' + frac('0.10','2') + ')' + expFrac('2','12') +
        '&nbsp;&minus;&nbsp;1&nbsp;&nbsp;&asymp;&nbsp;&nbsp;<strong>' + demoIpStr + '</strong>' +
      '</div>' +
    '</div>'
  );

  // ─────────────────────────────────────────────────
  // SECTION 3 — DRAG INTO FORMULA
  // ─────────────────────────────────────────────────
  var s4iArr=[6,8,10,12,14,16];
  var s4i   = pick(s4iArr);
  var s4mP  = pick([[2,'semiannually'],[4,'quarterly'],[1,'annually']]);
  var s4m   = s4mP[0]; var s4mL = s4mP[1];
  var s4pArr= [[12,'monthly'],[4,'quarterly'],[2,'semiannually']].filter(function(x){return x[0]!==s4m;});
  var s4pP  = pick(s4pArr);
  var s4p   = s4pP[0]; var s4pL = s4pP[1];
  var s4yrs = ri(3,12);
  var s4iDec= parseFloat((s4i/100).toFixed(4));

  var cv_i = s4iDec.toString();
  var cv_m = s4m.toString();
  var cv_p = s4p.toString();
  var wrongI = parseFloat(((s4i+(rng()>.5?2:-2))/100).toFixed(4)).toString();
  var wrongM = pick([1,2,4,12].filter(function(x){return x!==s4m;})).toString();
  var wrongP = pick([1,2,4,12,52].filter(function(x){return x!==s4p;})).toString();

  var chips = [cv_i, cv_m, cv_p, wrongI, wrongM, wrongP]
    .filter(function(v,idx,a){return a.indexOf(v)===idx;});
  for(var ci=chips.length-1;ci>0;ci--){var cj=Math.floor(rng()*(ci+1));var ct=chips[ci];chips[ci]=chips[cj];chips[cj]=ct;}

  var bankHtml = chips.map(function(v, idx){
    return '<div class="fchip" id="fchip_'+idx+'" data-idx="'+idx+'" data-val="'+v+'" '+
      'draggable="true" ondragstart="fDragStart(event)" ondragend="fDragEnd(event)">'+v+'</div>';
  }).join('');

  // Drop zone helper — produces a .fslot span with correct data-slot
  function dz(slotId, label) {
    return '<span class="fslot" data-slot="'+slotId+'" '+
      'ondragover="fDragOver(event)" ondragleave="fDragLeave(event)" ondrop="fDrop(event)">'+
      '<span style="font-size:.72rem;color:var(--text3);font-weight:500;">'+label+'</span>'+
    '</span>';
  }
  // Exponent drop zone — smaller, raised via vertical-align:super on a plain inline-block wrapper
  function dzExp(slotId, label) {
    return '<span style="display:inline-block;vertical-align:super;font-size:.6em;line-height:1;margin-left:.1em;">'+
      '<span class="fslot fslot-exp" data-slot="'+slotId+'" '+
        'ondragover="fDragOver(event)" ondragleave="fDragLeave(event)" ondrop="fDrop(event)">'+
        '<span style="font-size:.85rem;color:var(--text3);font-weight:500;">'+label+'</span>'+
      '</span>'+
    '</span>';
  }
  // sm2 is a silent mirror slot for the exponent m position — not visible separately
  // Instead we build the exponent as a fraction of two stacked drop zones
  function dzExpFrac(topSlotId, topLabel, botSlotId, botLabel) {
    return '<span style="display:inline-block;vertical-align:super;font-size:.6em;line-height:1.1;margin-left:.12em;text-align:center;">'+
      '<span class="fslot fslot-exp" data-slot="'+topSlotId+'" style="display:block;border-bottom:1.5px solid var(--gold);border-radius:3px 3px 0 0;min-width:26px;min-height:20px;" '+
        'ondragover="fDragOver(event)" ondragleave="fDragLeave(event)" ondrop="fDrop(event)">'+
        '<span style="font-size:.9rem;color:var(--text3);font-weight:500;">'+topLabel+'</span>'+
      '</span>'+
      '<span class="fslot fslot-exp" data-slot="'+botSlotId+'" style="display:block;border-top:none;border-radius:0 0 3px 3px;min-width:26px;min-height:20px;" '+
        'ondragover="fDragOver(event)" ondragleave="fDragLeave(event)" ondrop="fDrop(event)">'+
        '<span style="font-size:.9rem;color:var(--text3);font-weight:500;">'+botLabel+'</span>'+
      '</span>'+
    '</span>';
  }

  var correctMap = '{si:"'+cv_i+'",sm:"'+cv_m+'",sp:"'+cv_p+'",sm2:"'+cv_m+'"}';

  addSection('tile1','Concept 3','Drag the Values into the Formula',
    '<p>For the annuity below, drag each value from the bank into its correct slot in the formula. On mobile, drag by touch.</p>' +
    '<div class="callout" style="margin-bottom:.8rem">' +
      '<strong>'+s4pL.charAt(0).toUpperCase()+s4pL.slice(1)+' payments &nbsp;·&nbsp; '+s4yrs+' years &nbsp;·&nbsp; '+s4i+'% compounded '+s4mL+'</strong>' +
    '</div>' +
    '<div class="tile-formula" id="tw1">' +
      // Chip bank
      '<div class="fbank" id="fbank">'+bankHtml+'</div>' +
      // Formula display with live drop zones
      '<div style="font-size:1.1rem;font-weight:700;color:var(--green-dark);text-align:center;padding:.6rem 0 .8rem;line-height:2.6;">' +
        'i<sub>p</sub>&nbsp;=&nbsp;' +
        '(&nbsp;1&nbsp;+&nbsp;' +
        // fraction: i/m — top slot (i), bottom slot (m)
        '<span style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 .15rem;line-height:1.25;">'+
          '<span class="fslot" data-slot="si" style="border-bottom:2px solid var(--gold);border-radius:6px 6px 0 0;" ondragover="fDragOver(event)" ondragleave="fDragLeave(event)" ondrop="fDrop(event)"><span style="font-size:.72rem;color:var(--text3);">i</span></span>'+
          '<span class="fslot" data-slot="sm" style="border-top:none;border-radius:0 0 6px 6px;" ondragover="fDragOver(event)" ondragleave="fDragLeave(event)" ondrop="fDrop(event)"><span style="font-size:.72rem;color:var(--text3);">m</span></span>'+
        '</span>' +
        '&nbsp;)&nbsp;' +
        // exponent m/p — two stacked drop zones raised via vertical-align:super
        '<span style="display:inline-block;vertical-align:super;font-size:.62em;line-height:1.1;margin-left:.12em;text-align:center;">'+
          '<span class="fslot fslot-exp" data-slot="sm2" style="display:block;border-bottom:1.5px solid var(--gold);border-radius:3px 3px 0 0;min-width:30px;min-height:22px;" ondragover="fDragOver(event)" ondragleave="fDragLeave(event)" ondrop="fDrop(event)"><span style="font-size:.9rem;color:var(--text3);">m</span></span>'+
          '<span class="fslot fslot-exp" data-slot="sp" style="display:block;border-top:none;border-radius:0 0 3px 3px;min-width:30px;min-height:22px;" ondragover="fDragOver(event)" ondragleave="fDragLeave(event)" ondrop="fDrop(event)"><span style="font-size:.9rem;color:var(--text3);">p</span></span>'+
        '</span>' +
        '&nbsp;&minus;&nbsp;1' +
      '</div>' +
      '<div style="margin-top:.4rem">' +
        '<button class="tile-check-btn" onclick="fCheck({si:\''+cv_i+'\',sm:\''+cv_m+'\',sp:\''+cv_p+'\',sm2:\''+cv_m+'\'},\'tw1_fb\')">Check answers</button>' +
        '<button class="tile-reset-btn" onclick="fReset(\'tw1_fb\')">↺ Reset</button>' +
      '</div>' +
      '<div class="tile-fb" id="tw1_fb"></div>' +
    '</div>'
  );
  // Wire touch events after DOM settles
  setTimeout(fInitTouch, 300);

  // ── Story contexts ──
  var fvStories = [
    { ctx: function(pmt,pL,yrs,i,mL) { return 'Sofía starts her first job and deposits <strong>$'+pmt+'</strong> into a savings account every '+pL+'. The bank offers <strong>'+i+'% compounded '+mL+'</strong>. After <strong>'+yrs+' years</strong>, how much will she have accumulated?'; }, title:"Sofía's Retirement Fund" },
    { ctx: function(pmt,pL,yrs,i,mL) { return 'A small business owner sets aside <strong>$'+pmt+'</strong> '+pL+' to eventually buy new equipment. The investment earns <strong>'+i+'% compounded '+mL+'</strong>. What is the account balance after <strong>'+yrs+' years</strong>?'; }, title:'Equipment Savings Plan' },
    { ctx: function(pmt,pL,yrs,i,mL) { return 'Carlos contributes <strong>$'+pmt+'</strong> '+pL+' to a university education fund for his daughter. The fund earns <strong>'+i+'% compounded '+mL+'</strong>. How much will be in the fund at the end of <strong>'+yrs+' years</strong>?'; }, title:'Education Fund' },
    { ctx: function(pmt,pL,yrs,i,mL) { return 'A couple saves <strong>$'+pmt+'</strong> '+pL+' toward the down payment on a house. Their account pays <strong>'+i+'% compounded '+mL+'</strong>. How much will they have saved after <strong>'+yrs+' years</strong>?'; }, title:'House Down Payment' }
  ];
  var pvStories = [
    { ctx: function(pmt,pL,yrs,i,mL) { return 'A lottery winner is offered <strong>$'+pmt+'</strong> '+pL+' for the next <strong>'+yrs+' years</strong>. If money earns <strong>'+i+'% compounded '+mL+'</strong>, what single lump sum is this prize worth <em>today</em>?'; }, title:'Lottery Prize Valuation' },
    { ctx: function(pmt,pL,yrs,i,mL) { return 'A car dealership offers a lease: pay <strong>$'+pmt+'</strong> '+pL+' for <strong>'+yrs+' years</strong>. At <strong>'+i+'% compounded '+mL+'</strong>, what is the cash equivalent of this contract today?'; }, title:'Car Lease Valuation' },
    { ctx: function(pmt,pL,yrs,i,mL) { return 'A retiree will receive <strong>$'+pmt+'</strong> '+pL+' for <strong>'+yrs+' years</strong>. Using a discount rate of <strong>'+i+'% compounded '+mL+'</strong>, what is the present value of this pension?'; }, title:'Pension Present Value' },
    { ctx: function(pmt,pL,yrs,i,mL) { return 'A company evaluates a rental contract generating <strong>$'+pmt+'</strong> '+pL+' for <strong>'+yrs+' years</strong>. At a cost of capital of <strong>'+i+'% compounded '+mL+'</strong>, what is this contract worth today?'; }, title:'Rental Contract Valuation' }
  ];
  var ipStories = [
    { ctx: function(i,mL,pp,pL) { return 'A bank advertises a savings rate of <strong>'+i+'% compounded '+mL+'</strong>. You plan to make <strong>'+pL+' deposits</strong>. What is the equivalent rate i<sub>p</sub> per payment period that you must use in the annuity formula?'; }, title:'Bank Rate Conversion' },
    { ctx: function(i,mL,pp,pL) { return 'A mortgage is quoted at <strong>'+i+'% compounded '+mL+'</strong>, but payments will be made <strong>'+pL+'</strong>. What effective rate per payment period i<sub>p</sub> should you use?'; }, title:'Mortgage Rate Conversion' },
    { ctx: function(i,mL,pp,pL) { return 'A pension fund earns <strong>'+i+'% compounded '+mL+'</strong> and pays benefits <strong>'+pL+'</strong>. Find the equivalent rate per payment period i<sub>p</sub>.'; }, title:'Pension Rate Conversion' }
  ];

  function makeIpProb(storyObj) {
    var ii  = pick([6,8,10,12,14,15]);
    var mP  = pick([[2,'semiannually'],[4,'quarterly'],[1,'annually']]);
    var mm  = mP[0]; var mmL = mP[1];
    var pP  = pick([[12,'monthly'],[4,'quarterly'],[2,'semiannually']].filter(function(x){return x[0]!==mm;}));
    var pp  = pP[0]; var ppL = pP[1];
    var ip  = Math.pow(1+ii/100/mm, mm/pp)-1;
    var ipR = ip.toFixed(6);
    var w1  = (ii/100/mm).toFixed(6);
    var w2  = (Math.pow(1+ii/100/pp, mm/pp)-1).toFixed(6);
    var w3  = (ip*1.10).toFixed(6);
    var pool = [ipR, w1, w2, w3].filter(function(v,i,a){return a.indexOf(v)===i;});
    while (pool.length < 4) pool.push((ip*(0.9+rng()*0.2)).toFixed(6));
    var opts = shuffleArr(pool.slice(0,4), rng);
    return {
      title: storyObj.title,
      questionText: storyObj.ctx(ii, mmL, pp, ppL),
      fn: '',
      options: opts,
      correctIdx: opts.indexOf(ipR),
      explanation: 'iₚ = (1 + '+ii/100+'/'+mm+')^('+mm+'/'+pp+') − 1 ≈ ' + ipR,
      hint: 'Formula: (1 + '+ii/100+'/'+mm+')^('+mm+'/'+pp+') − 1',
      studentChoice: null, pendingChoice: null
    };
  }

  function makeFVProb(storyObj) {
    var pmt = ri(3,20)*50;
    var ii  = pick([6,8,10,12,14]);
    var mP  = pick([[2,'semiannually'],[4,'quarterly'],[1,'annually']]);
    var mm  = mP[0]; var mmL = mP[1];
    var pP  = pick([[12,'monthly'],[4,'quarterly'],[2,'semiannually']].filter(function(x){return x[0]!==mm;}));
    var pp  = pP[0]; var ppL = pP[1];
    var yrs = ri(3,15);
    var ip  = Math.pow(1+ii/100/mm, mm/pp)-1;
    var nn  = yrs*pp;
    var fv  = Math.round(pmt*(Math.pow(1+ip,nn)-1)/ip*100)/100;
    var w1  = Math.round(pmt*nn*100)/100;
    var w2  = Math.round(pmt*(Math.pow(1+ii/100/pp,nn)-1)/(ii/100/pp)*100)/100;
    var w3  = Math.round(fv*1.07*100)/100;
    var opts = shuffleArr(['$'+fmt(fv),'$'+fmt(w1),'$'+fmt(w2),'$'+fmt(w3)], rng);
    return {
      title: storyObj.title,
      questionText: storyObj.ctx(pmt, ppL, yrs, ii, mmL),
      fn: '',
      options: opts,
      correctIdx: opts.indexOf('$'+fmt(fv)),
      explanation: 'iₚ ≈ '+(ip*100).toFixed(4)+'%  •  n = '+nn+'  •  FV = $'+fmt(fv),
      hint: 'iₚ = (1+'+ii/100+'/'+mm+')^('+mm+'/'+pp+')−1  •  n = '+yrs+'×'+pp+' = '+nn,
      studentChoice: null, pendingChoice: null
    };
  }

  function makePVProb(storyObj) {
    var pmt = ri(3,20)*50;
    var ii  = pick([6,8,10,12,15]);
    var mP  = pick([[2,'semiannually'],[4,'quarterly'],[1,'annually']]);
    var mm  = mP[0]; var mmL = mP[1];
    var pP  = pick([[12,'monthly'],[4,'quarterly'],[2,'semiannually']].filter(function(x){return x[0]!==mm;}));
    var pp  = pP[0]; var ppL = pP[1];
    var yrs = ri(3,15);
    var ip  = Math.pow(1+ii/100/mm, mm/pp)-1;
    var nn  = yrs*pp;
    var pv  = Math.round(pmt*(1-Math.pow(1+ip,-nn))/ip*100)/100;
    var w1  = Math.round(pmt*nn*100)/100;
    var w2  = Math.round(pmt*(1-Math.pow(1+ii/100/pp,-nn))/(ii/100/pp)*100)/100;
    var w3  = Math.round(pv*0.91*100)/100;
    var opts = shuffleArr(['$'+fmt(pv),'$'+fmt(w1),'$'+fmt(w2),'$'+fmt(w3)], rng);
    return {
      title: storyObj.title,
      questionText: storyObj.ctx(pmt, ppL, yrs, ii, mmL),
      fn: '',
      options: opts,
      correctIdx: opts.indexOf('$'+fmt(pv)),
      explanation: 'iₚ ≈ '+(ip*100).toFixed(4)+'%  •  n = '+nn+'  •  PV = $'+fmt(pv),
      hint: 'iₚ = (1+'+ii/100+'/'+mm+')^('+mm+'/'+pp+')−1  •  n = '+yrs+'×'+pp+' = '+nn,
      studentChoice: null, pendingChoice: null
    };
  }

  // ─── i_p PRACTICE (3 problems) ───
  addSection('ipprac','Practice','Equivalent Rate Practice',
    '<p>For each scenario, compute the equivalent rate per payment period i<sub>p</sub>. Give your answer to 6 decimal places.</p>'
  );
  for (var qi=0; qi<3; qi++) {
    problems.push(makeIpProb(ipStories[qi]));
    buildOneCard(problems[problems.length-1], problems.length-1);
  }

  // ─── CONCEPT 4 — FUTURE VALUE ───
  var fvDemoIp = demoIp; var fvDemoN = 84;
  var fvDemoFV = Math.round(500*(Math.pow(1+fvDemoIp,fvDemoN)-1)/fvDemoIp*100)/100;

  addSection('fvconcept','Concept 4','Future Value of a General Annuity',
    '<p>Once you have i<sub>p</sub>, plug it directly into the FV formula. Always compute these two together:</p>' +
    ipFormula() +
    fvFormula() +
    '<div class="callout">' +
      '<strong>Worked example:</strong> $500 monthly · 7 years · 10% compounded semiannually<br><br>' +
      '<strong>Step 1 — i<sub>p</sub>:</strong>&nbsp;' +
      '(1 + ' + frac('0.10','2') + ')' + expFrac('2','12') +
      ' &minus; 1 &asymp; <strong>0.008165</strong><br>' +
      '<strong>Step 2 — n:</strong>&nbsp; 7 &times; 12 = <strong>84</strong><br>' +
      '<strong>Step 3 — FV:</strong>&nbsp; 500 &times; ' +
      frac('(1.008165)' + sup('84') + ' &minus; 1','0.008165') +
      ' &asymp; <strong>$' + fmt(fvDemoFV) + '</strong>' +
    '</div>'
  );
  for (var fi=0; fi<4; fi++) {
    problems.push(makeFVProb(fvStories[fi]));
    buildOneCard(problems[problems.length-1], problems.length-1);
  }

  // ─── CONCEPT 5 — PRESENT VALUE ───
  var pvDI=0.08; var pvDM=4; var pvDP=12; var pvDYrs=5; var pvDPmt=300;
  var pvDIp=Math.pow(1+pvDI/pvDM,pvDM/pvDP)-1;
  var pvDN=pvDYrs*pvDP;
  var pvDPV=Math.round(pvDPmt*(1-Math.pow(1+pvDIp,-pvDN))/pvDIp*100)/100;
  var pvIpStr=pvDIp.toFixed(6);

  addSection('pvconcept','Concept 5','Present Value of a General Annuity',
    '<p>PV answers: what single amount today is equivalent to a future stream of payments?</p>' +
    ipFormula() +
    pvFormula() +
    '<div class="callout">' +
      '<strong>Worked example:</strong> $300 monthly · 5 years · 8% compounded quarterly<br><br>' +
      '<strong>Step 1 — i<sub>p</sub>:</strong>&nbsp;' +
      '(1 + ' + frac('0.08','4') + ')' + expFrac('4','12') +
      ' &minus; 1 &asymp; <strong>' + pvIpStr + '</strong><br>' +
      '<strong>Step 2 — n:</strong>&nbsp; 5 &times; 12 = <strong>60</strong><br>' +
      '<strong>Step 3 — PV:</strong>&nbsp; 300 &times; ' +
      frac('1 &minus; (1+' + pvIpStr + ')' + sup('&minus;60'), pvIpStr) +
      ' &asymp; <strong>$' + fmt(pvDPV) + '</strong>' +
    '</div>'
  );
  for (var pi=0; pi<4; pi++) {
    problems.push(makePVProb(pvStories[pi]));
    buildOneCard(problems[problems.length-1], problems.length-1);
  }

  // ── Wire all widgets ──
  setTimeout(function() {
    // Match widget
    var correctMatch={ms1:'a',ms2:'c',ms3:'b',ms4:'d',ms5:'e'};
    window.checkMatch=function(){
      var fb=document.getElementById('matchFb');
      var allSet=['ms1','ms2','ms3','ms4','ms5'].every(function(id){
        var el=document.getElementById(id); return el&&el.value!=='';
      });
      if(!allSet) return;
      var allOk=true;
      ['ms1','ms2','ms3','ms4','ms5'].forEach(function(id){
        var el=document.getElementById(id);
        var ok=el.value===correctMatch[id];
        el.className='match-select '+(ok?'ok':'bad');
        if(!ok) allOk=false;
      });
      fb.className='tile-fb show '+(allOk?'ok':'bad');
      fb.textContent=allOk?'✓ All correct! You know your variables.':'✗ Some matches are wrong — review and try again.';
    };

  }, 200);
}

function shuffleArr(a, rng) {
  var arr = a.slice();
  for (var i=arr.length-1;i>0;i--){var j=Math.floor(rng()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}

function buildOneCard(prob, i) {
  var container = document.getElementById('lessonBody');
  var opts = prob.options.map(function(opt,oi){
    return '<div class="mcopt" onclick="handleMC('+i+','+oi+')">'+opt+'</div>';
  }).join('');
  var card = document.createElement('div');
  card.className = 'pcrd section';
  card.id = 'pc'+i;
  card.innerHTML =
    '<div class="phdr"><div class="pnum">'+(i+1)+'</div><div class="ptitle">'+prob.title+'</div></div>' +
    '<div class="pbody">' +
      '<div class="pstmt">'+prob.questionText+'<span class="pfn">'+(prob.fn||'')+'</span></div>' +
      '<div style="margin-bottom:.85rem">' +
        '<div class="wtabs">' +
          '<button class="wtab active" onclick="switchTab('+i+',\'draw\',this)">✏️ Draw</button>' +
          '<button class="wtab" onclick="switchTab('+i+',\'type\',this)">⌨️ Type</button>' +
          '<button class="wtab" onclick="switchTab('+i+',\'photo\',this)">📷 Photo</button>' +
        '</div>' +
        '<div class="wpanel active" id="wp_'+i+'_draw">' +
          '<div class="cvwrap">' +
            '<canvas class="dcanvas" id="dc'+i+'"></canvas>' +
            '<div class="ctoolbar">' +
              '<button class="tbtn2 bpen on">🖊 Pen</button>' +
              '<button class="tbtn2 bmarker">🖌 Marker</button>' +
              '<button class="tbtn2 beraser">⬜ Eraser</button>' +
              '<div class="cdot sel" data-color="#2d5a27" style="background:#2d5a27"></div>' +
              '<div class="cdot" data-color="#1a1a16" style="background:#1a1a16"></div>' +
              '<div class="cdot" data-color="#8b2500" style="background:#8b2500"></div>' +
              '<div class="cdot" data-color="#1d4e89" style="background:#1d4e89"></div>' +
              '<button class="clrbtn">🗑 Clear</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="wpanel" id="wp_'+i+'_type">' +
          '<textarea class="wtextarea" id="ta'+i+'" placeholder="Show your steps here..." oninput="saveSession()"></textarea>' +
        '</div>' +
        '<div class="wpanel" id="wp_'+i+'_photo">' +
          '<div class="pzone" id="pz'+i+'">' +
            '<input type="file" accept="image/*" onchange="handlePhoto('+i+',this)">' +
            '<div class="pzicon">📸</div>' +
            '<div class="pztxt">Tap to <strong>choose an image</strong> or take a photo</div>' +
          '</div>' +
          '<img class="ppreview" id="pp'+i+'" alt="student work">' +
        '</div>' +
      '</div>' +
      '<button class="hintbtn" onclick="toggleHint('+i+')">💡 Show hint</button>' +
      '<div class="hintbox" id="hint'+i+'">'+(prob.hint||'')+'</div>' +
      '<div style="margin-top:.7rem">' +
        '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:.5rem">Select your answer:</div>' +
        '<div class="mcopts">'+opts+'</div>' +
        '<div class="mcfb" id="fb'+i+'"></div>' +
      '</div>' +
    '</div>';
  container.appendChild(card);
  setTimeout(function(){
    var c = document.getElementById('dc'+i);
    if(c) initCanvas(c);
  }, 80);
  setTimeout(function(){
    card.classList.add('vis');
  }, 100);
