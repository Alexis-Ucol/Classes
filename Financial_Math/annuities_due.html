<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annuities Due — Facultad de Economía</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green-bg:#1a281a; --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; padding-bottom:1.6rem; border-bottom:1px solid var(--border); }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wlogsep { width:1px; height:40px; background:var(--border); flex-shrink:0; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (graph toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.pending { border-color:var(--gold); background:var(--gold-bg); color:#8a5c00; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── ANNUITY EXPLORER ── */
.explorer-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.4rem; margin:.9rem 0; }
.explorer-card h3 { font-family:'Crimson Pro',serif; font-size:1.1rem; font-weight:700; margin-bottom:1rem; color:var(--text); }
.formula-display { background:var(--surface2); border-radius:10px; padding:1rem 1.2rem; margin-bottom:1rem; font-family:'IBM Plex Mono',monospace; font-size:.9rem; color:var(--green-dark); border-left:4px solid var(--green); line-height:1.8; }
.formula-display .hl { background:var(--gold-bg); border-radius:4px; padding:.1rem .3rem; color:#8a5c00; font-weight:600; }
.formula-display .dim { color:var(--text3); }
.inputs-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:.7rem; margin-bottom:1rem; }
.inp-group { display:flex; flex-direction:column; gap:.3rem; }
.inp-group label { font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); }
.inp-group input[type=number] { padding:.5rem .7rem; border:1.5px solid var(--border); border-radius:7px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.9rem; width:100%; }
.inp-group input[type=number]:focus { outline:none; border-color:var(--green); }
.result-strip { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.5rem; }
.rstrip-item { background:var(--surface2); border-radius:8px; padding:.7rem; text-align:center; }
.rstrip-lbl { font-size:.64rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.2rem; }
.rstrip-val { font-family:'IBM Plex Mono',monospace; font-size:1rem; font-weight:700; }
.rstrip-val.fv { color:var(--green); }
.rstrip-val.pv { color:var(--gold); }
.timeline-wrap { overflow-x:auto; margin-top:1rem; padding-bottom:.5rem; }
.timeline-svg { display:block; min-width:400px; }
.step-box { background:var(--surface2); border-radius:8px; padding:.9rem 1rem; margin-top:.8rem; font-size:.84rem; color:var(--text2); border-left:3px solid var(--gold); }
.step-box strong { color:var(--text); }
.step-box .mono { font-family:'IBM Plex Mono',monospace; font-size:.8rem; color:var(--green-dark); }
.compare-table { width:100%; border-collapse:collapse; margin:.8rem 0; font-size:.85rem; }
.compare-table th { background:var(--green); color:#fff; padding:.5rem .8rem; text-align:left; font-weight:600; }
.compare-table td { padding:.5rem .8rem; border-bottom:1px solid var(--border); color:var(--text2); }
.compare-table tr:last-child td { border-bottom:none; }
.compare-table td.mono { font-family:'IBM Plex Mono',monospace; color:var(--green-dark); }
.compare-table tr.highlight td { background:var(--gold-bg); font-weight:600; color:var(--text); }
.diff-badge { display:inline-block; background:var(--gold-bg); color:#8a5c00; border:1px solid var(--gold); border-radius:6px; padding:.15rem .55rem; font-size:.78rem; font-weight:600; margin-left:.5rem; }
</style>
</head>

function seededRng(seed) {

    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ── CANVAS ── */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ── HANDLE MC — two-tap confirmation ── */
var pendingMC = {};

function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;

  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');

  if (pendingMC[probIdx] !== chosenIdx) {
    opts.forEach(function(o) { o.classList.remove('pending'); });
    opts[chosenIdx].classList.add('pending');
    pendingMC[probIdx] = chosenIdx;
    return;
  }

  delete pendingMC[probIdx];
  opts.forEach(function(o) { o.classList.remove('pending'); o.classList.add('dis'); });
  prob.studentChoice = chosenIdx;
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.style.background = '';
  fb.style.color = '';
  fb.innerHTML = (isOk ? '<strong>✓ Correct.</strong> ' : '<strong>✗ Incorrect.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

function fmtMoney(n) {

}

/* ── ANNUITY EXPLORER ── */
function buildExplorer(containerId, mode) {
  // mode: 'fv' | 'pv'
  var el = document.getElementById(containerId);
  if (!el) return;
  function calc() {
    var R = parseFloat(document.getElementById(containerId+'_R').value) || 0;
    var i = parseFloat(document.getElementById(containerId+'_i').value) / 100 || 0;
    var n = parseInt(document.getElementById(containerId+'_n').value) || 0;
    if (i <= 0 || n <= 0 || R <= 0) {
      document.getElementById(containerId+'_fv').textContent = '—';
      document.getElementById(containerId+'_pv').textContent = '—';
      document.getElementById(containerId+'_ord').textContent = '—';
      renderTimeline(containerId, R, i, n);
      renderSteps(containerId, R, i, n, mode);
      return;
    }
    var fvOrd = R * ((Math.pow(1+i, n) - 1) / i);
    var pvOrd = R * ((1 - Math.pow(1+i, -n)) / i);
    var fvDue = fvOrd * (1 + i);
    var pvDue = pvOrd * (1 + i);
    var activeTab = document.querySelector('#'+containerId+' .mtab.active');
    var showing = activeTab ? activeTab.dataset.mode : 'fv';
    document.getElementById(containerId+'_fv').textContent  = fmtMoney(fvDue);
    document.getElementById(containerId+'_pv').textContent  = fmtMoney(pvDue);
    document.getElementById(containerId+'_ord').textContent = fmtMoney(showing === 'fv' ? fvOrd : pvOrd);
    renderTimeline(containerId, R, i, n);
    renderSteps(containerId, R, i, n, showing);
  }

  el.innerHTML =
    '<h3>🔬 Interactive Formula Explorer</h3>' +
    '<div class="mtabs">' +
      '<button class="mtab active" data-mode="fv" onclick="switchExplorer(\''+containerId+'\',\'fv\',this)">Future Value (S̈)</button>' +

      '<div class="inp-group"><label>Rate per period (i) %</label><input type="number" id="'+containerId+'_i" value="5" step="0.1" min="0.01" oninput="calcExplorer(\''+containerId+'\')"></div>' +
      '<div class="inp-group"><label>Periods (n)</label><input type="number" id="'+containerId+'_n" value="4" min="1" max="30" oninput="calcExplorer(\''+containerId+'\')"></div>' +
    '</div>' +

      '<div class="rstrip-item"><div class="rstrip-lbl">Annuity Due result</div><div class="rstrip-val fv" id="'+containerId+'_fv">—</div></div>' +
      '<div class="rstrip-item"><div class="rstrip-lbl">Ordinary annuity</div><div class="rstrip-val ps" id="'+containerId+'_ord">—</div></div>' +
      '<div class="rstrip-item"><div class="rstrip-lbl">Present Value (Ä)</div><div class="rstrip-val pv" id="'+containerId+'_pv">—</div></div>' +
    '</div>' +
    '<div class="timeline-wrap"><svg class="timeline-svg" id="'+containerId+'_svg" height="90"></svg></div>' +

}

function calcExplorer(id) {
  var R = parseFloat(document.getElementById(id+'_R').value) || 0;
  var i = parseFloat(document.getElementById(id+'_i').value) / 100 || 0;
  var n = parseInt(document.getElementById(id+'_n').value) || 0;
  if (i <= 0 || n <= 0 || R <= 0) return;
  var fvOrd = R * ((Math.pow(1+i, n) - 1) / i);
  var pvOrd = R * ((1 - Math.pow(1+i, -n)) / i);
  var fvDue = fvOrd * (1 + i);
  var pvDue = pvOrd * (1 + i);
  var activeTab = document.querySelector('#'+id+' .mtab.active');
  var showing = activeTab ? activeTab.dataset.mode : 'fv';
  document.getElementById(id+'_fv').textContent  = fmtMoney(showing === 'fv' ? fvDue : pvDue);
  document.getElementById(id+'_ord').textContent = fmtMoney(showing === 'fv' ? fvOrd : pvOrd);
  document.getElementById(id+'_pv').textContent  = fmtMoney(pvDue);
  var fmEl = document.getElementById(id+'_formula');
  if (fmEl) fmEl.innerHTML = getFormulaWithNumbers(showing, R, i, n);

  renderSteps(id, R, i, n, showing);

function renderTimeline(id, R, i, n, mode) {

  var ticks = '';
  var labels = '';
  var pmts = '';
  var spacing = (W - 80) / (maxN);
  for (var t = 0; t <= maxN; t++) {
    var x = 40 + t * spacing;
    ticks += '<line x1="'+x+'" y1="40" x2="'+x+'" y2="50" stroke="var(--border)" stroke-width="2"/>';
    labels += '<text x="'+x+'" y="68" text-anchor="middle" font-size="11" fill="var(--text3)">'+t+'</text>';

  }
  svg.innerHTML =
    '<line x1="30" y1="45" x2="'+(W-10)+'" y2="45" stroke="var(--border)" stroke-width="2"/>' +
    '<polygon points="'+arrow+'" fill="var(--border)"/>' +
    ticks + pmts + labels +
    '<text x="'+(W-5)+'" y="50" font-size="10" fill="var(--text3)">t</text>' +
    '<text x="20" y="30" font-size="9" fill="var(--gold)" font-weight="600">↑ Payments at START of each period</text>';
}

function renderSteps(id, R, i, n, mode) {

  }

    explanation: 'n = ln[ (' + S8 + '×' + fmt(i8,2) + ') / (' + R8 + '×' + fmt(1+i8,2) + ') + 1 ] ÷ ln(' + fmt(1+i8,2) + ') = ' + fmt(n8exact,4) + ' → round up to ' + n8ans + ' periods.'
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── PROBLEM 9 — Solve for n (PV) ── */
  var R9   = [300, 400, 500, 600, 800][Math.floor(rng()*5)];
  var i9r  = [3, 4, 5, 6][Math.floor(rng()*4)];
  var i9   = i9r / 100;
  var n9target = 10 + Math.round(rng() * 8);   // target n = 10–18
  var A9   = Math.round(R9 * ((1-Math.pow(1+i9,-n9target))/i9) * (1+i9) / 100) * 100;
  var n9exact = -Math.log(1 - A9 * i9 / (R9 * (1+i9))) / Math.log(1+i9);
  var n9ans = Math.ceil(n9exact);
  var opts9raw = [n9ans + ' periods', (n9ans-1) + ' periods', (n9ans+1) + ' periods', (n9ans+2) + ' periods'];
  var opts9 = shuffle(opts9raw, rng);
  problems.push({
    title: 'How Many Payments? (PV)',
    questionText: 'A loan of <strong>$' + A9.toLocaleString() + '</strong> is repaid with payments of $' + R9 + ' at the <strong>beginning of each period</strong> at ' + i9r + '% per period. How many payments are needed to fully repay the loan?',
    fn: 'n = <span style="display:inline-block;text-align:center;vertical-align:middle;line-height:1.2;margin:0 .15rem"><span style="display:block;border-bottom:1px solid currentColor;padding:0 .2rem;font-size:.78rem">−ln( 1 − Ä·i / (R·(1+i)) )</span><span style="display:block;padding:0 .2rem;font-size:.78rem">ln(1+i)</span></span>',
    options: opts9,
    correctIdx: opts9.indexOf(n9ans + ' periods'),
    studentChoice: null,
    hint: 'Use the PV formula. Isolate (1+i)⁻ⁿ, apply ln, and remember the negative sign. Round up.',
    explanation: 'n = −ln[ 1 − (' + A9 + '×' + fmt(i9,2) + ') / (' + R9 + '×' + fmt(1+i9,2) + ') ] ÷ ln(' + fmt(1+i9,2) + ') = ' + fmt(n9exact,4) + ' → round up to ' + n9ans + ' periods.'
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ────────────────────────────────────────────
     FINAL ASSESSMENT (3 problems, no explanation)
  ──────────────────────────────────────────── */
  sec(
    '<div class="stag">Final Assessment</div>' +
    '<h2>Practice Problems</h2>' +
    '<p>Apply everything you have learned. No hints — work through each problem on your own before selecting an answer.</p>'
  );

  /* ── PROBLEM 5 ── */
  var R5  = 300 + Math.round(rng() * 14) * 50;
  var n5  = 5 + Math.round(rng() * 5);
  var i5r = [4,5,6,7,8][Math.floor(rng()*5)];
  var i5  = i5r / 100;
  var fvDue5 = R5 * ((Math.pow(1+i5,n5)-1)/i5) * (1+i5);
  var wrong5a = R5 * ((Math.pow(1+i5,n5)-1)/i5);
  var wrong5b = fvDue5 + R5;
  var wrong5c = fvDue5 * (1+i5);
  var opts5raw = [fmtMoney(fvDue5), fmtMoney(wrong5a), fmtMoney(wrong5b), fmtMoney(wrong5c)];
  var opts5 = shuffle(opts5raw, rng);
  problems.push({
    title: 'Savings Plan — FV',
    questionText: 'Maria saves $' + R5 + ' per quarter, depositing it at the <strong>beginning of each quarter</strong> into an account earning ' + i5r + '% per quarter. After ' + n5 + ' quarters, what is the total accumulated value?',
    fn: 'S̈ = R · <span style="display:inline-block;text-align:center;vertical-align:middle;line-height:1.2;margin:0 .15rem"><span style="display:block;border-bottom:1px solid currentColor;padding:0 .2rem;font-size:.78rem">(1+i)ⁿ − 1</span><span style="display:block;padding:0 .2rem;font-size:.78rem">i</span></span> · (1+i)',
    options: opts5,
    correctIdx: opts5.indexOf(fmtMoney(fvDue5)),
    studentChoice: null,
    hint: 'Remember: due FV = ordinary FV × (1+i).',
    explanation: 'S̈ = ' + R5 + ' × [(1+' + fmt(i5,2) + ')^' + n5 + ' − 1] / ' + fmt(i5,2) + ' × ' + fmt(1+i5,2) + ' = ' + fmtMoney(fvDue5) + '.'
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── PROBLEM 6 ── */
  var R6  = 800 + Math.round(rng() * 12) * 100;
  var n6  = 6 + Math.round(rng() * 6);
  var i6r = [3,4,5,6][Math.floor(rng()*4)];
  var i6  = i6r / 100;
  var pvDue6 = R6 * ((1-Math.pow(1+i6,-n6))/i6) * (1+i6);
  var wrong6a = R6 * ((1-Math.pow(1+i6,-n6))/i6);
  var wrong6b = R6 * n6;
  var wrong6c = pvDue6 / (1+i6) / (1+i6);
  var opts6raw = [fmtMoney(pvDue6), fmtMoney(wrong6a), fmtMoney(wrong6b), fmtMoney(wrong6c)];
  var opts6 = shuffle(opts6raw, rng);
  problems.push({
    title: 'Car Lease — PV',
    questionText: 'A car lease requires monthly payments of $' + R6 + ' at the <strong>beginning of each month</strong> for ' + n6 + ' months. The monthly interest rate is ' + i6r + '%. What is the present value of all lease payments?',
    fn: 'Ä = R · <span style="display:inline-block;text-align:center;vertical-align:middle;line-height:1.2;margin:0 .15rem"><span style="display:block;border-bottom:1px solid currentColor;padding:0 .2rem;font-size:.78rem">1 − (1+i)⁻ⁿ</span><span style="display:block;padding:0 .2rem;font-size:.78rem">i</span></span> · (1+i)',
    options: opts6,
    correctIdx: opts6.indexOf(fmtMoney(pvDue6)),
    studentChoice: null,
    hint: 'Step 1: ordinary PV. Step 2: multiply by (1+i).',
    explanation: 'Ä = ' + R6 + ' × [1 − (1+' + fmt(i6,2) + ')^−' + n6 + '] / ' + fmt(i6,2) + ' × ' + fmt(1+i6,2) + ' = ' + fmtMoney(pvDue6) + '.'
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── PROBLEM 7 ── */
  var fvTarget7 = (15 + Math.round(rng() * 10)) * 1000;
  var n7        = 4 + Math.round(rng() * 4);
  var i7r       = [5,6,8,10][Math.floor(rng()*4)];
  var i7        = i7r / 100;
  var rDue7     = fvTarget7 / (((Math.pow(1+i7,n7)-1)/i7) * (1+i7));
  var rOrd7     = fvTarget7 / ((Math.pow(1+i7,n7)-1)/i7);
  // conceptual question: which requires smaller payment?
  var diffPct = Math.round((rOrd7 - rDue7) / rOrd7 * 100);
  var opts7raw = [
    'Annuity due — ' + fmtMoney(rDue7) + ' per period',
    'Ordinary annuity — ' + fmtMoney(rOrd7) + ' per period',
    'Both require the same payment',
    'Ordinary annuity — $' + Math.round(fvTarget7/n7) + ' per period'
  ];
  var correct7 = 'Annuity due — ' + fmtMoney(rDue7) + ' per period';
  var opts7 = shuffle(opts7raw, rng);
  problems.push({
    title: 'Comparing Annuity Types',
    questionText: 'You need to accumulate ' + fmtMoney(fvTarget7) + ' in ' + n7 + ' years at ' + i7r + '% per year. Which plan requires the <strong>smaller annual payment</strong>, and what is that payment?',
    fn: 'R_due = R_ordinary / (1+i)',
    options: opts7,
    correctIdx: opts7.indexOf(correct7),
    studentChoice: null,
    hint: 'The annuity due payment is always R_ordinary / (1+i), which is always smaller.',
    explanation: 'Ordinary R = ' + fmtMoney(rOrd7) + '. Due R = ' + fmtMoney(rOrd7) + ' / ' + fmt(1+i7,2) + ' = ' + fmtMoney(rDue7) + '. Annuity due requires ~' + diffPct + '% less per period because each payment earns one extra period of interest.'
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── PROBLEM 10 — multi-step: find n then compute FV ── */
  var R10  = [200, 250, 300, 400][Math.floor(rng()*4)];
  var i10r = [4, 5, 6, 8][Math.floor(rng()*4)];
  var i10  = i10r / 100;
  var n10target = 6 + Math.round(rng() * 6);
  var S10  = Math.round(R10 * ((Math.pow(1+i10, n10target)-1)/i10) * (1+i10));
  var wrong10a = Math.round(R10 * ((Math.pow(1+i10, n10target)-1)/i10));         // forgot ×(1+i)
  var wrong10b = Math.round(R10 * ((Math.pow(1+i10, n10target+1)-1)/i10) * (1+i10)); // n+1
  var wrong10c = R10 * n10target;
  var opts10raw = [fmtMoney(S10), fmtMoney(wrong10a), fmtMoney(wrong10b), fmtMoney(wrong10c)];
  var opts10 = shuffle(opts10raw, rng);
  problems.push({
    title: 'FV After n Periods',
    questionText: 'Carlos makes deposits of $' + R10 + ' at the <strong>beginning of each year</strong> at ' + i10r + '% per year for <strong>' + n10target + ' years</strong>. What is the accumulated value at the end of year ' + n10target + '?',
    fn: 'S̈ = R · <span style="display:inline-block;text-align:center;vertical-align:middle;line-height:1.2;margin:0 .15rem"><span style="display:block;border-bottom:1px solid currentColor;padding:0 .2rem;font-size:.78rem">(1+i)ⁿ − 1</span><span style="display:block;padding:0 .2rem;font-size:.78rem">i</span></span> · (1+i)',
    options: opts10,
    correctIdx: opts10.indexOf(fmtMoney(S10)),
    studentChoice: null,
    hint: 'Apply S̈ directly. Do not forget the final \u00d7(1+i).',
    explanation: 'S̈ = ' + R10 + ' × [(1+' + fmt(i10,2) + ')^' + n10target + ' − 1] / ' + fmt(i10,2) + ' × ' + fmt(1+i10,2) + ' = ' + fmtMoney(S10) + '.'
  });
  buildOneCard(problems[problems.length-1], problems.length-1);

  /* ── PROBLEM 11 — multi-step real-world: PV of lease + solve for R ── */
  var pvLoan11 = (8 + Math.round(rng() * 12)) * 1000;
  var i11r     = [4, 5, 6][Math.floor(rng()*3)];
  var i11      = i11r / 100;
  var n11      = 12 + Math.round(rng() * 12);  // 12–24 months
  var pvOrd11Factor = (1 - Math.pow(1+i11, -n11)) / i11;
  var rDue11   = pvLoan11 / (pvOrd11Factor * (1+i11));
  var rOrd11   = pvLoan11 / pvOrd11Factor;
  var wrong11a = rOrd11;
  var wrong11b = pvLoan11 / n11;
  var wrong11c = rDue11 * (1+i11);
  var opts11raw = [fmtMoney(rDue11), fmtMoney(wrong11a), fmtMoney(wrong11b), fmtMoney(wrong11c)];
  var opts11 = shuffle(opts11raw, rng);
  problems.push({
    title: 'Monthly Lease Payment',
    questionText: 'A car valued at <strong>' + fmtMoney(pvLoan11) + '</strong> is financed with an annuity due. Payments are made at the <strong>beginning of each month</strong> for <strong>' + n11 + ' months</strong> at a monthly rate of ' + i11r + '%. What is the required monthly payment?',
    fn: 'R = <span style="display:inline-block;text-align:center;vertical-align:middle;line-height:1.2;margin:0 .15rem"><span style="display:block;border-bottom:1px solid currentColor;padding:0 .2rem;font-size:.78rem">Ä · i</span><span style="display:block;padding:0 .2rem;font-size:.78rem">[1 − (1+i)⁻ⁿ] · (1+i)</span></span>',
    options: opts11,
    correctIdx: opts11.indexOf(fmtMoney(rDue11)),
    studentChoice: null,
    hint: 'Solve for R from the PV formula. Or: find ordinary R first, then divide by (1+i).',
    explanation: 'Ordinary R = ' + fmtMoney(pvLoan11) + ' × ' + fmt(i11,2) + ' / [1−(1+' + fmt(i11,2) + ')^−' + n11 + '] = ' + fmtMoney(rOrd11) + '. Due R = ' + fmtMoney(rOrd11) + ' / ' + fmt(1+i11,2) + ' = ' + fmtMoney(rDue11) + '.'
  });
  buildOneCard(problems[problems.length-1], problems.length-1);
}

/* ── PDF ── */
async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.textContent = 'Generating PDF…';
  btn.disabled = true;

  var jspdf   = window.jspdf;
  var doc     = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW      = 215.9;
  var M       = 18;
  var TW      = PW - M * 2;
  var PH      = doc.internal.pageSize.height;
  var name    = studentData.name;
  var group   = studentData.group;
  var total   = problems.length;
  var pct     = Math.round(correctCount / total * 100);
  var dateStr = new Date().toLocaleString('en-US', { dateStyle:'long', timeStyle:'short' });

  var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
  var h = 0;
  for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
  var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

  function drawText(text, x, y, maxW, fontSize, fontName, fontStyle, colorArr) {
    doc.setFontSize(fontSize);
    doc.setFont(fontName || 'helvetica', fontStyle || 'normal');
    if (colorArr) doc.setTextColor(colorArr[0], colorArr[1], colorArr[2]);
    var lines = doc.splitTextToSize(String(text), maxW);
    lines.forEach(function(ln, li) { doc.text(ln, x, y + li * fontSize * 0.45); });
    return lines.length * fontSize * 0.45;
  }

  // COVER
  doc.setFillColor(201,168,76); doc.rect(0,0,PW,4,'F');
  doc.setFillColor(26,26,22);   doc.rect(0,4,PW,56,'F');
  doc.setTextColor(201,168,76); doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.text('Financial Mathematics  ·  Annuities Due', M, 17);
  doc.setTextColor(180,170,150); doc.setFont('helvetica','normal');
  doc.text('UNIVERSIDAD DE COLIMA  ·  ALEXIS', M, 24);
  doc.setTextColor(232,228,216); doc.setFontSize(19); doc.setFont('helvetica','bold');
  doc.text('Annuities Due', M, 41);
  doc.setTextColor(150,140,120); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Financial Mathematics  ·  ' + dateStr, M, 52);
  doc.setFillColor(201,168,76); doc.rect(0,60,PW,2,'F');

  doc.setFillColor(240,237,230); doc.roundedRect(M,68,TW,32,3,3,'F');
  doc.setTextColor(130,120,100); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
  doc.text('STUDENT', M+4, 77); doc.text('GROUP', 130, 77);
  doc.setTextColor(26,26,22); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text(name, M+4, 86); doc.text(group, 130, 86);
  doc.setTextColor(130,120,100); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
  doc.text('VERIFICATION CODE', M+4, 95);
  doc.setTextColor(74,124,63); doc.setFontSize(9); doc.setFont('courier','bold');
  doc.text(code, M+4, 102);

  var sc = pct>=70?[45,106,79]:pct>=50?[201,168,76]:[139,37,0];
  doc.setFillColor(255,255,255); doc.roundedRect(M,110,TW,48,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,110,TW,48,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(42); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 143, {align:'center'});
  doc.setTextColor(130,120,100); doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correct out of '+total+' questions', PW/2, 153, {align:'center'});

  doc.setFillColor(74,124,63); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.rect(M,166,TW,8,'F'); doc.text('PROBLEM SUMMARY', M+4, 172);
  var sy = 178;
  problems.forEach(function(prob, i) {
    var ok = document.getElementById('pc'+i).classList.contains('ok');
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M,sy,TW,10,2,2,'F');
    doc.setFillColor(ok?45:139, ok?106:37, ok?79:0);
    doc.circle(M+6, sy+5, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(26,26,22); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Problem '+(i+1)+': '+prob.title, M+12, sy+6.5);
    doc.setTextColor(ok?45:139, ok?106:37, ok?79:0);
    doc.text(ok?'Correct':'Incorrect', PW-M-24, sy+6.5);
    sy += 12;
  });

  // PER-PROBLEM PAGES
  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage();
    var wy = 0;

    doc.setFillColor(26,26,22); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(201,168,76); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(201,168,76); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Financial Mathematics  ·  Annuities Due', M, 10);
    doc.setTextColor(232,228,216); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problem '+(i+1)+' of '+total+'  —  '+prob.title, M, 17);
    wy = 25;

    var qRaw   = (prob.questionText||'').replace(/<[^>]+>/g,'');
    var qFn    = (prob.fn||'').replace(/<[^>]+>/g,'');
    doc.setFontSize(8.5);
    var qLines = doc.splitTextToSize(qRaw, TW-10);
    doc.setFontSize(7.5);
    var fnLines = doc.splitTextToSize(qFn, TW-10);
    var qBoxH = 8 + qLines.length*5 + (qFn ? fnLines.length*4.5+4 : 0) + 3;
    doc.setFillColor(240,237,230); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(74,124,63); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('QUESTION', M+4, wy+6);
    doc.setTextColor(26,26,22); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    var qy = wy+12;
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    if (qFn) {
      var fny = qy + qLines.length*5 + 2;
      doc.setTextColor(45,90,35); doc.setFontSize(7.5); doc.setFont('courier','bold');
      fnLines.forEach(function(ln,li){ doc.text(ln, M+4, fny+li*4.5); });
    }
    wy += qBoxH + 4;

    var isOk   = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = (prob.studentChoice != null) ? (prob.options[prob.studentChoice]||'—') : '—';
    var corr   = prob.options[prob.correctIdx]||'';
    var expRaw = (prob.explanation||'').replace(/<[^>]+>/g,'');

    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Student: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correct: '+corr,   TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solution: '+expRaw, TW-18).slice(0,4);
    var ansBoxH = 8 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;

    doc.setFillColor(isOk?232:255, isOk?240:232, isOk?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk?45:139, isOk?106:37, isOk?79:0);
    doc.circle(M+7, wy+8, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk?'✓':'✗', M+5.2, wy+10.5);

    var ay = wy+7;
    doc.setTextColor(26,26,22); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 3;
    doc.setTextColor(45,106,79); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 3;
    doc.setTextColor(90,85,80); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 5;

    doc.setFillColor(74,124,63); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('STUDENT WORK', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var iw   = TW;
        var ih   = Math.min(iw * ar, 68);
        doc.addImage(imgD, 'PNG', M, wy, iw, ih);
        wy += ih + 4;
      } catch(e) {}
    }

    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(26,26,22); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
      wy += 2;
    }

    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try {
        doc.addImage(pp.src, 'JPEG', M, wy, TW, 68);
        wy += 72;
      } catch(e) {}
    }
  }

  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(201,168,76); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,120,100); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Code: '+code+'  ·  Page '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('AnnuitiesDue_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Download Result PDF';
  btn.disabled  = false;
}
