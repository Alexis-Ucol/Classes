<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regresión Lineal Múltiple — Facultad de Economía</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ── */
:root {
  --green:      #4a7c3f;
  --green-dark: #2d5a27;
  --green-bg:   #eaf0e7;
  --gold:       #c9a84c;
  --gold-bg:    #faf3e0;
  --bg:         #f8f6f1;
  --surface:    #ffffff;
  --surface2:   #f0ede6;
  --border:     #ddd8cc;
  --text:       #1a1a16;
  --text2:      #4a4640;
  --text3:      #7a7468;
  --ok:         #2d6a4f;
  --ok-bg:      rgba(45,106,79,.10);
  --bad:        #8b2500;
  --bad-bg:     rgba(139,37,0,.08);
  --shadow:     0 4px 20px rgba(0,0,0,.09);
}
[data-theme="dark"] {
  --bg:#18181a; --surface:#242420; --surface2:#2e2e28;
  --border:#3a3830; --text:#e8e4da; --text2:#b0aa9e; --text3:#7a7468;
  --green-bg:#1a281a; --gold-bg:#241e0e;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; }
.wlogos { display:flex; justify-content:center; align-items:center; gap:1.4rem; margin-bottom:1.6rem; }
.wlogos img { height:50px; width:auto; object-fit:contain; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--green); }
.sbtn { width:100%; padding:.85rem; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--green-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }
.wfoot { margin-top:1rem; font-size:.75rem; color:var(--text3); }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.hlogos { display:flex; gap:.5rem; align-items:center; }
.hlogos img { height:26px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hchip { font-size:.7rem; background:var(--green-bg); color:var(--green-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--green); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--green-bg); border-left:4px solid var(--green); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--green-dark); }
.callout p { margin-bottom:0; }

/* ── RULE CARDS ── */
.rules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:.75rem; margin:1.1rem 0; }
.rcard { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.9rem; border-top:3px solid var(--green); }
.rname { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.rform { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--green-dark); font-weight:500; margin-bottom:.3rem; }
.rnote { font-size:.76rem; color:var(--text3); }

/* ── GRAPH CARD ── */
.gcrd { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.3rem; margin:.9rem 0; }
.cgrid { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:.9rem; }
@media(max-width:500px){ .cgrid { grid-template-columns:1fr; } }
.cg label { display:block; font-size:.73rem; color:var(--text3); margin-bottom:.25rem; }
.cg input[type=range] { width:100%; accent-color:var(--green); }
.cval { font-weight:600; color:var(--green); }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; margin-top:.9rem; }
.metric { background:var(--surface2); border-radius:8px; padding:.65rem; text-align:center; }
.mlbl { font-size:.66rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.15rem; }
.mnum { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; }
.mnum.cs { color:var(--green); }
.mnum.ps { color:var(--gold); }
.mnum.ts { color:var(--text); }

/* ── MODE TABS (graph toggles) ── */
.mtabs { display:flex; gap:.4rem; margin-bottom:.8rem; flex-wrap:wrap; }
.mtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.28rem .7rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.mtab.active, .mtab:hover { background:var(--green); color:#fff; border-color:var(--green); }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--green); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.76rem; color:var(--green-dark); margin-top:.45rem; font-weight:500; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--green); color:#fff; border-color:var(--green); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--green); color:#fff; border-color:var(--green); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--green); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--green); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--green); background:var(--green-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--green-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }
</style>
</head>

/* ================================================
   SEEDED RNG
   ================================================ */
function seededRng(seed) {
  var s = 0;
  for (var i = 0; i < seed.length; i++) s = (Math.imul(31, s) + seed.charCodeAt(i)) | 0;
  return function() {
    s = (s + 0x9e3779b9) | 0;
    var t = s ^ (s >>> 16);
    t = Math.imul(t, 0x21f0aaad);
    t ^= (t >>> 15);
    t = Math.imul(t, 0x735a2d97);
    return ((t ^ (t >>> 15)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

/* ================================================
   START
   ================================================ */
function startLesson() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var err   = document.getElementById('startErr');
  if (!name || !group) { err.textContent = 'Please fill in both fields.'; return; }
  err.textContent = '';
  studentData = { name: name, group: group };
  answeredCount = 0;
  correctCount  = 0;
  buildLesson(seededRng(name + group));
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  observeSections();
}

/* Call this after any dynamic content is added to lessonBody */
function observeSections() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

/* ================================================
   CANVAS
   ================================================ */
function initCanvas(canvas) {
  var dpr  = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#2d5a27';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return [src.clientX - r.left, src.clientY - r.top];
  }
  function onDown(e)  { e.preventDefault(); drawing = true; var p = getPos(e); lx = p[0]; ly = p[1]; }
  function onMove(e)  { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p[0],p[1]); ctx.stroke(); lx=p[0]; ly=p[1]; }
  function onUp()     { drawing = false; }
  canvas.addEventListener('mousedown',  onDown, { passive:false });
  canvas.addEventListener('mousemove',  onMove, { passive:false });
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, { passive:false });
  canvas.addEventListener('touchmove',  onMove, { passive:false });
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

/* ================================================
   TABS
   ================================================ */
function switchTab(idx, panel, btn) {
  var prefix = 'wp_' + idx + '_';
  document.querySelectorAll('[id^="' + prefix + '"]').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById(prefix + panel).classList.add('active');
  btn.closest('.wtabs').querySelectorAll('.wtab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

/* ================================================
   PHOTO
   ================================================ */
function handlePhoto(idx, input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('pp' + idx);
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('pz' + idx).style.opacity = '0.4';
  };
  reader.readAsDataURL(input.files[0]);
}

/* ================================================
   HINT
   ================================================ */
function toggleHint(idx) {
  document.getElementById('hint' + idx).classList.toggle('show');
}

/* ================================================
   SHOW RESULTS
   ================================================ */
function showResults() {
  var rb = document.getElementById('resultsBlock');
  if (!rb) return;
  var pct = Math.round(correctCount / problems.length * 100);
  var emoji = document.getElementById('scoreEmoji');
  var sm    = document.getElementById('scoreMsg');
  var sd    = document.getElementById('scoreDisplay');
  if (emoji) emoji.textContent = pct >= 70 ? '🎉' : '📝';
  if (sm)    sm.textContent    = pct >= 70 ? '¡Buen trabajo!' : 'Sigue practicando';
  if (sd)    sd.textContent    = correctCount + ' de ' + problems.length + ' correctas  ·  ' + pct + '%';
  rb.style.display = 'block';
  rb.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

/* ================================================
   ANSWER HANDLER
   ================================================ */
function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  prob.studentChoice = chosenIdx;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  opts.forEach(function(o) { o.classList.add('dis'); });
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correct.</strong> ' : '<strong>✗ Incorrect.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

/* ================================================
   BUILD PROBLEM CARDS
   Two modes:
   1. buildProblemCards()            — original batch mode, needs one
      #problemsContainer div in DOM, builds all problems into it.
   2. buildProblemCard(i, containerId) — interleaved mode: builds a
      single card for problems[i] into the element with containerId.
   Both modes share _buildCard(prob, i, container).
   ================================================ */
function _buildCard(prob, i, container) {
  var opts = prob.options.map(function(opt, oi) {
    return '<div class="mcopt" onclick="handleMC(' + i + ',' + oi + ')">' + opt + '</div>';
  }).join('');
  var card = document.createElement('div');
  card.className = 'pcrd';
  card.id = 'pc' + i;
  card.innerHTML =
    '<div class="phdr"><div class="pnum">' + (i+1) + '</div><div class="ptitle">' + prob.title + '</div></div>' +
    '<div class="pbody">' +
      '<div class="pstmt">' + prob.questionText + '<span class="pfn">' + (prob.fn||'') + '</span></div>' +
      '<div style="margin-bottom:.85rem">' +
        '<div class="wtabs">' +
          '<button class="wtab active" onclick="switchTab(' + i + ',\'draw\',this)">✏️ Draw</button>' +
          '<button class="wtab"        onclick="switchTab(' + i + ',\'type\',this)">⌨️ Type</button>' +
          '<button class="wtab"        onclick="switchTab(' + i + ',\'photo\',this)">📷 Photo</button>' +
        '</div>' +
        '<div class="wpanel active" id="wp_' + i + '_draw">' +
          '<div class="cvwrap">' +
            '<canvas class="dcanvas" id="dc' + i + '"></canvas>' +
            '<div class="ctoolbar">' +
              '<button class="tbtn2 bpen on">🖊 Pen</button>' +
              '<button class="tbtn2 bmarker">🖌 Marker</button>' +
              '<button class="tbtn2 beraser">⬜ Eraser</button>' +
              '<div class="cdot sel" data-color="#2d5a27" style="background:#2d5a27"></div>' +
              '<div class="cdot"     data-color="#1a1a16" style="background:#1a1a16"></div>' +
              '<div class="cdot"     data-color="#8b2500" style="background:#8b2500"></div>' +
              '<div class="cdot"     data-color="#1d4e89" style="background:#1d4e89"></div>' +
              '<button class="clrbtn">🗑 Clear</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="wpanel" id="wp_' + i + '_type">' +
          '<textarea class="wtextarea" id="ta' + i + '" placeholder="Show your steps here..."></textarea>' +
        '</div>' +
        '<div class="wpanel" id="wp_' + i + '_photo">' +
          '<div class="pzone" id="pz' + i + '">' +
            '<input type="file" accept="image/*" onchange="handlePhoto(' + i + ',this)">' +
            '<div class="pzicon">📸</div>' +
            '<div class="pztxt">Tap to <strong>choose an image</strong> or take a photo</div>' +
          '</div>' +
          '<img class="ppreview" id="pp' + i + '" alt="student work">' +
        '</div>' +
      '</div>' +
      '<button class="hintbtn" onclick="toggleHint(' + i + ')">💡 Show hint</button>' +
      '<div class="hintbox" id="hint' + i + '">' + (prob.hint||'') + '</div>' +
      '<div style="margin-top:.7rem">' +
        '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:.5rem">Select your answer:</div>' +
        '<div class="mcopts">' + opts + '</div>' +
        '<div class="mcfb" id="fb' + i + '"></div>' +
      '</div>' +
    '</div>';
  container.appendChild(card);
  setTimeout(function() {
    var c = document.getElementById('dc' + i);
    if (c) initCanvas(c);
  }, 80);
}

/* Batch mode — original behaviour */
function buildProblemCards() {
  var container = document.getElementById('problemsContainer');
  if (!container) return;
  container.innerHTML = '';
  problems.forEach(function(prob, i) { _buildCard(prob, i, container); });
}

/* Interleaved mode — place one card into any container by id */
function buildProblemCard(probIndex, containerId) {
  var container = document.getElementById(containerId);
  if (!container) return;
  _buildCard(problems[probIndex], probIndex, container);
}

/* ================================================
   PDF
   ================================================ */
async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.textContent = 'Generating PDF…';
  btn.disabled = true;

  var jspdf   = window.jspdf;
  var doc     = new jspdf.jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW      = 215.9;
  var M       = 18;
  var TW      = PW - M * 2;
  var PH      = doc.internal.pageSize.height;
  var name    = studentData.name;
  var group   = studentData.group;
  var total   = problems.length;
  var pct     = Math.round(correctCount / total * 100);
  var dateStr = new Date().toLocaleString('en-US', { dateStyle:'long', timeStyle:'short' });

  // verification code
  var raw = name + '|' + group + '|' + correctCount + '|' + total + '|' + new Date().toDateString();
  var h = 0;
  for (var ci = 0; ci < raw.length; ci++) h = (Math.imul(31, h) + raw.charCodeAt(ci)) | 0;
  var code = Math.abs(h).toString(36).toUpperCase().slice(0, 8);

  /* util: split text, draw it, return height used */
  function drawText(text, x, y, maxW, fontSize, fontName, fontStyle, colorArr) {
    doc.setFontSize(fontSize);
    doc.setFont(fontName || 'helvetica', fontStyle || 'normal');
    if (colorArr) doc.setTextColor(colorArr[0], colorArr[1], colorArr[2]);
    var lines = doc.splitTextToSize(String(text), maxW);
    lines.forEach(function(ln, li) { doc.text(ln, x, y + li * fontSize * 0.45); });
    return lines.length * fontSize * 0.45;
  }

  /* util: measure text height without drawing */
  function measureText(text, maxW, fontSize) {
    doc.setFontSize(fontSize);
    return doc.splitTextToSize(String(text), maxW).length * fontSize * 0.45;
  }

  // ── COVER ──
  doc.setFillColor(201,168,76); doc.rect(0,0,PW,4,'F');
  doc.setFillColor(26,26,22);   doc.rect(0,4,PW,56,'F');
  doc.setTextColor(201,168,76); doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.text('Econometría  ·  Regresión Lineal Múltiple', M, 17);
  doc.setTextColor(180,170,150); doc.setFont('helvetica','normal');
  doc.text('UNIVERSIDAD DE COLIMA  ·  ALEXIS', M, 24);
  doc.setTextColor(232,228,216); doc.setFontSize(19); doc.setFont('helvetica','bold');
  doc.text('Regresión Lineal Múltiple', M, 41);
  doc.setTextColor(150,140,120); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Econometría  ·  ' + dateStr, M, 52);
  doc.setFillColor(201,168,76); doc.rect(0,60,PW,2,'F');

  // student info box
  doc.setFillColor(240,237,230); doc.roundedRect(M,68,TW,32,3,3,'F');
  doc.setTextColor(130,120,100); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
  doc.text('STUDENT', M+4, 77); doc.text('GROUP', 130, 77);
  doc.setTextColor(26,26,22); doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text(name, M+4, 86); doc.text(group, 130, 86);
  doc.setTextColor(130,120,100); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
  doc.text('VERIFICATION CODE', M+4, 95);
  doc.setTextColor(74,124,63); doc.setFontSize(9); doc.setFont('courier','bold');
  doc.text(code, M+4, 102);

  // score box
  var sc = pct>=70?[45,106,79]:pct>=50?[201,168,76]:[139,37,0];
  doc.setFillColor(255,255,255); doc.roundedRect(M,110,TW,48,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,110,TW,48,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(42); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 143, {align:'center'});
  doc.setTextColor(130,120,100); doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correct out of '+total+' questions', PW/2, 153, {align:'center'});

  // summary table
  doc.setFillColor(74,124,63); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.rect(M,166,TW,8,'F'); doc.text('PROBLEM SUMMARY', M+4, 172);
  var sy = 178;
  problems.forEach(function(prob, i) {
    var ok = document.getElementById('pc'+i).classList.contains('ok');
    // measure title — truncate if it would overlap the result label
    doc.setFontSize(8); doc.setFont('helvetica','normal');
    var maxTitleW = TW - 12 - 28; // leave room for bullet + "Correct/Incorrect"
    var titleStr = 'Problem '+(i+1)+': '+prob.title;
    var titleLines = doc.splitTextToSize(titleStr, maxTitleW);
    var rowH = Math.max(10, titleLines.length * 4.5 + 4);
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M,sy,TW,rowH,2,2,'F');
    doc.setFillColor(ok?45:139, ok?106:37, ok?79:0);
    doc.circle(M+6, sy+rowH/2, 2.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+rowH/2+1.5);
    doc.setTextColor(26,26,22); doc.setFontSize(8); doc.setFont('helvetica','normal');
    titleLines.forEach(function(ln, li) { doc.text(ln, M+12, sy+6+li*4.5); });
    doc.setTextColor(ok?45:139, ok?106:37, ok?79:0);
    doc.setFontSize(7.5);
    doc.text(ok?'Correct':'Incorrect', PW-M-22, sy+rowH/2+1.5, {align:'right'});
    sy += rowH + 2;
  });

  // ── PER-PROBLEM PAGES ──
  // jsPDF line height: font size in pt × 0.3528 = mm per line (approx)
  // We use a safe multiplier of 0.4 mm/pt to give comfortable leading
  function lineH(pt) { return pt * 0.40; }

  // Draw a filled rounded box and return its bottom y
  function box(fillRGB, x, y, w, h, r) {
    doc.setFillColor(fillRGB[0], fillRGB[1], fillRGB[2]);
    doc.roundedRect(x, y, w, h, r, r, 'F');
    return y + h;
  }

  // Split text, set font, return lines array — keeps font state consistent
  function split(text, pt, w, font, style) {
    doc.setFontSize(pt);
    doc.setFont(font || 'helvetica', style || 'normal');
    return doc.splitTextToSize(String(text), w);
  }

  // Draw wrapped lines — font/style MUST match what was passed to split()
  function drawLines(lines, pt, x, startY, color, font, style) {
    doc.setFontSize(pt);
    doc.setFont(font || 'helvetica', style || 'normal');
    if (color) doc.setTextColor(color[0], color[1], color[2]);
    var lh = lineH(pt);
    lines.forEach(function(ln, i) { doc.text(ln, x, startY + i * lh); });
    return startY + lines.length * lh;
  }

  var FOOT   = 12;          // mm reserved at page bottom for footer
  var SAFE   = PH - FOOT;   // last safe y position

  function ensureSpace(wy, needed) {
    if (wy + needed > SAFE) { doc.addPage(); return 22; }
    return wy;
  }

  for (var i = 0; i < problems.length; i++) {
    var prob = problems[i];
    doc.addPage();

    // ── PAGE HEADER ──
    doc.setFillColor(26,26,22);  doc.rect(0, 0, PW, 22, 'F');
    doc.setFillColor(201,168,76); doc.rect(0, 0, PW, 3,  'F');
    doc.setTextColor(201,168,76); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('Econometría  ·  Regresión Lineal Múltiple', M, 11);
    // header title — split so it never overflows
    var hdrStr   = 'Pregunta ' + (i+1) + ' de ' + total + '  —  ' + prob.title;
    var hdrLines = split(hdrStr, 9, TW, 'helvetica', 'bold');
    doc.setTextColor(232,228,216);
    hdrLines.slice(0,2).forEach(function(ln, li) { doc.text(ln, M, 18 + li * lineH(9)); });
    var wy = 27;

    // Strip HTML tags helper
    function stripHTML(s) { return (s||'').replace(/<[^>]+>/g, ''); }

    var qRaw  = stripHTML(prob.questionText);
    var qFn   = stripHTML(prob.fn);
    var INN   = TW - 8;   // inner width for text inside boxes (4mm padding each side)
    var INN2  = TW - 18;  // inner width for answer box (14mm left indent for bullet)

    // ── QUESTION BOX ──
    var qLines  = split(qRaw, 8.5, INN);
    var fnLines = qFn ? split(qFn, 7.5, INN, 'courier', 'bold') : [];

    var qBoxH = 7                           // top label area
      + qLines.length  * lineH(8.5) + 2    // question text
      + (fnLines.length ? fnLines.length * lineH(7.5) + 3 : 0)  // formula
      + 4;                                  // bottom padding

    wy = ensureSpace(wy, qBoxH);
    box([240,237,230], M, wy, TW, qBoxH, 2);

    doc.setTextColor(74,124,63); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+5.5);

    var qy = wy + 9;
    doc.setFont('helvetica','normal');
    qy = drawLines(qLines, 8.5, M+4, qy, [26,26,22], 'helvetica', 'normal');
    qy += 2;
    if (fnLines.length) {
      doc.setFont('courier','bold');
      qy = drawLines(fnLines, 7.5, M+4, qy, [45,90,35], 'courier', 'bold');
    }
    wy += qBoxH + 4;

    // ── ANSWER BOX ──
    var isOk   = document.getElementById('pc'+i).classList.contains('ok');
    var chosen = (prob.studentChoice != null) ? (prob.options[prob.studentChoice]||'—') : '— (sin respuesta)';
    var corr   = prob.options[prob.correctIdx] || '';
    var expRaw = stripHTML(prob.explanation);

    var chLines = split('Respuesta del estudiante: ' + chosen,  8.5, INN2);
    var coLines = split('Respuesta correcta: '        + corr,   8,   INN2);
    var exLines = split('Explicación: '               + expRaw, 7.5, INN2);

    var ansBoxH = 8                               // top padding / bullet area
      + chLines.length * lineH(8.5) + 3
      + coLines.length * lineH(8)   + 3
      + exLines.length * lineH(7.5)
      + 5;                                        // bottom padding

    wy = ensureSpace(wy, ansBoxH);

    var okGreen = [45,106,79]; var badRed = [139,37,0];
    var bgColor = isOk ? [232,240,232] : [255,232,228];
    box(bgColor, M, wy, TW, ansBoxH, 2);

    // bullet circle
    var dotColor = isOk ? okGreen : badRed;
    doc.setFillColor(dotColor[0], dotColor[1], dotColor[2]);
    doc.circle(M+7, wy+9, 3.5, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk ? '✓' : '✗', M+5.3, wy+11);

    var ay = wy + 8;
    doc.setFont('helvetica','bold');
    ay = drawLines(chLines, 8.5, M+14, ay, [26,26,22], 'helvetica', 'bold');
    ay += 3;
    doc.setFont('helvetica','normal');
    ay = drawLines(coLines, 8, M+14, ay, okGreen, 'helvetica', 'normal');
    ay += 3;
    drawLines(exLines, 7.5, M+14, ay, [90,85,80], 'helvetica', 'normal');
    wy += ansBoxH + 5;

    // ── STUDENT WORK LABEL ──
    wy = ensureSpace(wy, 20);
    doc.setFillColor(74,124,63); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M, wy, TW, 7, 'F');
    doc.text('TRABAJO DEL ESTUDIANTE', M+4, wy+5);
    wy += 10;

    // ── DRAWING ──
    var dc = document.getElementById('dc'+i);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar   = dc.height / dc.width;
        var ih   = Math.min(TW * ar, 65);
        wy = ensureSpace(wy, ih + 4);
        doc.addImage(imgD, 'PNG', M, wy, TW, ih);
        wy += ih + 4;
      } catch(e) {}
    }

    // ── TYPED TEXT ──
    var ta = document.getElementById('ta'+i);
    if (ta && ta.value.trim()) {
      var taLines = split(ta.value, 8, TW, 'courier', 'normal');
      taLines.forEach(function(ln) {
        wy = ensureSpace(wy, lineH(8) + 2);
        doc.setFontSize(8); doc.setFont('courier','normal');
        doc.setTextColor(26,26,22);
        doc.text(ln, M, wy);
        wy += lineH(8);
      });
      wy += 2;
    }

    // ── PHOTO ──
    var pp = document.getElementById('pp'+i);
    if (pp && pp.src && pp.src.indexOf('data:') === 0) {
      wy = ensureSpace(wy, 55);
      try {
        doc.addImage(pp.src, 'JPEG', M, wy, TW, 65);
        wy += 69;
      } catch(e) {}
    }
  }

  // ── FOOTERS ──
  var pages = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFillColor(201,168,76); doc.rect(0, PH-3, PW, 3, 'F');
    doc.setTextColor(130,120,100); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Code: '+code+'  ·  Page '+p+'/'+pages,
      PW/2, PH-5, {align:'center'});
  }

  doc.save('regresion_multiple_' + name.replace(/\s+/g,'_') + '_' + group.replace(/\s+/g,'_') + '.pdf');
  btn.innerHTML = '⬇ &nbsp;Descargar PDF de resultados';
  btn.disabled  = false;
}

/* ================================================
   shuffleOpts — randomise answer order per student
   ================================================ */
function shuffleOpts(opts, correctIdx, rng) {
  var correct = opts[correctIdx];
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

/* ================================================
   buildLesson — Regresión Lineal Múltiple
   Structure (INTERLEAVED):
     Concepto 1 → Problema 1
     Concepto 2 → Problema 2a → Problema 2b
     Concepto 3 → Problema 3
     Concepto 4 → Problema 4
     Bloque final (3 problemas sin explicación previa)
   ================================================ */

/* ================================================
   buildLesson — Regresión Lineal Múltiple
   ALL numeric values generated from rng() so every
   student gets a unique set of numbers.
   ================================================ */
function buildLesson(rng) {

  problems = [];

  /* ── Generate model coefficients from rng() ── */
  // β0: intercept 3000–7000, step 100
  var b0 = 3000 + Math.round(rng() * 40) * 100;
  // β1 (Experiencia): 500–1200, step 50
  var b1 = 500  + Math.round(rng() * 14) * 50;
  // β2 (Educación): 900–1800, step 50
  var b2 = 900  + Math.round(rng() * 18) * 50;
  // β3 (Distancia): -300 to -100, step 25
  var b3 = -(100 + Math.round(rng() * 8) * 25);

  // Worked example values for concept 3
  var ex_exp  = 2 + Math.floor(rng() * 5);          // 2–6
  var ex_edu  = 10 + Math.floor(rng() * 5);          // 10–14
  var ex_dist = 2  + Math.floor(rng() * 7);          // 2–8
  var ex_sal  = b0 + b1*ex_exp + b2*ex_edu + b3*ex_dist;

  // Problem 3 values (prediction): different from worked example
  var p3_exp  = ex_exp  + 1 + Math.floor(rng() * 3);  // slightly higher
  var p3_edu  = ex_edu  + 2 + Math.floor(rng() * 3);
  var p3_dist = ex_dist + 2 + Math.floor(rng() * 5);
  var p3_ans  = b0 + b1*p3_exp + b2*p3_edu + b3*p3_dist;

  // Household model coefficients — TRUE OLS values from the hardcoded 12-observation dataset
  // Computed via least squares: matches what students will see in StatsBlue
  var hb0 = 241;    // β₀ intercept
  var hb1 = 0.20;   // β₁ income coefficient (per MXN of monthly income)
  var hb2 = 62;     // β₂ members coefficient (per household member)

  // Problem 4 prediction values
  var p4_inc  = 10000 + Math.round(rng() * 16) * 1000; // 10000–26000
  var p4_mem  = 2 + Math.floor(rng() * 4);              // 2–5
  var p4_ans  = hb0 + hb1*p4_inc + hb2*p4_mem;

  // Helper: format number with commas, round to nearest integer
  function fmt(n) {
    return Math.round(n).toLocaleString('es-MX');
  }
  function fmtDec(n, d) {
    return n.toFixed(d);
  }

  // Helper: generate 3 wrong answers that are plausible but clearly distinct
  function wrongNums(correct, rng) {
    var offsets = [
      Math.round((500  + rng() * 1500) / 100) * 100,
      Math.round((1800 + rng() * 2000) / 100) * 100,
      Math.round((3200 + rng() * 1500) / 100) * 100
    ];
    // alternate signs so wrongs spread around the correct value
    return [
      correct + offsets[0],
      correct - offsets[1],
      correct + offsets[2]
    ];
  }

  var lb = document.getElementById('lessonBody');

      '$' + fmt(p3_ans) + ' MXN',
      '$' + fmt(p3_wrongs[0]) + ' MXN',
      '$' + fmt(p3_wrongs[1]) + ' MXN',
      '$' + fmt(p3_wrongs[2]) + ' MXN'
    ],
    correctIdx: 0,
    hint: fmt(b0) + ' + ' + fmt(b1) + '×' + p3_exp + ' + ' + fmt(b2) + '×' + p3_edu + ' ' + (b3<0?'− '+fmt(-b3):'+'+fmt(b3)) + '×' + p3_dist + '. Multiplica cada término primero, luego suma.',
    explanation: 'Ŷ = ' + fmt(b0) + ' + ' + fmt(b1*p3_exp) + ' + ' + fmt(b2*p3_edu) + ' ' + (b3<0?'− '+fmt(-b3*p3_dist):'+'+fmt(b3*p3_dist)) + ' = $' + fmt(p3_ans) + ' MXN. Error común: olvidar aplicar el signo del término de distancia.'
  });

  /* ══════════════════════════════════════════════
     CONCEPTO 4 — Estimación con datos reales
  ══════════════════════════════════════════════ */
  sec('s_datos', 'Parte 4 · Estimación', 'Obtener la regresión a partir de datos',
    '<p>En la práctica los coeficientes <strong>no se inventan</strong> — se estiman mediante mínimos cuadrados ordinarios (MCO) a partir de datos reales. Usaremos una calculadora en línea.</p>' +
    '<div style="background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:12px;padding:1.1rem 1.3rem;margin:.8rem 0;">' +
      '<div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);font-weight:700;margin-bottom:.4rem;">🔗 Calculadora</div>' +
      '<a href="https://stats.blue/Stats_Suite/multiple_linear_regression_calculator.html" target="_blank" style="color:var(--green-dark);font-weight:600;">stats.blue — Multiple Linear Regression Calculator</a>' +
      '<p style="margin:.5rem 0 0;font-size:.82rem;color:var(--text2);">Ábrela en una pestaña aparte antes de continuar.</p>' +
    '</div>' +
    '<p><strong>Caso de estudio:</strong> Explicar el <strong>Gasto Mensual en Alimentos</strong> de 12 hogares usando el <strong>Ingreso Mensual</strong> y el <strong>Número de Integrantes del Hogar</strong>.</p>' +
    dataTable(
      ['Obs.','Gasto en Alimentos — Y (MXN)','Ingreso Mensual (MXN)','Integrantes del Hogar'],
      [
        ['1','2800','12000','2'],['2','3500','15500','3'],['3','4200','18000','4'],
        ['4','3100','13500','2'],['5','5600','24000','5'],['6','4800','21000','4'],
        ['7','2500','10500','2'],['8','6200','28000','6'],['9','3900','17000','3'],
        ['10','5100','22500','5'],['11','4400','19500','4'],['12','3300','14000','3']
      ],
      'Tabla 1. Ingresa los valores sin símbolo $ ni comas de miles en la calculadora.'
    ) +
    '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.3rem;margin:1rem 0;">' +
      '<div style="font-size:.78rem;font-weight:700;color:var(--green-dark);margin-bottom:.7rem;">📋 Instrucciones paso a paso</div>' +
      '<ol style="padding-left:1.2rem;font-size:.87rem;color:var(--text2);line-height:2.1;">' +
        '<li>Abre la calculadora en una nueva pestaña.</li>' +
        '<li>En <strong>"Y"</strong>: <code>2800, 3500, 4200, 3100, 5600, 4800, 2500, 6200, 3900, 5100, 4400, 3300</code></li>' +
        '<li>En <strong>"X1"</strong>: <code>12000, 15500, 18000, 13500, 24000, 21000, 10500, 28000, 17000, 22500, 19500, 14000</code></li>' +
        '<li>En <strong>"X2"</strong>: <code>2, 3, 4, 2, 5, 4, 2, 6, 3, 5, 4, 3</code></li>' +
        '<li>Clic en <strong>"Calculate"</strong> → localiza <strong>"Regression Equation"</strong> en los resultados.</li>' +
        '<li>Anota β₀, β₁ y β₂ — los usarás en el siguiente problema.</li>' +
      '</ol>' +
    '</div>' +
    '<div style="background:var(--surface2);border-radius:10px;padding:1rem 1.2rem;margin:.8rem 0;">' +
      '<div style="font-size:.75rem;color:var(--text3);margin-bottom:.4rem;">Resultado aproximado esperado</div>' +
      '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.9rem;color:var(--green-dark);font-weight:600;">' + hEqn + '</div>' +
    '</div>' +
    callout('<strong>Predicción de ejemplo:</strong> Hogar con Ingreso=$20,000 y 4 integrantes:<br>Ŷ = ' + fmt(hb0) + ' + ' + fmtDec(hb1,2) + '(20,000) + ' + fmt(hb2) + '(4) = <strong>$' + fmt(hb0 + hb1*20000 + hb2*4) + ' MXN</strong>')
  );

  /* ── Problema 4 — variables del modelo de hogares ── */
  pushAndBuild({
    title: 'Variables del modelo de hogares',
    questionText: 'En el modelo donde explicamos el <strong>Gasto en Alimentos</strong> con Ingreso e Integrantes, ¿cuál afirmación es correcta?',
    fn: 'Gasto en Alimentos = β₀ + β₁·Ingreso + β₂·Integrantes + ε',
    options: [
      'Gasto en Alimentos es Y (dependiente); Ingreso e Integrantes son X (independientes).',
      'Ingreso Mensual es Y porque es el que más influye en el gasto.',
      'Todas las variables son dependientes porque se relacionan entre sí.',
      'ε es la variable dependiente porque resume todo lo que no explicamos.'
    ],
    correctIdx: 0,
    hint: 'La variable dependiente (Y) es siempre la que queremos explicar o predecir.',
    explanation: 'Y es el fenómeno de interés — aquí el Gasto en Alimentos. Las X son los factores explicativos. ε es el error, no una variable del modelo.'
  });

  /* ══════════════════════════════════════════════
     BLOQUE FINAL — sin explicación previa
  ══════════════════════════════════════════════ */
  var finalHeader = document.createElement('div');
  finalHeader.className = 'section';
  finalHeader.id = 's_final_hdr';
  finalHeader.innerHTML =
    '<div class="stag">🎯 Consolidación · Problemas finales</div>' +
    '<h2>Pon a prueba todo lo aprendido</h2>' +
    '<p style="color:var(--text2);margin-bottom:1.2rem;">Demuestra que dominas todos los conceptos de la sesión. No hay explicación adicional — confía en lo que aprendiste.</p>';
  lb.appendChild(finalHeader);

  /* Final 5 — intercepto */
  pushAndBuild({
    title: 'El intercepto',
    questionText: 'En tu modelo, β₀ = ' + fmt(b0) + '. ¿Qué representa ese valor?',
    fn: eqn,
    options: [
      'El salario estimado cuando Experiencia, Educación y Distancia son todos iguales a cero.',
      'El salario mínimo garantizado por el modelo para cualquier trabajador.',
      'La suma de todos los coeficientes del modelo.',
      'El error promedio de la regresión.'
    ],
    correctIdx: 0,
    hint: 'El intercepto es el valor de Ŷ cuando todas las X valen cero.',
    explanation: 'β₀ = ' + fmt(b0) + ' es el punto de partida: el valor de Ŷ cuando Experiencia = Educación = Distancia = 0. Su interpretación económica puede ser limitada si X=0 es imposible en la realidad.'
  });

  /* Final 6 — comparar coeficientes */
  var bigger = b1 > b2 ? 'Experiencia (β₁ = ' + fmt(b1) + ')' : 'Educación (β₂ = ' + fmt(b2) + ')';
  var smaller = b1 > b2 ? 'Educación (β₂ = ' + fmt(b2) + ')' : 'Experiencia (β₁ = ' + fmt(b1) + ')';
  pushAndBuild({
    title: 'Comparar coeficientes',
    questionText: 'Comparando β₁ = ' + fmt(b1) + ' (Experiencia) y β₂ = ' + fmt(b2) + ' (Educación), ¿qué podemos concluir sobre el impacto marginal de cada variable?',
    fn: eqn,
    options: [
      'Un año adicional de ' + bigger + ' tiene mayor impacto marginal en el salario que un año de ' + smaller + ', ceteris paribus.',
      'Ambas variables tienen el mismo efecto porque los dos coeficientes son positivos.',
      'No se pueden comparar los coeficientes si las variables se miden en unidades distintas.',
      'La variable con el coeficiente más pequeño no afecta el salario.'
    ],
    correctIdx: 0,
    hint: 'Cuando dos variables se miden en las mismas unidades (años), sí podemos comparar directamente la magnitud de sus coeficientes.',
    explanation: 'Como Experiencia y Educación se miden en años, sus coeficientes son directamente comparables. ' + bigger + ' > ' + smaller + ', por lo que genera mayor incremento salarial por año adicional.'
  });

  /* Final 7 — predicción con modelo de hogares */
  var p4_wrongs = wrongNums(p4_ans, rng);
  pushAndBuild({
    title: 'Predicción con el modelo de hogares',
    questionText: 'Usando la ecuación obtenida con la calculadora, estima el gasto en alimentos de un hogar con ingreso de $' + fmt(p4_inc) + ' y ' + p4_mem + ' integrantes.',
    fn: hEqn,
    options: [
      '$' + fmt(p4_ans) + ' MXN',
      '$' + fmt(p4_wrongs[0]) + ' MXN',
      '$' + fmt(p4_wrongs[1]) + ' MXN',
      '$' + fmt(p4_wrongs[2]) + ' MXN'
    ],
    correctIdx: 0,
    hint: fmt(hb0) + ' + ' + fmtDec(hb1,2) + '×' + fmt(p4_inc) + ' + ' + fmt(hb2) + '×' + p4_mem + '. Resuelve primero los productos.',
    explanation: 'Ŷ = ' + fmt(hb0) + ' + ' + fmtDec(hb1,2) + '(' + fmt(p4_inc) + ') + ' + fmt(hb2) + '(' + p4_mem + ') = ' + fmt(hb0) + ' + ' + fmt(hb1*p4_inc) + ' + ' + fmt(hb2*p4_mem) + ' = $' + fmt(p4_ans) + ' MXN.'
  });

  /* ══════════════════════════════════════════════
     RESULTADOS
  ══════════════════════════════════════════════ */
  var rDiv = document.createElement('div');
  rDiv.id = 's_results';
  rDiv.style.cssText = 'margin-bottom:2.8rem;';
  rDiv.innerHTML =
    '<div class="stag">Cierre · Resultados</div>' +
    '<h2 style="font-family:\'Crimson Pro\',serif;font-size:1.65rem;font-weight:700;margin-bottom:.7rem;">Resumen de la sesión</h2>' +
    '<div class="rpanel" id="resultsBlock" style="display:none;text-align:center;padding:2rem;">' +
      '<button class="dlbtn" id="dlBtn" onclick="generatePDF()">⬇ &nbsp;Descargar PDF de resultados</button>' +
    '</div>';
  lb.appendChild(rDiv);

  observeSections();
}
</script>
</body>
</html>
