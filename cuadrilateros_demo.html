<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Áreas de Cuadriláteros — Demo Liaxa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS — Teal + Gold palette ── */
:root {
  --teal:       #1a7a6e;
  --teal-dark:  #0f5249;
  --teal-bg:    #e6f4f2;
  --gold:       #c9a84c;
  --gold-bg:    #fdf7e8;
  --bg:         #f4f9f8;
  --surface:    #ffffff;
  --surface2:   #ecf5f3;
  --border:     #cde0dd;
  --text:       #121e1c;
  --text2:      #2e4a46;
  --text3:      #5e807c;
  --ok:         #1a6a4a;
  --ok-bg:      rgba(26,106,74,.10);
  --bad:        #b03010;
  --bad-bg:     rgba(176,48,16,.08);
  --shadow:     0 4px 24px rgba(26,122,110,.13);
}
[data-theme="dark"] {
  --bg:#141e1d; --surface:#1e2e2c; --surface2:#263530;
  --border:#2e4440; --text:#deecea; --text2:#9abfbb; --text3:#6a9490;
  --teal-bg:#0f2a26; --gold-bg:#1e1a0a;
  --ok:#4a9a6f; --ok-bg:rgba(74,154,111,.12);
  --bad:#c05030; --bad-bg:rgba(192,80,48,.10);
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); line-height:1.65; }

/* ── WELCOME ── */
#welcomeScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; }
.wcard { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); padding:2.4rem 2rem; width:100%; max-width:460px; text-align:center; border-top:4px solid var(--gold); }
.wlogo-placeholder { display:flex; align-items:center; justify-content:center; height:110px; background:var(--surface2); border-radius:10px; border:2px dashed var(--border); margin-bottom:.8rem; }
.wlogo-placeholder span { font-size:.82rem; color:var(--text3); font-style:italic; letter-spacing:.04em; }
.wdivider { height:1px; background:var(--border); margin-bottom:.8rem; }
.wtitle { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.25rem; color:var(--teal-dark); }
.wcourse { font-size:.78rem; color:var(--text3); letter-spacing:.07em; text-transform:uppercase; margin-bottom:1.6rem; }
.flabel { display:block; font-size:.75rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.3rem; text-align:left; }
.finput { width:100%; padding:.7rem .9rem; border:1.5px solid var(--border); border-radius:8px; background:var(--surface2); color:var(--text); font-size:.95rem; font-family:inherit; margin-bottom:.9rem; transition:border-color .18s; }
.finput:focus { outline:none; border-color:var(--teal); }
.sbtn { width:100%; padding:.85rem; background:var(--teal); color:#fff; border:none; border-radius:10px; font-size:1rem; font-weight:600; cursor:pointer; transition:background .18s; }
.sbtn:hover { background:var(--teal-dark); }
.serr { min-height:1.2rem; font-size:.82rem; color:var(--bad); margin-top:.4rem; }

/* Liaxa bottom logo */
.w-liaxa-logo { margin-top:1.8rem; display:flex; justify-content:center; }

/* ── LESSON ── */
#lessonScreen { display:none; }
.stickybar { position:sticky; top:0; z-index:100; background:var(--surface); border-bottom:1px solid var(--border); padding:.55rem 1.2rem; display:flex; align-items:center; gap:.7rem; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.stickybar-logo { display:flex; align-items:center; gap:.35rem; flex-shrink:0; }
.stickybar-logo svg { height:22px; width:auto; }
.hsep { width:1px; height:22px; background:var(--border); flex-shrink:0; }
.htitle { font-family:'Crimson Pro',serif; font-size:1rem; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hchip { font-size:.7rem; background:var(--teal-bg); color:var(--teal-dark); padding:.2rem .65rem; border-radius:20px; white-space:nowrap; flex-shrink:0; }
.tbtn { background:none; border:1px solid var(--border); border-radius:7px; padding:.28rem .55rem; cursor:pointer; font-size:.82rem; color:var(--text2); flex-shrink:0; }
.progbar { height:3px; background:var(--border); position:sticky; top:47px; z-index:99; }
.progfill { height:100%; background:var(--teal); width:0%; transition:width .4s; }

/* ── CONTENT ── */
.lbody { max-width:760px; margin:0 auto; padding:2rem 1.2rem 4rem; }
.section { opacity:0; transform:translateY(16px); transition:opacity .48s, transform .48s; margin-bottom:2.8rem; }
.section.vis { opacity:1; transform:none; }
.stag { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:.45rem; }
.section h2 { font-family:'Crimson Pro',serif; font-size:1.65rem; font-weight:700; margin-bottom:.7rem; }
.section p { color:var(--text2); margin-bottom:.8rem; }
.callout { background:var(--teal-bg); border-left:4px solid var(--teal); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout strong { color:var(--teal-dark); }
.callout p { margin-bottom:0; }
.callout-gold { background:var(--gold-bg); border-left:4px solid var(--gold); border-radius:0 10px 10px 0; padding:1rem 1.2rem; margin:1rem 0; }
.callout-gold strong { color:#8a6a1a; }
.callout-gold p { margin-bottom:0; color:var(--text2); }

/* ── SHAPE CARDS ── */
.shapes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:.85rem; margin:1.1rem 0; }
.scard { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; border-top:3px solid var(--teal); }
.scard-name { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:.35rem; }
.scard-formula { font-family:'IBM Plex Mono',monospace; font-size:.9rem; color:var(--teal-dark); font-weight:600; margin-bottom:.3rem; }
.scard-note { font-size:.76rem; color:var(--text3); }

/* ── INTERACTIVE EXPLORER ── */
.explorer-box { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:1.4rem; margin:1.2rem 0; }
.explorer-title { font-family:'Crimson Pro',serif; font-size:1.1rem; font-weight:700; color:var(--teal-dark); margin-bottom:1rem; }
.shape-tabs { display:flex; gap:.4rem; margin-bottom:1.1rem; flex-wrap:wrap; }
.shape-tab { background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; padding:.35rem .85rem; font-size:.82rem; cursor:pointer; color:var(--text2); transition:all .14s; font-weight:500; }
.shape-tab.active, .shape-tab:hover { background:var(--teal); color:#fff; border-color:var(--teal); }
.explorer-inner { display:flex; gap:1.4rem; align-items:flex-start; flex-wrap:wrap; }
.explorer-left { display:flex; flex-direction:column; gap:.6rem; flex:0 0 auto; }
.explorer-controls { flex:1; min-width:180px; }
.slider-group { margin-bottom:1rem; }
.slider-label { font-size:.78rem; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:.3rem; display:flex; justify-content:space-between; }
.slider-label span { color:var(--teal-dark); font-weight:600; font-family:'IBM Plex Mono',monospace; }
.sl { width:100%; accent-color:var(--teal); cursor:pointer; }
.result-display { background:var(--teal-bg); border-radius:10px; padding:.9rem 1rem; margin-top:.6rem; text-align:center; }
.result-label { font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); margin-bottom:.2rem; }
.result-value { font-family:'Crimson Pro',serif; font-size:2.2rem; font-weight:700; color:var(--teal-dark); }
.result-unit { font-size:.85rem; color:var(--text3); margin-top:.1rem; }

/* ── PROBLEM CARDS ── */
.pcrd { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; margin-bottom:1.3rem; overflow:hidden; transition:border-color .25s; }
.pcrd.ok  { border-color:var(--ok); }
.pcrd.bad { border-color:var(--bad); }
.phdr { display:flex; align-items:center; gap:.75rem; padding:.8rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border); }
.pnum { background:var(--teal); color:#fff; width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.76rem; font-weight:700; flex-shrink:0; }
.ptitle { font-weight:600; font-size:.88rem; }
.pbody { padding:1rem; }
.pstmt { background:var(--surface2); border-radius:8px; padding:.85rem .95rem; margin-bottom:.9rem; font-size:.88rem; }
.pfn { display:block; font-family:'IBM Plex Mono',monospace; font-size:.82rem; color:var(--teal-dark); margin-top:.45rem; font-weight:600; }

/* ── WORK AREA TABS ── */
.wtabs { display:flex; gap:.35rem; margin-bottom:.5rem; flex-wrap:wrap; }
.wtab { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.26rem .68rem; font-size:.78rem; cursor:pointer; color:var(--text2); transition:all .14s; }
.wtab.active, .wtab:hover { background:var(--teal); color:#fff; border-color:var(--teal); }
.wpanel { display:none; }
.wpanel.active { display:block; }

/* ── CANVAS ── */
.cvwrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
.dcanvas { display:block; touch-action:none; cursor:crosshair; width:100%; height:190px; }
.ctoolbar { display:flex; align-items:center; gap:.35rem; padding:.35rem .55rem; background:var(--surface2); border-top:1px solid var(--border); flex-wrap:wrap; }
.tbtn2 { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--text2); }
.tbtn2.on { background:var(--teal); color:#fff; border-color:var(--teal); }
.cdot { width:17px; height:17px; border-radius:50%; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.cdot.sel { border-color:var(--gold); }
.clrbtn { background:none; border:1px solid var(--border); border-radius:5px; padding:.22rem .45rem; font-size:.72rem; cursor:pointer; color:var(--bad); margin-left:auto; }

/* ── TEXTAREA ── */
.wtextarea { width:100%; min-height:120px; padding:.65rem; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:.8rem; resize:vertical; }
.wtextarea:focus { outline:none; border-color:var(--teal); }

/* ── PHOTO ── */
.pzone { border:2px dashed var(--border); border-radius:8px; padding:1.4rem; text-align:center; cursor:pointer; position:relative; transition:border-color .18s; }
.pzone:hover { border-color:var(--teal); }
.pzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.pzicon { font-size:1.7rem; margin-bottom:.35rem; }
.pztxt { font-size:.8rem; color:var(--text3); }
.ppreview { display:none; width:100%; border-radius:8px; margin-top:.5rem; max-height:280px; object-fit:contain; }

/* ── HINT ── */
.hintbtn { background:none; border:1px solid var(--gold); color:var(--gold); border-radius:6px; padding:.28rem .65rem; font-size:.78rem; cursor:pointer; margin-bottom:.45rem; }
.hintbox { display:none; background:var(--gold-bg); border-left:3px solid var(--gold); border-radius:0 8px 8px 0; padding:.65rem .85rem; font-size:.83rem; color:var(--text2); }
.hintbox.show { display:block; }

/* ── MC ── */
.mcopts { display:flex; flex-direction:column; gap:.45rem; margin-bottom:.6rem; }
.mcopt { display:flex; align-items:center; gap:.65rem; padding:.65rem .85rem; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-size:.86rem; transition:all .13s; user-select:none; -webkit-user-select:none; }
.mcopt:hover:not(.dis) { border-color:var(--teal); background:var(--teal-bg); }
.mcopt.dis   { cursor:default; pointer-events:none; }
.mcopt.sc    { border-color:var(--ok);  background:var(--ok-bg);  color:var(--ok); }
.mcopt.sw    { border-color:var(--bad); background:var(--bad-bg); color:var(--bad); }
.mcopt.rc    { border-color:var(--ok);  background:var(--ok-bg); }
.mcfb { display:none; padding:.65rem .85rem; border-radius:8px; font-size:.83rem; margin-top:.25rem; }
.mcfb.show  { display:block; }
.mcfb.fbok  { background:var(--ok-bg);  color:var(--ok); }
.mcfb.fbbad { background:var(--bad-bg); color:var(--bad); }

/* ── RESULT ── */
.rpanel { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.8rem; text-align:center; }
.dlbtn { background:var(--teal); color:#fff; border:none; border-radius:10px; padding:.8rem 1.8rem; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .18s; }
.dlbtn:hover { background:var(--teal-dark); }
.dlbtn:disabled { opacity:.6; cursor:wait; }

/* ── FRACTIONS ── */
.frac { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 .15em; }
.frac-num { border-bottom:1.5px solid currentColor; padding:0 .2em .1em; line-height:1.2; }
.frac-den { padding:.1em .2em 0; line-height:1.2; }

/* ── FORMULA DISPLAY ── */
.formula-live { background:var(--teal-bg); border-radius:8px; padding:.55rem .75rem; font-family:'IBM Plex Mono',monospace; font-size:.75rem; color:var(--teal-dark); line-height:2.5; width:200px; }
.formula-live .fl-step { color:var(--text3); font-size:.72rem; }
.formula-live .fl-result { font-size:1rem; font-weight:600; color:var(--teal-dark); }
.stepbox { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.2rem; margin:.9rem 0; }
.stepbox .step { display:flex; gap:.8rem; margin-bottom:.6rem; align-items:flex-start; }
.stepbox .step:last-child { margin-bottom:0; }
.stepnum { background:var(--teal); color:#fff; border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; flex-shrink:0; margin-top:.15rem; }
.steptext { font-size:.86rem; color:var(--text2); }
.mono { font-family:'IBM Plex Mono',monospace; font-size:.82rem; color:var(--teal-dark); font-weight:600; }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcomeScreen">
  <div class="wcard">
    <div class="wlogo-placeholder">
      <span>Logo del Colegio</span>
    </div>
    <div class="wdivider"></div>
    <div class="wtitle">Áreas de Cuadriláteros</div>
    <div class="wcourse">Matemáticas · Secundaria</div>
    <label class="flabel" for="sName">Nombre completo</label>
    <input class="finput" id="sName" type="text" placeholder="Escribe tu nombre..." autocomplete="name">
    <label class="flabel" for="sGroup">Grupo</label>
    <input class="finput" id="sGroup" type="text" placeholder="Ej. 2°A" autocomplete="off">
    <button class="sbtn" onclick="startLesson()">Comenzar →</button>
    <div class="serr" id="startErr"></div>
    <div class="w-liaxa-logo">
      <svg width="130" height="36" viewBox="0 0 310 70" xmlns="http://www.w3.org/2000/svg">
        <polyline points="0,54 18,38 36,44 58,14" fill="none" stroke="#4a7c3f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="58" cy="14" r="6" fill="#c9a84c"/>
        <line x1="78" y1="6" x2="78" y2="64" stroke="#c9a84c" stroke-width="4"/>
        <text x="95" y="56" style="font-family:'Crimson Pro',Georgia,serif;font-size:48px;font-weight:700;fill:#4a7c3f;letter-spacing:.04em">LIAXA</text>
      </svg>
    </div>
  </div>
</div>

<!-- LESSON -->
<div id="lessonScreen">
  <div class="stickybar">
    <div class="stickybar-logo">
      <svg width="80" height="22" viewBox="0 0 310 70" xmlns="http://www.w3.org/2000/svg">
        <polyline points="0,54 18,38 36,44 58,14" fill="none" stroke="#4a7c3f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="58" cy="14" r="6" fill="#c9a84c"/>
        <line x1="78" y1="6" x2="78" y2="64" stroke="#c9a84c" stroke-width="4"/>
        <text x="95" y="56" style="font-family:'Crimson Pro',Georgia,serif;font-size:48px;font-weight:700;fill:#4a7c3f;letter-spacing:.04em">LIAXA</text>
      </svg>
    </div>
    <div class="hsep"></div>
    <div class="htitle">Áreas de Cuadriláteros</div>
    <div class="hchip" id="studentChip"></div>
    <button class="tbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="progbar"><div class="progfill" id="progFill"></div></div>
  <div class="lbody" id="lessonBody"></div>
  <div class="section" id="s_results" style="display:none;">
    <div style="max-width:760px;margin:0 auto;padding:0 1.2rem 2rem;text-align:center;">
      <button class="dlbtn" id="dlBtn" onclick="generatePDF()">Descargar Resultados PDF</button>
    </div>
  </div>
</div>

<!-- (PDF generated via jsPDF) -->

<script>
var studentData   = {};
var problems      = [];
var answeredCount = 0;
var correctCount  = 0;

function toggleTheme() {
  var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}

function hashName(s) {
  var h = 0;
  for (var i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return Math.abs(h);
}

function startLesson() {
  var name  = document.getElementById('sName').value.trim();
  var group = document.getElementById('sGroup').value.trim();
  var err   = document.getElementById('startErr');
  if (!name || !group) { err.textContent = 'Por favor completa ambos campos.'; return; }
  err.textContent = '';
  studentData = { name: name, group: group };
  answeredCount = 0; correctCount = 0; problems = [];
  var seed = hashName(name + group);
  var rng = (function(s) {
    return function() {
      s = (s * 1664525 + 1013904223) & 0xffffffff;
      return (s >>> 0) / 4294967296;
    };
  })(seed);
  buildLesson(rng);
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('lessonScreen').style.display  = 'block';
  document.getElementById('studentChip').textContent = name + ' · ' + group;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(function(s) { obs.observe(s); });
}

/* ── CANVAS ── */
function initCanvas(canvas) {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width  = Math.round(rect.width  * dpr);
  canvas.height = Math.round(rect.height * dpr);
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#1a7a6e';
  ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  var drawing = false, lx = 0, ly = 0;
  var tb = canvas.closest('.cvwrap').querySelector('.ctoolbar');
  function pos(e) {
    var r = canvas.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return { x:(src.clientX-r.left)*(canvas.offsetWidth/r.width), y:(src.clientY-r.top)*(canvas.offsetHeight/r.height) };
  }
  function onDown(e) { e.preventDefault(); drawing=true; var p=pos(e); lx=p.x; ly=p.y; }
  function onMove(e) { e.preventDefault(); if(!drawing) return; var p=pos(e); ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(p.x,p.y); ctx.stroke(); lx=p.x; ly=p.y; }
  function onUp() { drawing=false; }
  canvas.addEventListener('mousedown',  onDown, {passive:false});
  canvas.addEventListener('mousemove',  onMove, {passive:false});
  canvas.addEventListener('mouseup',    onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', onDown, {passive:false});
  canvas.addEventListener('touchmove',  onMove, {passive:false});
  canvas.addEventListener('touchend',   onUp);
  tb.querySelectorAll('.tbtn2').forEach(function(btn) {
    btn.addEventListener('click', function() {
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
      if (btn.classList.contains('bpen'))    { ctx.lineWidth = 2; }
      if (btn.classList.contains('bmarker')) { ctx.lineWidth = 10; ctx.globalAlpha = 0.45; }
      if (btn.classList.contains('beraser')) { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; }
    });
  });
  tb.querySelectorAll('.cdot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      tb.querySelectorAll('.cdot').forEach(function(d) { d.classList.remove('sel'); });
      dot.classList.add('sel');
      ctx.strokeStyle = dot.dataset.color;
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
      tb.querySelectorAll('.tbtn2').forEach(function(b) { b.classList.remove('on'); });
      tb.querySelector('.bpen').classList.add('on');
    });
  });
  tb.querySelector('.clrbtn').addEventListener('click', function() {
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  });
}

function switchTab(idx, panel, btn) {
  var prefix = 'wp_' + idx + '_';
  document.querySelectorAll('[id^="' + prefix + '"]').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById(prefix + panel).classList.add('active');
  btn.closest('.wtabs').querySelectorAll('.wtab').forEach(function(b) { b.classList.remove('active'); });

function handleMC(probIdx, chosenIdx) {
  var prob = problems[probIdx];
  if (prob.studentChoice !== null) return;
  prob.studentChoice = chosenIdx;
  var opts = document.querySelectorAll('#pc' + probIdx + ' .mcopt');
  opts.forEach(function(o) { o.classList.add('dis'); });
  var isOk = (chosenIdx === prob.correctIdx);
  opts.forEach(function(o, i) {
    if (i === prob.correctIdx) o.classList.add('rc');
    if (i === chosenIdx && isOk)  o.classList.add('sc');
    if (i === chosenIdx && !isOk) o.classList.add('sw');
  });
  var fb = document.getElementById('fb' + probIdx);
  fb.innerHTML = (isOk ? '<strong>✓ Correcto.</strong> ' : '<strong>✗ Incorrecto.</strong> ') + prob.explanation;
  fb.className = 'mcfb show ' + (isOk ? 'fbok' : 'fbbad');
  document.getElementById('pc' + probIdx).classList.add(isOk ? 'ok' : 'bad');
  if (isOk) correctCount++;
  answeredCount++;
  document.getElementById('progFill').style.width = (answeredCount / problems.length * 100) + '%';
  if (answeredCount === problems.length) setTimeout(showResults, 700);
}

function shuffleOpts(opts, correct, rng) {
  var arr = opts.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(rng() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return { opts: arr, correctIdx: arr.indexOf(correct) };
}

var explorerShape = 'rectangulo';
function setShape(shape, btn) {
  explorerShape = shape;
  document.querySelectorAll('.shape-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var grpB2 = document.getElementById('grp-base2');
  var lblD2  = document.getElementById('lbl-dim2');
  var lblB1  = document.getElementById('lbl-dim1');
  // For trapecio: slBase = base superior, slBase2 = base inferior, slAltura = altura
  if (shape === 'trapecio') {
    if (grpB2) grpB2.style.display = 'block';
    if (lblB1) lblB1.textContent = 'Base superior';
    if (lblD2) lblD2.textContent = 'Altura';
  } else if (shape === 'rombo') {
    if (grpB2) grpB2.style.display = 'none';
    if (lblB1) lblB1.textContent = 'Diagonal 1';
    if (lblD2) lblD2.textContent = 'Diagonal 2';
  } else {
    if (grpB2) grpB2.style.display = 'none';
    if (lblB1) lblB1.textContent = 'Base';

}

function updateExplorer() {
  var b  = parseInt(document.getElementById('slBase').value);
  var h  = parseInt(document.getElementById('slAltura').value);
  document.getElementById('baseVal').textContent  = b + ' cm';
  document.getElementById('altVal').textContent   = h + ' cm';
  var area;
  var formulaHtml = '';

  if (explorerShape === 'rectangulo') {
    area = b * h;
    formulaHtml =
      '<div>A = b × h</div>' +
      '<div>A = ' + b + ' × ' + h + '</div>' +
      '<div class="fl-result">A = ' + area + ' cm²</div>';
  } else if (explorerShape === 'paralelogramo') {
    area = b * h;
    formulaHtml =
      '<div>A = b × h</div>' +
      '<div>A = ' + b + ' × ' + h + '</div>' +
      '<div class="fl-result">A = ' + area + ' cm²</div>';
  } else if (explorerShape === 'trapecio') {
    var bInf = parseInt(document.getElementById('slBase2').value);
    var bSup = b;
    document.getElementById('base2Val').textContent = bInf + ' cm';
    area = Math.round((bSup + bInf) / 2 * h);
    formulaHtml =
      '<div>A = <span class="frac"><span class="frac-num">(B + b) × h</span><span class="frac-den">2</span></span></div>' +
      '<div>A = <span class="frac"><span class="frac-num">(' + bInf + ' + ' + bSup + ') × ' + h + '</span><span class="frac-den">2</span></span></div>' +
      '<div>A = <span class="frac"><span class="frac-num">' + (bSup + bInf) + ' × ' + h + '</span><span class="frac-den">2</span></span></div>' +
      '<div class="fl-result">A = ' + area + ' cm²</div>';
  } else if (explorerShape === 'rombo') {
    area = Math.round(b * h / 2);
    formulaHtml =
      '<div>A = <span class="frac"><span class="frac-num">d₁ × d₂</span><span class="frac-den">2</span></span></div>' +
      '<div>A = <span class="frac"><span class="frac-num">' + b + ' × ' + h + '</span><span class="frac-den">2</span></span></div>' +
      '<div class="fl-result">A = ' + area + ' cm²</div>';
  }
  document.getElementById('areaResult').textContent = area;
  var fl = document.getElementById('formulaLive');
  if (fl) fl.innerHTML = formulaHtml;
  drawShape();
}

function drawShape() {
  var canvas = document.getElementById('shapeCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  var b = parseInt(document.getElementById('slBase').value);
  var h = parseInt(document.getElementById('slAltura').value);

  var padX = 28, padY = 24;
  var maxW = W - padX*2;
  var maxH = H - padY*2;

  ctx.strokeStyle = '#1a7a6e';
  ctx.lineWidth = 2.5;
  ctx.fillStyle = 'rgba(26,122,110,.12)';

  if (explorerShape === 'rectangulo') {
    // Single shared scale preserving aspect ratio
    var scale = Math.min(maxW / Math.max(b,1), maxH / Math.max(h,1), 10);
    var sw = b * scale, sh = h * scale;
    var ox = (W - sw)/2, oy = (H - sh)/2;
    ctx.beginPath(); ctx.rect(ox, oy, sw, sh); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#5e807c'; ctx.font='10px IBM Plex Mono,monospace'; ctx.textAlign='center';
    ctx.fillText(b+' cm', W/2, oy+sh+14);
    ctx.save(); ctx.translate(ox-12, H/2); ctx.rotate(-Math.PI/2);
    ctx.fillText(h+' cm', 0, 0); ctx.restore(); ctx.textAlign='left';

  } else if (explorerShape === 'paralelogramo') {
    var scale = Math.min(maxW / Math.max(b,1), maxH / Math.max(h,1), 10);
    var sw = b * scale, sh = h * scale;
    var off = Math.min(sw * 0.22, 18);
    var ox = (W - sw - off)/2, oy = (H - sh)/2;
    ctx.beginPath();
    ctx.moveTo(ox+off,    oy);
    ctx.lineTo(ox+sw+off, oy);
    ctx.lineTo(ox+sw,     oy+sh);
    ctx.lineTo(ox,        oy+sh);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Dashed height line — anchored at right-bottom corner, going straight up
    // At x = ox+sw: bottom-right corner. At x = ox+sw the top of the vertical
    // is exactly on the top edge of the parallelogram (inside the shape).
    // But we want to stay clearly INSIDE: use 70% of the way from left-bottom to right-bottom
    var hx = ox + sw * 0.72;  // always inside the shape regardless of off/sh ratio
    ctx.save(); ctx.setLineDash([4,4]); ctx.strokeStyle='rgba(201,168,76,.9)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(hx, oy); ctx.lineTo(hx, oy+sh); ctx.stroke();
    ctx.restore();
    // Height label to the LEFT of the dashed line
    ctx.fillStyle='#c9a84c'; ctx.font='bold 10px IBM Plex Mono,monospace'; ctx.textAlign='right';
    ctx.fillText(h+' cm', hx-4, oy+sh/2+4);
    // Base label below
    ctx.fillStyle='#5e807c'; ctx.font='10px IBM Plex Mono,monospace'; ctx.textAlign='center';
    ctx.fillText(b+' cm', ox+off+sw/2, oy+sh+14); ctx.textAlign='left';

  } else if (explorerShape === 'trapecio') {
    // slBase = bSup (top, smaller), slBase2 = bInf (bottom, larger)
    var bSup = b;
    var bInf = parseInt(document.getElementById('slBase2').value);
    var bigBase = Math.max(bSup, bInf);
    // SEPARATE scales: X locked to bigBase, Y locked to maxH — completely independent
    var scaleX = maxW / Math.max(bigBase, 1);
    var scaleY = maxH / Math.max(h, 1);
    // Cap each independently so neither distorts the other
    scaleX = Math.min(scaleX, 10);
    scaleY = Math.min(scaleY, 10);
    var swTop = bSup * scaleX;   // top base width in px
    var swBot = bInf * scaleX;   // bottom base width in px
    var shPx  = h    * scaleY;   // height in px — fully independent of bases
    var oxTop = (W - swTop)/2;
    var oxBot = (W - swBot)/2;
    var oyTop = (H - shPx)/2;
    ctx.beginPath();
    ctx.moveTo(oxTop,         oyTop);         // top-left
    ctx.lineTo(oxTop+swTop,   oyTop);         // top-right
    ctx.lineTo(oxBot+swBot,   oyTop+shPx);    // bottom-right
    ctx.lineTo(oxBot,         oyTop+shPx);    // bottom-left
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Labels
    ctx.fillStyle='#5e807c'; ctx.font='10px IBM Plex Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('b='+bSup+' cm', W/2, oyTop-6);           // top base label above
    ctx.fillText('B='+bInf+' cm', W/2, oyTop+shPx+14);     // bottom base label below
    // Height dashed line — anchored within the top base (guaranteed inside both bases)
    // Use 72% across the top base: always inside the trapezoid regardless of proportions
    var hx2 = oxTop + swTop * 0.72;
    ctx.save(); ctx.setLineDash([3,3]); ctx.strokeStyle='rgba(201,168,76,.9)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(hx2, oyTop); ctx.lineTo(hx2, oyTop+shPx); ctx.stroke();
    ctx.restore();
    // Height label to the LEFT of the dashed line
    ctx.fillStyle='#c9a84c'; ctx.font='bold 10px IBM Plex Mono,monospace'; ctx.textAlign='right';
    ctx.fillText(h+' cm', hx2-4, oyTop+shPx/2+4); ctx.textAlign='left';

  } else if (explorerShape === 'rombo') {
    var scale = Math.min(maxW / Math.max(b,1), maxH / Math.max(h,1), 10);
    var sw = b * scale, sh = h * scale;
    var cx2 = W/2, cy2 = H/2;
    var rx = sw/2, ry = sh/2;
    ctx.beginPath();
    ctx.moveTo(cx2,    cy2-ry);
    ctx.lineTo(cx2+rx, cy2);
    ctx.lineTo(cx2,    cy2+ry);
    ctx.lineTo(cx2-rx, cy2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#5e807c'; ctx.font='10px IBM Plex Mono,monospace'; ctx.textAlign='center';
    ctx.fillText('d₁='+b+' cm', W/2, cy2+ry+14);
    ctx.fillStyle='#5e807c'; ctx.textAlign='left';
    ctx.fillText('d₂='+h+' cm', cx2+rx+5, cy2+4);
  }
}

async function generatePDF() {
  var btn = document.getElementById('dlBtn');
  btn.textContent = 'Generando…';
  btn.disabled = true;

  var jspdf  = window.jspdf || window.jsPDF;
  var doc    = new (jspdf.jsPDF || jspdf)({ orientation:'portrait', unit:'mm', format:'letter' });
  var PW = 215.9, M = 18, TW = PW - M*2;
  var PH = doc.internal.pageSize.height;
  var name  = studentData.name;
  var group = studentData.group;
  var total = problems.length;
  var pct   = Math.round(correctCount / total * 100);
  var sc    = pct>=70 ? [26,106,74] : pct>=50 ? [201,168,76] : [176,48,16];
  var dateStr = new Date().toLocaleString('es-MX', {dateStyle:'long', timeStyle:'short'});

  /* ── COVER PAGE ── */
  // Gold top stripe
  doc.setFillColor(201,168,76);  doc.rect(0,0,PW,4,'F');
  // Dark header block
  doc.setFillColor(26,30,28);    doc.rect(0,4,PW,56,'F');
  // Course label
  doc.setTextColor(201,168,76);  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.text('MATEMÁTICAS  ·  ÁREAS DE CUADRILÁTEROS', M, 17);
  // Institution line
  doc.setTextColor(150,160,155); doc.setFont('helvetica','normal');
  doc.text('TU INSTITUCIÓN  ·  LIAXA', M, 24);
  // Guide title
  doc.setTextColor(230,244,242); doc.setFontSize(19); doc.setFont('helvetica','bold');
  doc.text('Áreas de Cuadriláteros', M, 41);
  // Date
  doc.setTextColor(130,140,135); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('MATEMÁTICAS  ·  ' + dateStr, M, 52);
  // Gold divider
  doc.setFillColor(201,168,76);  doc.rect(0,60,PW,2,'F');

  /* Student info box */
  doc.setFillColor(236,245,243); doc.roundedRect(M,68,TW,32,3,3,'F');
  doc.setTextColor(94,128,124);  doc.setFontSize(6.5); doc.setFont('helvetica','normal');
  doc.text('ESTUDIANTE', M+4, 77);  doc.text('GRUPO', 130, 77);
  doc.setTextColor(18,30,28);    doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text(name, M+4, 86);       doc.text(group, 130, 86);

  /* Score box */
  doc.setFillColor(255,255,255); doc.roundedRect(M,110,TW,48,4,4,'F');
  doc.setDrawColor(sc[0],sc[1],sc[2]); doc.setLineWidth(0.8);
  doc.roundedRect(M,110,TW,48,4,4,'S');
  doc.setTextColor(sc[0],sc[1],sc[2]); doc.setFontSize(42); doc.setFont('helvetica','bold');
  doc.text(pct+'%', PW/2, 143, {align:'center'});
  doc.setTextColor(94,128,124);  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(correctCount+' correcta(s) de '+total+' pregunta(s)', PW/2, 153, {align:'center'});

  /* Summary list */
  doc.setFillColor(26,122,110); doc.setTextColor(255,255,255);
  doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.rect(M,166,TW,8,'F'); doc.text('RESUMEN DE PROBLEMAS', M+4, 172);
  var sy = 178;
  problems.forEach(function(prob, i) {
    var ok = (prob.studentChoice === prob.correctIdx);
    doc.setFillColor(ok?232:255, ok?240:232, ok?232:228);
    doc.roundedRect(M, sy, TW, 10, 2,2,'F');
    doc.setFillColor(ok?45:139, ok?106:37, ok?79:0);
    doc.circle(M+6, sy+5, 2.5,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(ok?'✓':'✗', M+4.5, sy+6.5);
    doc.setTextColor(18,30,28); doc.setFontSize(8); doc.setFont('helvetica','normal');
    doc.text('Problema '+(i+1)+': '+prob.title, M+12, sy+6.5);
    doc.setTextColor(ok?45:139, ok?106:37, ok?79:0);
    doc.text(ok?'Correcta':'Incorrecta', PW-M-24, sy+6.5);
    sy += 12;
  });

  /* ── DETAIL PAGES ── */
  for (var pi = 0; pi < problems.length; pi++) {
    var prob = problems[pi];
    doc.addPage();
    var wy = 0;

    // Page header
    doc.setFillColor(26,30,28); doc.rect(0,0,PW,20,'F');
    doc.setFillColor(201,168,76); doc.rect(0,0,PW,3,'F');
    doc.setTextColor(201,168,76); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text('MATEMÁTICAS  ·  ÁREAS DE CUADRILÁTEROS', M, 10);
    doc.setTextColor(230,244,242); doc.setFontSize(10.5); doc.setFont('helvetica','bold');
    doc.text('Problema '+(pi+1)+' de '+total+'  —  '+prob.title, M, 17);
    wy = 26;

    // Question box
    var qRaw = prob.questionText.replace(/<[^>]+>/g,'');
    var qFn  = prob.fn || '';
    doc.setFontSize(8.5); var qLines  = doc.splitTextToSize(qRaw, TW-10);
    doc.setFontSize(7.5); var fnLines = doc.splitTextToSize(qFn,  TW-10);
    var qBoxH = 10 + qLines.length*5 + (fnLines.length>0 ? fnLines.length*4.5+4 : 0);
    doc.setFillColor(236,245,243); doc.roundedRect(M,wy,TW,qBoxH,2,2,'F');
    doc.setTextColor(26,122,110); doc.setFontSize(6.5); doc.setFont('helvetica','bold');
    doc.text('PREGUNTA', M+4, wy+6);
    var qy = wy+10;
    doc.setTextColor(18,30,28); doc.setFontSize(8.5); doc.setFont('helvetica','normal');
    qLines.forEach(function(ln,li){ doc.text(ln, M+4, qy+li*5); });
    if (fnLines.length>0) {
      var fny = qy + qLines.length*5 + 2;
      doc.setTextColor(26,122,110); doc.setFontSize(7.5); doc.setFont('courier','bold');
      fnLines.forEach(function(ln,li){ doc.text(ln, M+4, fny+li*4.5); });
    }
    wy += qBoxH + 4;

    // Answer box
    var isOk2   = (prob.studentChoice === prob.correctIdx);
    var chosen  = prob.studentChoice !== null ? prob.options[prob.studentChoice] : 'Sin respuesta';
    var corr    = prob.options[prob.correctIdx];
    var expRaw  = prob.explanation;
    doc.setFontSize(8.5); var chLines = doc.splitTextToSize('Estudiante: '+chosen, TW-18);
    doc.setFontSize(8);   var coLines = doc.splitTextToSize('Correcta: '+corr,     TW-18);
    doc.setFontSize(7.5); var exLines = doc.splitTextToSize('Solución: '+expRaw,   TW-18).slice(0,4);
    var ansBoxH = 6 + chLines.length*5.5 + coLines.length*5 + exLines.length*5 + 6;
    doc.setFillColor(isOk2?232:255, isOk2?240:232, isOk2?232:228);
    doc.roundedRect(M,wy,TW,ansBoxH,2,2,'F');
    doc.setFillColor(isOk2?45:139, isOk2?106:37, isOk2?79:0);
    doc.circle(M+7, wy+8, 3.5,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
    doc.text(isOk2?'✓':'✗', M+5.2, wy+10.5);
    var ay = wy+6;
    doc.setTextColor(18,30,28); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    chLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5.5); });
    ay += chLines.length*5.5 + 2;
    doc.setTextColor(45,106,79); doc.setFontSize(8); doc.setFont('helvetica','normal');
    coLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    ay += coLines.length*5 + 1;
    doc.setTextColor(90,100,95); doc.setFontSize(7.5);
    exLines.forEach(function(ln,li){ doc.text(ln, M+14, ay+li*5); });
    wy += ansBoxH + 4;

    // Student work
    doc.setFillColor(26,122,110); doc.setTextColor(255,255,255);
    doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.rect(M,wy,TW,8,'F'); doc.text('TRABAJO DEL ESTUDIANTE', M+4, wy+5.5);
    wy += 11;

    var dc = document.getElementById('dc'+pi);
    if (dc) {
      try {
        var imgD = dc.toDataURL('image/png');
        var ar = dc.height / dc.width;
        var iw = TW, ih = Math.min(iw*ar, 68);
        doc.addImage(imgD,'PNG',M,wy,iw,ih); wy += ih+4;
      } catch(e){}
    }
    var ta = document.getElementById('ta'+pi);
    if (ta && ta.value.trim()) {
      if (wy > PH-30) { doc.addPage(); wy = 20; }
      doc.setTextColor(18,30,28); doc.setFontSize(8); doc.setFont('courier','normal');
      var taLines = doc.splitTextToSize(ta.value, TW);
      taLines.slice(0,16).forEach(function(ln) {
        if (wy > PH-15) { doc.addPage(); wy = 20; }
        doc.text(ln, M, wy); wy += 5;
      });
    }
    var pp = document.getElementById('pp'+pi);
    if (pp && pp.src && pp.src.indexOf('data:')===0) {
      if (wy > PH-55) { doc.addPage(); wy = 20; }
      try { doc.addImage(pp.src,'JPEG',M,wy,TW,68); wy += 72; } catch(e){}
    }
  }

  /* ── FOOTER ON ALL PAGES ── */
  var pages = doc.internal.getNumberOfPages();
  for (var p2=1; p2<=pages; p2++) {
    doc.setPage(p2);
    doc.setFillColor(201,168,76); doc.rect(0,PH-3,PW,3,'F');
    doc.setTextColor(94,128,124); doc.setFontSize(6.5); doc.setFont('helvetica','normal');
    doc.text(name+'  ·  '+group+'  ·  Pág '+p2+'/'+pages, PW/2, PH-5, {align:'center'});
  }

  doc.save('AreasDeCuadrilateros_'+name.replace(/\s+/g,'_')+'.pdf');
  btn.textContent = 'Descargar Resultados PDF';
  btn.disabled = false;
}
</script>
</body>
</html>
